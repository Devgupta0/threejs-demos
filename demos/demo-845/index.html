```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surreal Ocean</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="title">Surreal Ocean</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, jellyfish, fish, waves, moon;
        let drag = false, offsetX, offsetY, rotationX = 0, rotationY = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000);
            document.body.appendChild(renderer.domElement);

            const jellyfishGeometry = new THREE.SphereGeometry(2, 64, 64);
            const jellyfishMaterial = new THREE.MeshBasicMaterial({
                color: 0xff69b4,
                transparent: true,
                opacity: 0.5
            });
            jellyfish = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
            jellyfish.position.set(0, 0, 0);
            scene.add(jellyfish);

            const fishGeometry = new THREE.SphereGeometry(0.2, 32, 32);
            const fishMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.5
            });
            for (let i = 0; i < 50; i++) {
                fish = new THREE.Mesh(fishGeometry, fishMaterial);
                fish.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                scene.add(fish);
            }

            const wavesGeometry = new THREE.PlaneGeometry(20, 20, 100, 100);
            const wavesMaterial = new THREE.MeshBasicMaterial({
                color: 0x0000ff,
                transparent: true,
                opacity: 0.2
            });
            waves = new THREE.Mesh(wavesGeometry, wavesMaterial);
            waves.rotation.x = Math.PI / 2;
            waves.position.set(0, -5, 0);
            scene.add(waves);

            const moonGeometry = new THREE.SphereGeometry(5, 64, 64);
            const moonMaterial = new THREE.MeshBasicMaterial({
                color: 0xffff00,
                transparent: true,
                opacity: 0.5
            });
            moon = new THREE.Mesh(moonGeometry, moonMaterial);
            moon.position.set(0, 10, -10);
            scene.add(moon);

            const ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(0, 10, 10);
            scene.add(pointLight);

            document.addEventListener('mousedown', (e) => {
                drag = true;
                offsetX = e.clientX;
                offsetY = e.clientY;
            });

            document.addEventListener('mouseup', () => {
                drag = false;
            });

            document.addEventListener('mousemove', (e) => {
                if (drag) {
                    rotationX += (e.clientY - offsetY) * 0.01;
                    rotationY += (e.clientX - offsetX) * 0.01;
                    offsetX = e.clientX;
                    offsetY = e.clientY;
                }
            });

            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.rotation.x = rotationX;
            camera.rotation.y = rotationY;
            jellyfish.rotation.x += 0.01;
            jellyfish.rotation.y += 0.01;
            waves.position.y = Math.sin(Date.now() * 0.001) * 2 - 5;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
