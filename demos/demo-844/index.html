<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Underwater Dreamscape</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #scene-title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="scene-title">Underwater Dreamscape</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let camera, scene, renderer, jellyfish, fish = [];
        let dragStart = null;
        let dragEnd = null;
        let dragDistance = 0;
        let mouseX = 0;
        let mouseY = 0;

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.fog = new THREE.Fog(0x000000, 0.1, 10);

            const ambientLight = new THREE.AmbientLight(0x222222);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xff9900, 1, 10);
            pointLight.position.set(0, 0, 2);
            scene.add(pointLight);

            const jellyfishGeometry = new THREE.SphereGeometry(0.5, 32, 32);
            const jellyfishMaterial = new THREE.MeshBasicMaterial({ color: 0x66ccff, transparent: true, opacity: 0.5 });
            jellyfish = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
            scene.add(jellyfish);

            for (let i = 0; i < 100; i++) {
                const fishGeometry = new THREE.SphereGeometry(0.05, 16, 16);
                const fishMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.5 });
                const fishMesh = new THREE.Mesh(fishGeometry, fishMaterial);
                fishMesh.position.x = Math.random() * 4 - 2;
                fishMesh.position.y = Math.random() * 4 - 2;
                fishMesh.position.z = Math.random() * 4 - 2;
                fish.push(fishMesh);
                scene.add(fishMesh);
            }

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }

        function animate() {
            requestAnimationFrame(animate);

            for (let i = 0; i < fish.length; i++) {
                fish[i].position.x += Math.random() * 0.01 - 0.005;
                fish[i].position.y += Math.random() * 0.01 - 0.005;
                fish[i].position.z += Math.random() * 0.01 - 0.005;

                if (fish[i].position.x > 2 || fish[i].position.x < -2) {
                    fish[i].position.x = Math.random() * 4 - 2;
                }
                if (fish[i].position.y > 2 || fish[i].position.y < -2) {
                    fish[i].position.y = Math.random() * 4 - 2;
                }
                if (fish[i].position.z > 2 || fish[i].position.z < -2) {
                    fish[i].position.z = Math.random() * 4 - 2;
                }
            }

            renderer.render(scene, camera);
        }

        function onMouseDown(event) {
            dragStart = {
                x: event.clientX,
                y: event.clientY
            };
        }

        function onMouseMove(event) {
            if (dragStart) {
                dragEnd = {
                    x: event.clientX,
                    y: event.clientY
                };

                dragDistance = Math.sqrt(Math.pow(dragEnd.x - dragStart.x, 2) + Math.pow(dragEnd.y - dragStart.y, 2));

                if (dragDistance > 10) {
                    camera.rotation.x += (dragEnd.y - dragStart.y) * 0.01;
                    camera.rotation.y += (dragEnd.x - dragStart.x) * 0.01;

                    dragStart = dragEnd;
                }
            }
        }

        function onMouseUp() {
            dragStart = null;
            dragEnd = null;
        }
    </script>
</body>
</html>
