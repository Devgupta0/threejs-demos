```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesmerizing Dreamscape</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="title">Labyrinthine Library</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, cube, sphere, title;
        let mouseDown = false, lastX, lastY;
        let rotationX = 0, rotationY = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            let geometry = new THREE.BoxGeometry(1, 1, 1);
            let material = new THREE.MeshBasicMaterial({ color: 0xffffff });
            cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            geometry = new THREE.SphereGeometry(0.5, 60, 60);
            material = new THREE.MeshBasicMaterial({ color: 0xffffff });
            sphere = new THREE.Mesh(geometry, material);
            sphere.position.x = 2;
            scene.add(sphere);

            for (let i = 0; i < 100; i++) {
                geometry = new THREE.SphereGeometry(0.1, 10, 10);
                material = new THREE.MeshBasicMaterial({ color: 0xffffff });
                let orb = new THREE.Mesh(geometry, material);
                orb.position.x = Math.random() * 4 - 2;
                orb.position.y = Math.random() * 4 - 2;
                orb.position.z = Math.random() * 4 - 2;
                scene.add(orb);
            }

            let light = new THREE.PointLight(0xffffff, 1, 100);
            light.position.set(0, 0, 2);
            scene.add(light);

            let ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            document.addEventListener('mousedown', (event) => {
                mouseDown = true;
                lastX = event.clientX;
                lastY = event.clientY;
            });

            document.addEventListener('mouseup', () => {
                mouseDown = false;
            });

            document.addEventListener('mousemove', (event) => {
                if (mouseDown) {
                    rotationX += (event.clientY - lastY) * 0.01;
                    rotationY += (event.clientX - lastX) * 0.01;
                    lastX = event.clientX;
                    lastY = event.clientY;
                }
            });

            document.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            camera.rotation.x = rotationX;
            camera.rotation.y = rotationY;

            let time = Date.now() * 0.001;
            cube.position.x = Math.sin(time * 0.5) * 0.5;
            cube.position.y = Math.cos(time * 0.5) * 0.5;

            sphere.position.x = Math.sin(time) * 1;
            sphere.position.y = Math.cos(time) * 1;

            let aurora = new THREE.Color();
            aurora.setHSL(time * 0.01, 1, 0.5);
            scene.background = aurora;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
