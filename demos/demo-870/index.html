```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abandoned Research Facility</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Abandoned Research Facility</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, fish, lights, debris;
        let mouseDown = false, prevMouse = { x: 0, y: 0 };
        let rotX = 0, rotY = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            camera.position.z = 5;

            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshPhongMaterial({ color: 0x444444 });
            for (let i = 0; i < 10; i++) {
                const cube = new THREE.Mesh(geometry, material);
                cube.position.x = Math.random() * 10 - 5;
                cube.position.y = Math.random() * 10 - 5;
                cube.position.z = Math.random() * 10 - 5;
                cube.scale.x = Math.random() * 2 + 1;
                cube.scale.y = Math.random() * 2 + 1;
                cube.scale.z = Math.random() * 2 + 1;
                scene.add(cube);
            }

            debris = new THREE.Group();
            for (let i = 0; i < 50; i++) {
                const geometry = new THREE.SphereGeometry(Math.random() * 0.5 + 0.1, 10, 10);
                const material = new THREE.MeshPhongMaterial({ color: 0x888888 });
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.x = Math.random() * 10 - 5;
                sphere.position.y = Math.random() * 10 - 5;
                sphere.position.z = Math.random() * 10 - 5;
                debris.add(sphere);
            }
            scene.add(debris);

            fish = new THREE.Group();
            for (let i = 0; i < 20; i++) {
                const geometry = new THREE.SphereGeometry(0.2, 10, 10);
                const material = new THREE.MeshPhongMaterial({ color: 0x00ffff });
                const sphere = new THREE.Mesh(geometry, material);
                sphere.position.x = Math.random() * 10 - 5;
                sphere.position.y = Math.random() * 10 - 5;
                sphere.position.z = Math.random() * 10 - 5;
                fish.add(sphere);
            }
            scene.add(fish);

            lights = new THREE.Group();
            const ambientLight = new THREE.AmbientLight(0x111111);
            scene.add(ambientLight);
            lights.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 0.5);
            sunLight.position.z = 10;
            scene.add(sunLight);
            lights.add(sunLight);

            const bioluminescentLight = new THREE.PointLight(0x00ff00, 0.5, 10);
            bioluminescentLight.position.x = Math.random() * 10 - 5;
            bioluminescentLight.position.y = Math.random() * 10 - 5;
            bioluminescentLight.position.z = Math.random() * 10 - 5;
            scene.add(bioluminescentLight);
            lights.add(bioluminescentLight);

            document.addEventListener('mousedown', (e) => {
                mouseDown = true;
                prevMouse = { x: e.clientX, y: e.clientY };
            });
            document.addEventListener('mousemove', (e) => {
                if (mouseDown) {
                    rotX += (e.clientY - prevMouse.y) * 0.01;
                    rotY += (e.clientX - prevMouse.x) * 0.01;
                    prevMouse = { x: e.clientX, y: e.clientY };
                }
            });
            document.addEventListener('mouseup', () => {
                mouseDown = false;
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            camera.rotation.x = rotX;
            camera.rotation.y = rotY;

            fish.position.x += 0.01;
            if (fish.position.x > 5) {
                fish.position.x = -5;
            }

            debris.rotation.x += 0.001;
            debris.rotation.y += 0.001;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
