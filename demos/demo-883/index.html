```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surreal Tree Scene</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Surreal Tree Scene</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, tree, fog;
        let mouse = { x: 0, y: 0 };
        let drag = { x: 0, y: 0 };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.SphereGeometry(0.1, 32, 32);
            const material = new THREE.MeshBasicMaterial({ color: 0xffffff });
            for (let i = 0; i < 1000; i++) {
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = Math.random() * 10 - 5;
                mesh.position.y = Math.random() * 10 - 5;
                mesh.position.z = Math.random() * 10 - 5;
                scene.add(mesh);
            }

            const treeGeometry = new THREE.SphereGeometry(2, 32, 32);
            const treeMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            tree = new THREE.Mesh(treeGeometry, treeMaterial);
            tree.position.y = -2;
            scene.add(tree);

            const leafGeometry = new THREE.PlaneGeometry(0.5, 0.5);
            const leafMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.5 });
            for (let i = 0; i < 100; i++) {
                const leaf = new THREE.Mesh(leafGeometry, leafMaterial);
                leaf.position.x = Math.random() * 4 - 2;
                leaf.position.y = Math.random() * 4 - 2;
                leaf.position.z = Math.random() * 4 - 2;
                leaf.rotation.x = Math.random() * Math.PI;
                leaf.rotation.y = Math.random() * Math.PI;
                scene.add(leaf);
            }

            const ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            fog = new THREE.Fog(0x000000, 0, 10);
            scene.fog = fog;

            window.addEventListener('resize', onResize);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mouseup', onMouseUp);

            animate();
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            mouse.x = event.clientX;
            mouse.y = event.clientY;
        }

        function onMouseDown(event) {
            drag.x = event.clientX;
            drag.y = event.clientY;
        }

        function onMouseUp(event) {
            camera.rotation.x += (event.clientY - drag.y) * 0.01;
            camera.rotation.y += (event.clientX - drag.x) * 0.01;
            drag.x = 0;
            drag.y = 0;
        }

        function animate() {
            requestAnimationFrame(animate);
            tree.rotation.y += 0.01;
            fog.far -= 0.01;
            if (fog.far < 50) fog.far = 50;
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
