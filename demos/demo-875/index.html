```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Scene</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="title">Underwater Scene</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, jellyfish, anemones, waves;
        let dragStart = null;
        let dragEnd = null;
        let rotating = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000);
            document.body.appendChild(renderer.domElement);

            // Coral reef
            const reefGeometry = new THREE.PlaneGeometry(10, 10);
            const reefMaterial = new THREE.MeshPhongMaterial({ color: 0x964B00, specular: 0x333333, shininess: 10 });
            const reef = new THREE.Mesh(reefGeometry, reefMaterial);
            reef.rotation.x = -Math.PI / 2;
            reef.position.y = -2;
            scene.add(reef);

            // Jellyfish
            jellyfish = [];
            for (let i = 0; i < 10; i++) {
                const jellyfishGeometry = new THREE.SphereGeometry(0.2, 16, 16);
                const jellyfishMaterial = new THREE.MeshPhongMaterial({ color: 0x00FFFF, specular: 0xFFFFFF, shininess: 100, transparent: true, opacity: 0.5 });
                const jelly = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
                jelly.position.x = Math.random() * 4 - 2;
                jelly.position.y = Math.random() * 2 - 1;
                jelly.position.z = Math.random() * 4 - 2;
                jellyfish.push(jelly);
                scene.add(jelly);
            }

            // Sea anemones
            anemones = [];
            for (let i = 0; i < 10; i++) {
                const anemoneGeometry = new THREE.CylinderGeometry(0.1, 0.1, 0.5, 16);
                const anemoneMaterial = new THREE.MeshPhongMaterial({ color: 0xFF69B4, specular: 0xFFFFFF, shininess: 10 });
                const anemone = new THREE.Mesh(anemoneGeometry, anemoneMaterial);
                anemone.position.x = Math.random() * 4 - 2;
                anemone.position.y = -1.5;
                anemone.position.z = Math.random() * 4 - 2;
                anemones.push(anemone);
                scene.add(anemone);
            }

            // Waves
            waves = [];
            for (let i = 0; i < 10; i++) {
                const waveGeometry = new THREE.PlaneGeometry(1, 1);
                const waveMaterial = new THREE.MeshPhongMaterial({ color: 0x0000FF, specular: 0xFFFFFF, shininess: 10, transparent: true, opacity: 0.2 });
                const wave = new THREE.Mesh(waveGeometry, waveMaterial);
                wave.position.x = Math.random() * 4 - 2;
                wave.position.y = -2;
                wave.position.z = Math.random() * 4 - 2;
                waves.push(wave);
                scene.add(wave);
            }

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xFFFFFF, 1, 10);
            pointLight.position.set(0, 2, 0);
            scene.add(pointLight);

            document.addEventListener('mousedown', (event) => {
                dragStart = { x: event.clientX, y: event.clientY };
                rotating = true;
            });

            document.addEventListener('mousemove', (event) => {
                if (rotating) {
                    dragEnd = { x: event.clientX, y: event.clientY };
                }
            });

            document.addEventListener('mouseup', () => {
                rotating = false;
            });

            document.addEventListener('mouseleave', () => {
                rotating = false;
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            if (dragStart && dragEnd) {
                const dx = dragEnd.x - dragStart.x;
                const dy = dragEnd.y - dragStart.y;
                camera.rotation.x += dy * 0.01;
                camera.rotation.y += dx * 0.01;
                dragStart = dragEnd;
            }

            // Update jellyfish position
            jellyfish.forEach((jelly) => {
                jelly.position.x += Math.random() * 0.01 - 0.005;
                jelly.position.y += Math.random() * 0.01 - 0.005;
                jelly.position.z += Math.random() * 0.01 - 0.005;
            });

            // Update sea anemones
            anemones.forEach((anemone) => {
                anemone.rotation.y += 0.01;
            });

            // Update waves
            waves.forEach((wave) => {
                wave.position.y += Math.random() * 0.01 - 0.005;
                wave.rotation.x += Math.random() * 0.01 - 0.005;
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
```
