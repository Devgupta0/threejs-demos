<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystifying Ocean</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="title">Mystifying Ocean</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, jellyfish, seaweed, waves, stars;
        let dragStart = null;
        let dragEnd = null;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const jellyfishGeometry = new THREE.SphereGeometry(1, 64, 64);
            const jellyfishMaterial = new THREE.MeshBasicMaterial({
                color: 0xff69b4,
                transparent: true,
                opacity: 0.5
            });
            jellyfish = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
            jellyfish.position.y = 0;
            jellyfish.scale.set(2, 2, 2);
            scene.add(jellyfish);

            const seaweedGeometry = new THREE.PlaneGeometry(10, 10);
            const seaweedMaterial = new THREE.MeshBasicMaterial({
                color: 0x33cc33,
                transparent: true,
                opacity: 0.5
            });
            for (let i = 0; i < 100; i++) {
                seaweed = new THREE.Mesh(seaweedGeometry, seaweedMaterial);
                seaweed.position.x = Math.random() * 10 - 5;
                seaweed.position.y = Math.random() * 10 - 5;
                seaweed.position.z = Math.random() * 10 - 5;
                seaweed.rotation.x = Math.random() * Math.PI;
                seaweed.rotation.y = Math.random() * Math.PI;
                seaweed.scale.set(0.1, 0.1, 0.1);
                scene.add(seaweed);
            }

            const waveGeometry = new THREE.PlaneGeometry(10, 10);
            const waveMaterial = new THREE.MeshBasicMaterial({
                color: 0x4444ff,
                transparent: true,
                opacity: 0.2
            });
            for (let i = 0; i < 10; i++) {
                waves = new THREE.Mesh(waveGeometry, waveMaterial);
                waves.position.x = Math.random() * 10 - 5;
                waves.position.y = Math.random() * 10 - 5;
                waves.position.z = Math.random() * 10 - 5;
                waves.rotation.x = Math.random() * Math.PI;
                waves.rotation.y = Math.random() * Math.PI;
                waves.scale.set(0.5, 0.5, 0.5);
                scene.add(waves);
            }

            const starGeometry = new THREE.SphereGeometry(0.1, 64, 64);
            const starMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff
            });
            for (let i = 0; i < 100; i++) {
                stars = new THREE.Mesh(starGeometry, starMaterial);
                stars.position.x = Math.random() * 10 - 5;
                stars.position.y = Math.random() * 10 - 5;
                stars.position.z = Math.random() * 10 - 5;
                scene.add(stars);
            }

            const ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1, 10);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            document.addEventListener('mousedown', onDocumentMouseDown);
            document.addEventListener('mouseup', onDocumentMouseUp);
            document.addEventListener('mousemove', onDocumentMouseMove);
        }

        function animate() {
            requestAnimationFrame(animate);
            jellyfish.rotation.x += 0.001;
            jellyfish.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        function onDocumentMouseDown(event) {
            dragStart = new THREE.Vector2(event.clientX, event.clientY);
        }

        function onDocumentMouseUp(event) {
            dragEnd = new THREE.Vector2(event.clientX, event.clientY);
            if (dragStart && dragEnd) {
                const delta = new THREE.Vector2().subVectors(dragEnd, dragStart);
                camera.rotation.x += delta.y * 0.01;
                camera.rotation.y += delta.x * 0.01;
                dragStart = null;
                dragEnd = null;
            }
        }

        function onDocumentMouseMove(event) {
            if (dragStart) {
                const delta = new THREE.Vector2(event.clientX, event.clientY);
                camera.rotation.x += (delta.y - dragStart.y) * 0.01;
                camera.rotation.y += (delta.x - dragStart.x) * 0.01;
                dragStart = delta;
            }
        }
    </script>
</body>
</html>
