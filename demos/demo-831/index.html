```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abandoned Underwater Facility</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Abandoned Underwater Facility</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, fish, facility;
        let rotX = 0, rotY = 0;
        let dragging = false;
        let prevX, prevY;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0x333399, 0.5);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x00ffff, 1, 10);
            pointLight.position.set(0, 0, 2);
            scene.add(pointLight);

            facility = new THREE.Group();
            const facilityGeometry = new THREE.BoxGeometry(2, 2, 2);
            const facilityMaterial = new THREE.MeshPhongMaterial({ color: 0x444444 });
            for (let i = 0; i < 10; i++) {
                const mesh = new THREE.Mesh(facilityGeometry, facilityMaterial);
                mesh.position.set(Math.random() * 4 - 2, Math.random() * 4 - 2, Math.random() * 4 - 2);
                mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                facility.add(mesh);
            }
            scene.add(facility);

            fish = new THREE.Group();
            const fishGeometry = new THREE.SphereGeometry(0.1, 16, 16);
            const fishMaterial = new THREE.MeshPhongMaterial({ color: 0x99ffcc });
            for (let i = 0; i < 50; i++) {
                const mesh = new THREE.Mesh(fishGeometry, fishMaterial);
                mesh.position.set(Math.random() * 4 - 2, Math.random() * 4 - 2, Math.random() * 4 - 2);
                mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                fish.add(mesh);
            }
            scene.add(fish);

            const seaCreatureGeometry = new THREE.SphereGeometry(0.05, 8, 8);
            const seaCreatureMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff00, emissive: 0x00ff00 });
            for (let i = 0; i < 100; i++) {
                const mesh = new THREE.Mesh(seaCreatureGeometry, seaCreatureMaterial);
                mesh.position.set(Math.random() * 4 - 2, Math.random() * 4 - 2, Math.random() * 4 - 2);
                mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                facility.add(mesh);
            }

            document.addEventListener('mousedown', (event) => {
                dragging = true;
                prevX = event.clientX;
                prevY = event.clientY;
            });

            document.addEventListener('mousemove', (event) => {
                if (dragging) {
                    rotX += (event.clientY - prevY) * 0.01;
                    rotY += (event.clientX - prevX) * 0.01;
                    prevX = event.clientX;
                    prevY = event.clientY;
                }
            });

            document.addEventListener('mouseup', () => {
                dragging = false;
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            facility.rotation.x += 0.001;
            facility.rotation.y += 0.001;
            fish.rotation.x += 0.002;
            fish.rotation.y += 0.002;
            camera.rotation.x = rotX;
            camera.rotation.y = rotY;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
