```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Cave</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="title">Crystal Cave</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, mesh, geometry, material;
        let rotX = 0, rotY = 0;
        let dragging = false;
        let lastX, lastY;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            geometry = new THREE.SphereGeometry(1, 32, 32);
            material = new THREE.MeshPhongMaterial({
                color: 0xffffff,
                specular: 0xffffff,
                shininess: 100
            });

            for (let i = 0; i < 100; i++) {
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = Math.random() * 10 - 5;
                mesh.position.y = Math.random() * 10 - 5;
                mesh.position.z = Math.random() * 10 - 5;
                mesh.scale.set(Math.random() * 2 + 1, Math.random() * 2 + 1, Math.random() * 2 + 1);
                mesh.rotation.x = Math.random() * Math.PI * 2;
                mesh.rotation.y = Math.random() * Math.PI * 2;
                scene.add(mesh);

                const crystalMaterial = new THREE.MeshPhongMaterial({
                    color: new THREE.Color(Math.random(), Math.random(), Math.random()),
                    specular: new THREE.Color(Math.random(), Math.random(), Math.random()),
                    shininess: Math.random() * 100
                });
                const crystalGeometry = new THREE.OctahedronGeometry(Math.random() * 2 + 1, 2);
                const crystalMesh = new THREE.Mesh(crystalGeometry, crystalMaterial);
                crystalMesh.position.x = mesh.position.x;
                crystalMesh.position.y = mesh.position.y;
                crystalMesh.position.z = mesh.position.z;
                scene.add(crystalMesh);
            }

            camera.position.z = 10;

            document.addEventListener('mousedown', (e) => {
                dragging = true;
                lastX = e.clientX;
                lastY = e.clientY;
            });

            document.addEventListener('mousemove', (e) => {
                if (dragging) {
                    rotX += (e.clientY - lastY) * 0.01;
                    rotY += (e.clientX - lastX) * 0.01;
                    lastX = e.clientX;
                    lastY = e.clientY;
                }
            });

            document.addEventListener('mouseup', () => {
                dragging = false;
            });

            document.addEventListener('wheel', (e) => {
                camera.position.z += e.deltaY * 0.1;
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.rotation.x = rotX;
            camera.rotation.y = rotY;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
