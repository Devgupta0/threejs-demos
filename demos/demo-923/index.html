```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Scene</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Underwater Odyssey</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, seaweed, fish, shipwreck;
        let mouseDown = false, mouseX = 0, mouseY = 0;
        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0x4444ff, 0.5);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x8888ff, 1, 100);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            const fog = new THREE.Fog(0x000000, 1, 100);
            scene.fog = fog;

            const seaweedGeometry = new THREE.BoxGeometry(0.5, 2, 0.5);
            const seaweedMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ff00
            });
            seaweed = [];
            for (let i = 0; i < 100; i++) {
                const mesh = new THREE.Mesh(seaweedGeometry, seaweedMaterial);
                mesh.position.x = Math.random() * 10 - 5;
                mesh.position.y = Math.random() * 2 - 1;
                mesh.position.z = Math.random() * 10 - 5;
                scene.add(mesh);
                seaweed.push(mesh);
            }

            const fishGeometry = new THREE.SphereGeometry(0.2, 16, 16);
            const fishMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff
            });
            const fishScale = new THREE.Vector3(1, 1, 1);
            fish = [];
            for (let i = 0; i < 50; i++) {
                const mesh = new THREE.Mesh(fishGeometry, fishMaterial);
                mesh.position.x = Math.random() * 10 - 5;
                mesh.position.y = Math.random() * 2 - 1;
                mesh.position.z = Math.random() * 10 - 5;
                mesh.scale.copy(fishScale);
                scene.add(mesh);
                fish.push(mesh);
            }

            const shipwreckGeometry = new THREE.BoxGeometry(5, 2, 10);
            const shipwreckMaterial = new THREE.MeshBasicMaterial({
                color: 0x333333
            });
            shipwreck = new THREE.Mesh(shipwreckGeometry, shipwreckMaterial);
            shipwreck.position.z = -10;
            scene.add(shipwreck);

            document.addEventListener('mousedown', function (event) {
                mouseDown = true;
                mouseX = event.clientX;
                mouseY = event.clientY;
            });

            document.addEventListener('mouseup', function () {
                mouseDown = false;
            });

            document.addEventListener('mousemove', function (event) {
                if (mouseDown) {
                    camera.rotation.x += (event.clientY - mouseY) * 0.01;
                    camera.rotation.y += (event.clientX - mouseX) * 0.01;
                    mouseX = event.clientX;
                    mouseY = event.clientY;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            for (let i = 0; i < seaweed.length; i++) {
                seaweed[i].position.y += Math.sin(Date.now() * 0.01 + i) * 0.01;
            }
            for (let i = 0; i < fish.length; i++) {
                fish[i].position.x += Math.sin(Date.now() * 0.01 + i) * 0.01;
                fish[i].position.y += Math.cos(Date.now() * 0.01 + i) * 0.01;
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
