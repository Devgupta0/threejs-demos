```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archipelago</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: monospace;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="title">Dreamlike Archipelago</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, controls;
        let islands = [];
        let seaCreatures = [];
        let vegetation = [];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            let geometry = new THREE.PlaneGeometry(100, 100);
            let material = new THREE.MeshBasicMaterial({color: 0x00ff00});
            for (let i = 0; i < 10; i++) {
                let island = new THREE.Mesh(geometry, material);
                island.position.x = Math.random() * 10 - 5;
                island.position.y = Math.random() * 10 - 5;
                island.position.z = Math.random() * 10 - 5;
                island.rotation.x = Math.random() * Math.PI;
                island.rotation.y = Math.random() * Math.PI;
                island.scale.x = Math.random() * 2 + 1;
                island.scale.y = Math.random() * 2 + 1;
                islands.push(island);
                scene.add(island);
            }

            geometry = new THREE.SphereGeometry(0.5, 32, 32);
            material = new THREE.MeshBasicMaterial({color: 0xffffff});
            for (let i = 0; i < 100; i++) {
                let seaCreature = new THREE.Mesh(geometry, material);
                seaCreature.position.x = Math.random() * 10 - 5;
                seaCreature.position.y = Math.random() * 10 - 5;
                seaCreature.position.z = Math.random() * 10 - 5;
                seaCreatures.push(seaCreature);
                scene.add(seaCreature);
            }

            geometry = new THREE.ConeGeometry(0.5, 2, 32);
            material = new THREE.MeshBasicMaterial({color: 0x00ff00});
            for (let i = 0; i < 50; i++) {
                let veg = new THREE.Mesh(geometry, material);
                veg.position.x = Math.random() * 10 - 5;
                veg.position.y = Math.random() * 10 - 5;
                veg.position.z = Math.random() * 10 - 5;
                vegetation.push(veg);
                scene.add(veg);
            }

            let ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            let pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            let hemiLight = new THREE.HemisphereLight(0xffffff, 0x000000, 1);
            scene.add(hemiLight);

            let starsGeometry = new THREE.BufferGeometry();
            let starsVertices = [];
            for (let i = 0; i < 1000; i++) {
                let x = Math.random() * 200 - 100;
                let y = Math.random() * 200 - 100;
                let z = Math.random() * 200 - 100;
                starsVertices.push(x, y, z);
            }
            starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
            let starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.5});
            let stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);

            let mouseDown = false;
            let lastX, lastY;
            document.addEventListener('mousedown', (event) => {
                mouseDown = true;
                lastX = event.clientX;
                lastY = event.clientY;
            });
            document.addEventListener('mouseup', () => {
                mouseDown = false;
            });
            document.addEventListener('mousemove', (event) => {
                if (mouseDown) {
                    let dx = event.clientX - lastX;
                    let dy = event.clientY - lastY;
                    camera.rotation.x += dy * 0.01;
                    camera.rotation.y += dx * 0.01;
                    lastX = event.clientX;
                    lastY = event.clientY;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            for (let i = 0; i < islands.length; i++) {
                let island = islands[i];
                island.rotation.x += 0.001;
                island.rotation.y += 0.001;
            }
            for (let i = 0; i < seaCreatures.length; i++) {
                let seaCreature = seaCreatures[i];
                seaCreature.position.x += 0.001;
                if (seaCreature.position.x > 5) {
                    seaCreature.position.x = -5;
                }
            }
            for (let i = 0; i < vegetation.length; i++) {
                let veg = vegetation[i];
                veg.rotation.x += 0.001;
                veg.rotation.y += 0.001;
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
