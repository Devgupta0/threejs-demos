<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Underwater Dreamscape</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="title">Underwater Dreamscape</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, fish, jellyfish, seaweed;
        let cameraRotation = { x: 0, y: 0 };
        let mouseDown = false;
        let lastMouse = { x: 0, y: 0 };

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const moonLight = new THREE.DirectionalLight(0x999999, 1);
            moonLight.position.set(0, 0, 1);
            scene.add(moonLight);

            const ambientLight = new THREE.AmbientLight(0x444444, 0.5);
            scene.add(ambientLight);

            const jellyfishGeometry = new THREE.SphereGeometry(1, 32, 32);
            const jellyfishMaterial = new THREE.MeshBasicMaterial({
                color: 0x66ccff,
                transparent: true,
                opacity: 0.5
            });
            jellyfish = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
            scene.add(jellyfish);

            const fishGeometry = new THREE.SphereGeometry(0.1, 16, 16);
            const fishMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.5
            });
            for (let i = 0; i < 20; i++) {
                fish = new THREE.Mesh(fishGeometry, fishMaterial);
                fish.position.x = Math.random() * 2 - 1;
                fish.position.y = Math.random() * 2 - 1;
                fish.position.z = Math.random() * 2 - 1;
                scene.add(fish);
            }

            const seaweedGeometry = new THREE.PlaneGeometry(1, 5);
            const seaweedMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ff00,
                transparent: true,
                opacity: 0.5
            });
            for (let i = 0; i < 10; i++) {
                seaweed = new THREE.Mesh(seaweedGeometry, seaweedMaterial);
                seaweed.position.x = Math.random() * 2 - 1;
                seaweed.position.y = -2;
                seaweed.position.z = Math.random() * 2 - 1;
                seaweed.rotation.x = Math.PI / 2;
                scene.add(seaweed);
            }

            const coralGeometry = new THREE.SphereGeometry(0.5, 16, 16);
            const coralMaterial = new THREE.MeshBasicMaterial({
                color: 0xffcc00,
                transparent: true,
                opacity: 0.5
            });
            for (let i = 0; i < 10; i++) {
                const coral = new THREE.Mesh(coralGeometry, coralMaterial);
                coral.position.x = Math.random() * 2 - 1;
                coral.position.y = -1;
                coral.position.z = Math.random() * 2 - 1;
                scene.add(coral);
            }

            document.addEventListener('mousedown', (event) => {
                mouseDown = true;
                lastMouse = { x: event.clientX, y: event.clientY };
            });

            document.addEventListener('mouseup', () => {
                mouseDown = false;
            });

            document.addEventListener('mousemove', (event) => {
                if (mouseDown) {
                    cameraRotation.x += (event.clientY - lastMouse.y) * 0.01;
                    cameraRotation.y += (event.clientX - lastMouse.x) * 0.01;
                    lastMouse = { x: event.clientX, y: event.clientY };
                }
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            camera.position.x = Math.sin(cameraRotation.y) * 5;
            camera.position.z = Math.cos(cameraRotation.y) * 5;
            camera.position.y = Math.sin(cameraRotation.x) * 2;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
