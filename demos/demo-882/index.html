```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystical Underwater Scene</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Mystical Underwater Scene</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, fish, coral, waves, seaFloor;
        let mouseX = 0, mouseY = 0;
        let rotX = 0, rotY = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Coral
            coral = new THREE.Group();
            for (let i = 0; i < 100; i++) {
                let geometry = new THREE.SphereGeometry(Math.random() * 0.5 + 0.1, 16, 16);
                let material = new THREE.MeshPhongMaterial({ color: 0xff99cc });
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = Math.random() * 10 - 5;
                mesh.position.y = Math.random() * 5 - 2.5;
                mesh.position.z = Math.random() * 5 - 2.5;
                coral.add(mesh);
            }
            scene.add(coral);

            // Fish
            fish = new THREE.Group();
            for (let i = 0; i < 100; i++) {
                let geometry = new THREE.SphereGeometry(0.1, 16, 16);
                let material = new THREE.MeshBasicMaterial({ color: 0x00ffff });
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = Math.random() * 10 - 5;
                mesh.position.y = Math.random() * 5 - 2.5;
                mesh.position.z = Math.random() * 5 - 2.5;
                fish.add(mesh);
            }
            scene.add(fish);

            // Waves
            waves = new THREE.Group();
            for (let i = 0; i < 100; i++) {
                let geometry = new THREE.PlaneGeometry(1, 1);
                let material = new THREE.MeshPhongMaterial({ color: 0x0000ff, transparent: true, opacity: 0.5 });
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = Math.random() * 10 - 5;
                mesh.position.y = Math.random() * 5 - 2.5;
                mesh.position.z = Math.random() * 5 - 2.5;
                mesh.rotation.x = Math.random() * Math.PI;
                waves.add(mesh);
            }
            scene.add(waves);

            // Sea Floor
            seaFloor = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), new THREE.MeshBasicMaterial({ color: 0x3333ff, side: THREE.DoubleSide }));
            seaFloor.position.y = -5;
            scene.add(seaFloor);

            // Lights
            let ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            let pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            document.addEventListener('mousemove', onDocumentMouseMove, false);
        }

        function onDocumentMouseMove(event) {
            mouseX = event.clientX - window.innerWidth / 2;
            mouseY = event.clientY - window.innerHeight / 2;
        }

        function animate() {
            requestAnimationFrame(animate);

            rotX += mouseX * 0.01;
            rotY += mouseY * 0.01;
            mouseX *= 0.9;
            mouseY *= 0.9;

            camera.rotation.x = rotX;
            camera.rotation.y = rotY;

            // Fish movement
            fish.children.forEach((mesh) => {
                mesh.position.x += Math.random() * 0.01 - 0.005;
                mesh.position.y += Math.random() * 0.01 - 0.005;
                mesh.position.z += Math.random() * 0.01 - 0.005;
            });

            // Waves movement
            waves.children.forEach((mesh) => {
                mesh.position.x += Math.random() * 0.001 - 0.0005;
                mesh.position.y += Math.random() * 0.001 - 0.0005;
                mesh.position.z += Math.random() * 0.001 - 0.0005;
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
