<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Scene</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Underwater Scene</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, jellyfish, fish, plants;
        let dragStart = null;
        let dragEnd = null;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0x111111);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            // Jellyfish
            const jellyfishGeometry = new THREE.SphereGeometry(1, 32, 32);
            const jellyfishMaterial = new THREE.MeshPhongMaterial({
                color: 0xff99cc,
                transparent: true,
                opacity: 0.5
            });
            jellyfish = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
            scene.add(jellyfish);

            // Tentacles
            for (let i = 0; i < 10; i++) {
                const tentacleGeometry = new THREE.CylinderGeometry(0.1, 0.1, 2, 32);
                const tentacleMaterial = new THREE.MeshPhongMaterial({
                    color: 0xff99cc,
                    transparent: true,
                    opacity: 0.5
                });
                const tentacle = new THREE.Mesh(tentacleGeometry, tentacleMaterial);
                tentacle.position.set(Math.sin(i) * 2, Math.cos(i) * 2, 0);
                tentacle.rotation.x = Math.PI / 2;
                scene.add(tentacle);
            }

            // Fish
            for (let i = 0; i < 50; i++) {
                const fishGeometry = new THREE.SphereGeometry(0.1, 16, 16);
                const fishMaterial = new THREE.MeshPhongMaterial({
                    color: 0x66cccc,
                    transparent: true,
                    opacity: 0.5
                });
                const fish = new THREE.Mesh(fishGeometry, fishMaterial);
                fish.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                scene.add(fish);
            }

            // Plants
            for (let i = 0; i < 20; i++) {
                const plantGeometry = new THREE.CylinderGeometry(0.2, 0.2, 1, 32);
                const plantMaterial = new THREE.MeshPhongMaterial({
                    color: 0x33cc33,
                    transparent: true,
                    opacity: 0.5
                });
                const plant = new THREE.Mesh(plantGeometry, plantMaterial);
                plant.position.set(Math.random() * 10 - 5, -2, Math.random() * 10 - 5);
                plant.rotation.x = Math.PI / 2;
                scene.add(plant);
            }

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousedown', onDocumentMouseDown);
            window.addEventListener('mouseup', onDocumentMouseUp);
            window.addEventListener('mousemove', onDocumentMouseMove);

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onDocumentMouseDown(event) {
            dragStart = new THREE.Vector2(event.clientX, event.clientY);
        }

        function onDocumentMouseUp(event) {
            dragEnd = new THREE.Vector2(event.clientX, event.clientY);
            if (dragStart && dragEnd) {
                const delta = new THREE.Vector2();
                delta.subVectors(dragEnd, dragStart);
                camera.rotation.x += delta.y * 0.01;
                camera.rotation.y += delta.x * 0.01;
                dragStart = null;
                dragEnd = null;
            }
        }

        function onDocumentMouseMove(event) {
            if (dragStart) {
                dragEnd = new THREE.Vector2(event.clientX, event.clientY);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            // Update jellyfish position
            jellyfish.position.y = Math.sin(Date.now() * 0.001) * 0.5;

            // Update tentacle rotation
            for (let i = 0; i < scene.children.length; i++) {
                const child = scene.children[i];
                if (child instanceof THREE.Mesh && child.geometry instanceof THREE.CylinderGeometry) {
                    child.rotation.z += 0.01;
                }
            }

            // Update fish position
            for (let i = 0; i < scene.children.length; i++) {
                const child = scene.children[i];
                if (child instanceof THREE.Mesh && child.geometry instanceof THREE.SphereGeometry && child.material.color.getHex() === 0x66cccc) {
                    child.position.x += Math.sin(Date.now() * 0.01 + child.position.x) * 0.01;
                    child.position.y += Math.cos(Date.now() * 0.01 + child.position.y) * 0.01;
                    child.position.z += Math.sin(Date.now() * 0.01 + child.position.z) * 0.01;
                }
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
