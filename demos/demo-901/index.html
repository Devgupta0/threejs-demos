<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abandoned Research Facility</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Abandoned Research Facility</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, fish, jellyfish, dragStart = null, dragEnd = null;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({
                antialias: true,
                canvas: document.createElement('canvas')
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000);
            document.body.appendChild(renderer.domElement);

            let ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            let pointLight1 = new THREE.PointLight(0x66ccff, 1, 100);
            pointLight1.position.set(0, 2, 0);
            scene.add(pointLight1);

            let pointLight2 = new THREE.PointLight(0x66ccff, 1, 100);
            pointLight2.position.set(0, -2, 0);
            scene.add(pointLight2);

            let geometry = new THREE.SphereGeometry(1, 32, 32);
            let material = new THREE.MeshPhongMaterial({ color: 0x66ccff });
            for (let i = 0; i < 100; i++) {
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                scene.add(mesh);
                if (!fish) {
                    fish = mesh;
                } else {
                    mesh.position.copy(fish.position);
                    mesh.position.x += Math.random() * 2 - 1;
                    mesh.position.y += Math.random() * 2 - 1;
                    mesh.position.z += Math.random() * 2 - 1;
                }
            }

            let jellyfishGeometry = new THREE.SphereGeometry(2, 64, 64);
            let jellyfishMaterial = new THREE.MeshPhongMaterial({ color: 0x66ccff, transparent: true, opacity: 0.5 });
            jellyfish = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
            jellyfish.position.set(0, 0, 2);
            scene.add(jellyfish);

            let domeGeometry = new THREE.SphereGeometry(5, 64, 64);
            let domeMaterial = new THREE.MeshPhongMaterial({ color: 0x444444 });
            let dome = new THREE.Mesh(domeGeometry, domeMaterial);
            dome.position.set(0, 0, 0);
            scene.add(dome);

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mouseup', onMouseUp);
            window.addEventListener('mousemove', onMouseMove);

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseDown(event) {
            dragStart = new THREE.Vector2(event.clientX, event.clientY);
        }

        function onMouseUp(event) {
            dragEnd = new THREE.Vector2(event.clientX, event.clientY);
            if (dragStart && dragEnd) {
                let delta = new THREE.Vector2().subVectors(dragEnd, dragStart);
                camera.rotation.x += delta.y * 0.01;
                camera.rotation.y += delta.x * 0.01;
                dragStart = null;
                dragEnd = null;
            }
        }

        function onMouseMove(event) {
            if (dragStart) {
                dragEnd = new THREE.Vector2(event.clientX, event.clientY);
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            if (fish) {
                fish.position.x += 0.01;
                if (fish.position.x > 5) {
                    fish.position.x = -5;
                }
            }

            if (jellyfish) {
                jellyfish.position.y = Math.sin(Date.now() * 0.01) * 2;
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
