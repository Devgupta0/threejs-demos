<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Dream</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="title">Underwater Dream</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, jellyfish, fish, seaweed, skybox;
        let dragStart = null;
        let dragEnd = null;
        let rotationX = 0;
        let rotationY = 0;

        init();
        animate();

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            // Renderer
            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Jellyfish
            const jellyfishGeometry = new THREE.SphereGeometry(2, 64, 64);
            const jellyfishMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.5
            });
            jellyfish = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
            scene.add(jellyfish);

            // Fish
            const fishGeometry = new THREE.SphereGeometry(0.2, 16, 16);
            const fishMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.5
            });
            for (let i = 0; i < 100; i++) {
                fish = new THREE.Mesh(fishGeometry, fishMaterial);
                fish.position.x = Math.random() * 10 - 5;
                fish.position.y = Math.random() * 10 - 5;
                fish.position.z = Math.random() * 10 - 5;
                scene.add(fish);
            }

            // Seaweed
            const seaweedGeometry = new THREE.PlaneGeometry(1, 10);
            const seaweedMaterial = new THREE.MeshBasicMaterial({
                color: 0x00ff00,
                transparent: true,
                opacity: 0.5
            });
            for (let i = 0; i < 10; i++) {
                seaweed = new THREE.Mesh(seaweedGeometry, seaweedMaterial);
                seaweed.position.x = Math.random() * 10 - 5;
                seaweed.position.y = Math.random() * 10 - 5;
                seaweed.position.z = Math.random() * 10 - 5;
                seaweed.rotation.x = Math.random() * Math.PI;
                seaweed.rotation.y = Math.random() * Math.PI;
                scene.add(seaweed);
            }

            // Skybox
            const skyboxGeometry = new THREE.SphereGeometry(100, 64, 64);
            const skyboxMaterial = new THREE.MeshBasicMaterial({
                map: new THREE.CanvasTexture(createSkybox()),
                side: THREE.BackSide
            });
            skybox = new THREE.Mesh(skyboxGeometry, skyboxMaterial);
            scene.add(skybox);

            // Lights
            const ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            // Event listeners
            document.addEventListener('mousedown', (event) => {
                dragStart = {
                    x: event.clientX,
                    y: event.clientY
                };
            });
            document.addEventListener('mousemove', (event) => {
                if (dragStart) {
                    dragEnd = {
                        x: event.clientX,
                        y: event.clientY
                    };
                    rotationX += (dragEnd.y - dragStart.y) * 0.01;
                    rotationY += (dragEnd.x - dragStart.x) * 0.01;
                    dragStart = dragEnd;
                }
            });
            document.addEventListener('mouseup', () => {
                dragStart = null;
            });
        }

        function createSkybox() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const context = canvas.getContext('2d');
            const gradient = context.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#03055B');
            gradient.addColorStop(0.5, '#5C0011');
            gradient.addColorStop(1, '#8B0A1A');
            context.fillStyle = gradient;
            context.fillRect(0, 0, canvas.width, canvas.height);
            return canvas;
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.rotation.x = rotationX;
            camera.rotation.y = rotationY;
            jellyfish.rotation.x += 0.01;
            jellyfish.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
