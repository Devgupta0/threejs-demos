<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abandoned Research Facility</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Abandoned Research Facility</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, fish, jellyfish, fog;
        let rotX = 0, rotY = 0;
        let dragStartX, dragStartY;
        let isDragging = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Fog
            fog = new THREE.Fog(0x000000, 1, 10);
            scene.fog = fog;

            // Lights
            let ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            let pointLight = new THREE.PointLight(0xffffff, 1, 10);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            // Research Facility
            let facilityGeometry = new THREE.BoxGeometry(2, 2, 2);
            let facilityMaterial = new THREE.MeshPhongMaterial({ color: 0x666666 });
            let facility = new THREE.Mesh(facilityGeometry, facilityMaterial);
            facility.position.set(0, -1, 0);
            scene.add(facility);

            // Bioluminescent Fish
            let fishGeometry = new THREE.SphereGeometry(0.1, 16, 16);
            let fishMaterial = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff });
            fish = [];
            for (let i = 0; i < 100; i++) {
                let fishMesh = new THREE.Mesh(fishGeometry, fishMaterial);
                fishMesh.position.set(Math.random() * 2 - 1, Math.random() * 2 - 1, Math.random() * 2 - 1);
                scene.add(fishMesh);
                fish.push(fishMesh);
            }

            // Glowing Jellyfish
            let jellyfishGeometry = new THREE.SphereGeometry(1, 16, 16);
            let jellyfishMaterial = new THREE.MeshPhongMaterial({ color: 0xffff00, emissive: 0xffff00 });
            jellyfish = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
            jellyfish.position.set(0, 1, 0);
            scene.add(jellyfish);

            // Event listeners
            document.addEventListener('mousedown', startDrag);
            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', endDrag);
            window.addEventListener('resize', resize);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Update fish positions
            for (let i = 0; i < fish.length; i++) {
                fish[i].position.x += Math.random() * 0.01 - 0.005;
                fish[i].position.y += Math.random() * 0.01 - 0.005;
                fish[i].position.z += Math.random() * 0.01 - 0.005;
            }

            // Update jellyfish position
            jellyfish.position.y += Math.random() * 0.01 - 0.005;

            // Update camera rotation
            if (isDragging) {
                rotX += (dragStartY - event.clientY) * 0.01;
                rotY += (dragStartX - event.clientX) * 0.01;
                dragStartX = event.clientX;
                dragStartY = event.clientY;
            }

            camera.rotation.x = rotX;
            camera.rotation.y = rotY;

            // Update fog
            fog.far = Math.max(1, 10 - camera.position.length());

            renderer.render(scene, camera);
        }

        function startDrag(event) {
            isDragging = true;
            dragStartX = event.clientX;
            dragStartY = event.clientY;
        }

        function drag(event) {
            if (isDragging) {
                rotX += (dragStartY - event.clientY) * 0.01;
                rotY += (dragStartX - event.clientX) * 0.01;
                dragStartX = event.clientX;
                dragStartY = event.clientY;
            }
        }

        function endDrag() {
            isDragging = false;
        }

        function resize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
