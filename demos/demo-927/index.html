```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Scene</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="title">Underwater Scene</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, jellyfish, submarineLight;
        let mouseX = 0, mouseY = 0;
        let dragX = 0, dragY = 0;
        let isDragging = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            let geometry = new THREE.SphereGeometry(0.5, 32, 32);
            let material = new THREE.MeshBasicMaterial({ color: 0xffffff });
            jellyfish = [];
            for (let i = 0; i < 10; i++) {
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = Math.random() * 10 - 5;
                mesh.position.y = Math.random() * 10 - 5;
                mesh.position.z = Math.random() * 10 - 5;
                jellyfish.push(mesh);
                scene.add(mesh);
            }

            submarineLight = new THREE.PointLight(0xffffff, 1, 100);
            submarineLight.position.z = -10;
            scene.add(submarineLight);

            let coralReefGeometry = new THREE.PlaneGeometry(10, 10);
            let coralReefMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            let coralReef = new THREE.Mesh(coralReefGeometry, coralReefMaterial);
            coralReef.position.z = -5;
            coralReef.rotation.x = -Math.PI / 2;
            scene.add(coralReef);

            let oceanWavesGeometry = new THREE.PlaneGeometry(100, 100);
            let oceanWavesMaterial = new THREE.MeshBasicMaterial({ color: 0x0000ff });
            let oceanWaves = new THREE.Mesh(oceanWavesGeometry, oceanWavesMaterial);
            oceanWaves.position.z = -10;
            oceanWaves.rotation.x = -Math.PI / 2;
            scene.add(oceanWaves);

            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }

        function animate() {
            requestAnimationFrame(animate);

            submarineLight.intensity = Math.sin(Date.now() * 0.01) + 1;

            for (let i = 0; i < jellyfish.length; i++) {
                jellyfish[i].position.x += Math.sin(Date.now() * 0.01 + i) * 0.01;
                jellyfish[i].position.y += Math.cos(Date.now() * 0.01 + i) * 0.01;
            }

            if (isDragging) {
                camera.rotation.x += (dragY - mouseY) * 0.01;
                camera.rotation.y += (mouseX - dragX) * 0.01;
                dragX = mouseX;
                dragY = mouseY;
            }

            renderer.render(scene, camera);
        }

        function onMouseDown(event) {
            isDragging = true;
            dragX = event.clientX;
            dragY = event.clientY;
        }

        function onMouseMove(event) {
            mouseX = event.clientX;
            mouseY = event.clientY;
        }

        function onMouseUp() {
            isDragging = false;
        }
    </script>
</body>
</html>
