```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jellyfish in Neon Cave</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Jellyfish in Neon Cave</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, jellyfish, plants, curtains;
        let dragStart = null;
        let dragEnd = null;
        let rotationX = 0;
        let rotationY = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.SphereGeometry(1, 32, 32);
            const material = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.5
            });
            jellyfish = new THREE.Mesh(geometry, material);
            scene.add(jellyfish);

            for (let i = 0; i < 10; i++) {
                const plantGeometry = new THREE.SphereGeometry(Math.random() * 0.5 + 0.1, 16, 16);
                const plantMaterial = new THREE.MeshBasicMaterial({
                    color: new THREE.Color(Math.random(), Math.random(), Math.random())
                });
                const plant = new THREE.Mesh(plantGeometry, plantMaterial);
                plant.position.x = Math.random() * 4 - 2;
                plant.position.y = Math.random() * 2 - 1;
                plant.position.z = Math.random() * 4 - 2;
                scene.add(plant);
            }

            for (let i = 0; i < 5; i++) {
                const curtainGeometry = new THREE.PlaneGeometry(2, 2);
                const curtainMaterial = new THREE.MeshBasicMaterial({
                    color: new THREE.Color(Math.random(), Math.random(), Math.random()),
                    transparent: true,
                    opacity: 0.2
                });
                const curtain = new THREE.Mesh(curtainGeometry, curtainMaterial);
                curtain.position.x = Math.random() * 4 - 2;
                curtain.position.y = Math.random() * 2 - 1;
                curtain.position.z = Math.random() * 4 - 2;
                scene.add(curtain);
            }

            const ambientLight = new THREE.AmbientLight(0x333333);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1, 10);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
            window.addEventListener('resize', onWindowResize);
        }

        function animate() {
            requestAnimationFrame(animate);

            jellyfish.rotation.x += 0.01;
            jellyfish.rotation.y += 0.01;

            renderer.render(scene, camera);
        }

        function onMouseDown(event) {
            dragStart = {
                x: event.clientX,
                y: event.clientY
            };
        }

        function onMouseMove(event) {
            if (dragStart) {
                dragEnd = {
                    x: event.clientX,
                    y: event.clientY
                };

                rotationX += (dragEnd.y - dragStart.y) * 0.01;
                rotationY += (dragEnd.x - dragStart.x) * 0.01;

                camera.rotation.x = rotationX;
                camera.rotation.y = rotationY;

                dragStart = dragEnd;
            }
        }

        function onMouseUp() {
            dragStart = null;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
