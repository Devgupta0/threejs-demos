```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystical Forest</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="title">Mystical Forest</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, trees = [], fireflies = [], mist = [], lake;
        let drag = false, prevX, prevY;
        let title = document.getElementById('title');

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 500;
            camera.position.y = 100;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            let sky = new THREE.Mesh(
                new THREE.SphereGeometry(1000, 32, 32),
                new THREE.MeshBasicMaterial({
                    map: new THREE.CanvasTexture(getGradientCanvas()),
                    side: THREE.BackSide
                })
            );
            scene.add(sky);

            for (let i = 0; i < 10; i++) {
                let tree = new THREE.Mesh(
                    new THREE.BufferGeometry(),
                    new THREE.MeshBasicMaterial({ color: 0xff9900 })
                );
                tree.geometry.setAttribute('position', new THREE.Float32BufferAttribute(getTreeGeometry(), 3));
                tree.scale.set(10, 10, 10);
                tree.position.x = Math.random() * 200 - 100;
                tree.position.z = Math.random() * 200 - 100;
                scene.add(tree);
                trees.push(tree);

                for (let j = 0; j < 100; j++) {
                    let firefly = new THREE.Mesh(
                        new THREE.SphereGeometry(0.1, 16, 16),
                        new THREE.MeshBasicMaterial({ color: 0xffffff })
                    );
                    firefly.position.x = tree.position.x + Math.random() * 10 - 5;
                    firefly.position.y = tree.position.y + Math.random() * 10 - 5;
                    firefly.position.z = tree.position.z + Math.random() * 10 - 5;
                    scene.add(firefly);
                    fireflies.push(firefly);
                }
            }

            lake = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100),
                new THREE.MeshBasicMaterial({ color: 0x0000ff, transparent: true, opacity: 0.5 })
            );
            lake.rotation.x = Math.PI / 2;
            lake.position.z = -100;
            scene.add(lake);

            for (let i = 0; i < 100; i++) {
                let mistParticle = new THREE.Mesh(
                    new THREE.SphereGeometry(0.1, 16, 16),
                    new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 })
                );
                mistParticle.position.x = Math.random() * 200 - 100;
                mistParticle.position.y = Math.random() * 50;
                mistParticle.position.z = Math.random() * 200 - 100;
                scene.add(mistParticle);
                mist.push(mistParticle);
            }

            document.addEventListener('mousedown', (e) => {
                drag = true;
                prevX = e.clientX;
                prevY = e.clientY;
            });
            document.addEventListener('mouseup', () => {
                drag = false;
            });
            document.addEventListener('mousemove', (e) => {
                if (drag) {
                    camera.rotation.x += (e.clientY - prevY) * 0.01;
                    camera.rotation.y += (e.clientX - prevX) * 0.01;
                    prevX = e.clientX;
                    prevY = e.clientY;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            trees.forEach((tree) => {
                tree.rotation.y += 0.001;
            });
            fireflies.forEach((firefly) => {
                firefly.position.x += Math.random() * 0.1 - 0.05;
                firefly.position.y += Math.random() * 0.1 - 0.05;
                firefly.position.z += Math.random() * 0.1 - 0.05;
            });
            mist.forEach((particle) => {
                particle.position.x += Math.random() * 0.01 - 0.005;
                particle.position.y += Math.random() * 0.01 - 0.005;
                particle.position.z += Math.random() * 0.01 - 0.005;
            });
            lake.position.x += Math.random() * 0.01 - 0.005;
            lake.rotation.z += 0.001;
            renderer.render(scene, camera);
        }

        function getGradientCanvas() {
            let canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            let ctx = canvas.getContext('2d');
            let gradient = ctx.createLinearGradient(0, 0, 256, 256);
            gradient.addColorStop(0, '#ff9900');
            gradient.addColorStop(0.5, '#ffff00');
            gradient.addColorStop(1, '#00ff00');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 256, 256);
            return canvas;
        }

        function getTreeGeometry() {
            let positions = [];
            for (let i = 0; i < 100; i++) {
                positions.push(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
            }
            return positions;
        }
    </script>
</body>
</html>
