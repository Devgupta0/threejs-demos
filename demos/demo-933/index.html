```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Metropolis</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="title">Underwater Metropolis</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, controls, fish, waves, buildings;
        let dragging = false;
        let previousMousePosition = {
            x: 0,
            y: 0
        };

        init();
        animate();

        function init() {
            // Set up scene and camera
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 500;

            // Set up renderer
            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000);
            document.body.appendChild(renderer.domElement);

            // Set up controls
            document.addEventListener('mousedown', function (event) {
                dragging = true;
                previousMousePosition = {
                    x: event.clientX,
                    y: event.clientY
                };
            });
            document.addEventListener('mousemove', function (event) {
                if (dragging) {
                    camera.rotation.x += (event.clientY - previousMousePosition.y) * 0.01;
                    camera.rotation.y += (event.clientX - previousMousePosition.x) * 0.01;
                    previousMousePosition = {
                        x: event.clientX,
                        y: event.clientY
                    };
                }
            });
            document.addEventListener('mouseup', function () {
                dragging = false;
            });

            // Create gradient background
            const backgroundGeometry = new THREE.PlaneGeometry(2000, 2000);
            const backgroundMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    color1: { value: new THREE.Color(0x2f4f7f) },
                    color2: { value: new THREE.Color(0x6c5ce7) }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 color1;
                    uniform vec3 color2;
                    varying vec2 vUv;
                    void main() {
                        vec3 color = mix(color1, color2, vUv.y);
                        gl_FragColor = vec4(color, 1.0);
                    }
                `
            });
            const background = new THREE.Mesh(backgroundGeometry, backgroundMaterial);
            background.position.z = -1000;
            scene.add(background);

            // Create waves
            waves = [];
            for (let i = 0; i < 10; i++) {
                const waveGeometry = new THREE.PlaneGeometry(200, 200);
                const waveMaterial = new THREE.MeshPhongMaterial({
                    color: 0x00ffff,
                    transparent: true,
                    opacity: 0.5
                });
                const wave = new THREE.Mesh(waveGeometry, waveMaterial);
                wave.position.x = Math.random() * 1000 - 500;
                wave.position.y = Math.random() * 1000 - 500;
                wave.position.z = Math.random() * 100 - 50;
                waves.push(wave);
                scene.add(wave);
            }

            // Create fish
            fish = [];
            for (let i = 0; i < 50; i++) {
                const fishGeometry = new THREE.SphereGeometry(10, 32, 32);
                const fishMaterial = new THREE.MeshBasicMaterial({
                    color: 0xffff00
                });
                const fishMesh = new THREE.Mesh(fishGeometry, fishMaterial);
                fishMesh.position.x = Math.random() * 1000 - 500;
                fishMesh.position.y = Math.random() * 1000 - 500;
                fishMesh.position.z = Math.random() * 100 - 50;
                fish.push(fishMesh);
                scene.add(fishMesh);
            }

            // Create buildings
            buildings = [];
            for (let i = 0; i < 10; i++) {
                const buildingGeometry = new THREE.BoxGeometry(50, 100, 50);
                const buildingMaterial = new THREE.MeshPhongMaterial({
                    color: 0xffffff
                });
                const building = new THREE.Mesh(buildingGeometry, buildingMaterial);
                building.position.x = Math.random() * 1000 - 500;
                building.position.y = Math.random() * 1000 - 500;
                building.position.z = Math.random() * 100 - 50;
                buildings.push(building);
                scene.add(building);
            }

            // Set up lighting
            const ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 1, 1000);
            pointLight.position.z = 500;
            scene.add(pointLight);
        }

        function animate() {
            requestAnimationFrame(animate);
            for (let i = 0; i < waves.length; i++) {
                waves[i].position.z += 0.1;
                if (waves[i].position.z > 50) {
                    waves[i].position.z = -50;
                }
            }
            for (let i = 0; i < fish.length; i++) {
                fish[i].position.x += 0.1;
                if (fish[i].position.x > 500) {
                    fish[i].position.x = -500;
                }
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
