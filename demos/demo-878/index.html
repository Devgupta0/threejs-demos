```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater World</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Mystical Underwater World</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, jellyfish, fish, seaFans, coral;
        let dragStart = null;
        let dragEnd = null;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const backgroundGradient = new THREE.CanvasTexture(
                drawBackgroundGradient(1024, 1024)
            );
            scene.background = backgroundGradient;

            const jellyfishGeom = new THREE.SphereGeometry(2, 64, 64);
            const jellyfishMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.5
            });
            jellyfish = new THREE.Mesh(jellyfishGeom, jellyfishMat);
            scene.add(jellyfish);

            const fishGeom = new THREE.SphereGeometry(0.2, 32, 32);
            const fishMat = new THREE.MeshBasicMaterial({
                color: 0xffff00,
                transparent: true,
                opacity: 0.8
            });
            fish = [];
            for (let i = 0; i < 50; i++) {
                const fishMesh = new THREE.Mesh(fishGeom, fishMat);
                fishMesh.position.x = Math.random() * 4 - 2;
                fishMesh.position.y = Math.random() * 4 - 2;
                fishMesh.position.z = Math.random() * 4 - 2;
                scene.add(fishMesh);
                fish.push(fishMesh);
            }

            const seaFanGeom = new THREE.PlaneGeometry(1, 2);
            const seaFanMat = new THREE.MeshBasicMaterial({
                color: 0xff00ff,
                transparent: true,
                opacity: 0.8
            });
            seaFans = [];
            for (let i = 0; i < 10; i++) {
                const seaFanMesh = new THREE.Mesh(seaFanGeom, seaFanMat);
                seaFanMesh.position.x = Math.random() * 4 - 2;
                seaFanMesh.position.y = Math.random() * 4 - 2;
                seaFanMesh.position.z = Math.random() * 4 - 2;
                scene.add(seaFanMesh);
                seaFans.push(seaFanMesh);
            }

            const coralGeom = new THREE.SphereGeometry(0.5, 32, 32);
            const coralMat = new THREE.MeshBasicMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.8
            });
            coral = [];
            for (let i = 0; i < 20; i++) {
                const coralMesh = new THREE.Mesh(coralGeom, coralMat);
                coralMesh.position.x = Math.random() * 4 - 2;
                coralMesh.position.y = Math.random() * 4 - 2;
                coralMesh.position.z = Math.random() * 4 - 2;
                scene.add(coralMesh);
                coral.push(coralMesh);
            }

            const light = new THREE.PointLight(0xffffff, 1, 100);
            light.position.z = 5;
            scene.add(light);

            document.addEventListener('mousedown', onDocumentMouseDown);
            document.addEventListener('mouseup', onDocumentMouseUp);
            document.addEventListener('mousemove', onDocumentMouseMove);
        }

        function onDocumentMouseDown(event) {
            dragStart = {
                x: event.clientX,
                y: event.clientY
            };
        }

        function onDocumentMouseUp(event) {
            dragEnd = {
                x: event.clientX,
                y: event.clientY
            };
            if (dragStart && dragEnd) {
                const dx = dragEnd.x - dragStart.x;
                const dy = dragEnd.y - dragStart.y;
                camera.rotation.x += dy * 0.01;
                camera.rotation.y += dx * 0.01;
            }
            dragStart = null;
            dragEnd = null;
        }

        function onDocumentMouseMove(event) {
            if (dragStart) {
                const dx = event.clientX - dragStart.x;
                const dy = event.clientY - dragStart.y;
                camera.rotation.x += dy * 0.01;
                camera.rotation.y += dx * 0.01;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            jellyfish.rotation.y += 0.01;
            for (let i = 0; i < fish.length; i++) {
                fish[i].rotation.y += 0.01;
                fish[i].position.x += Math.random() * 0.01 - 0.005;
                fish[i].position.y += Math.random() * 0.01 - 0.005;
                fish[i].position.z += Math.random() * 0.01 - 0.005;
            }
            for (let i = 0; i < seaFans.length; i++) {
                seaFans[i].rotation.y += 0.01;
            }
            for (let i = 0; i < coral.length; i++) {
                coral[i].rotation.y += 0.01;
            }
            renderer.render(scene, camera);
        }

        function drawBackgroundGradient(width, height) {
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#03055B');
            gradient.addColorStop(1, '#000022');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            for (let i = 0; i < 100; i++) {
                ctx.beginPath();
                ctx.arc(Math.random() * width, Math.random() * height, Math.random() * 10 + 5, 0, 2 * Math.PI);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fill();
            }
            return canvas;
        }
    </script>
</body>
</html>
```
