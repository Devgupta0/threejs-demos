<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Abandoned Underwater Library</title>
  <style>
    body { margin: 0; }
    #title { position: absolute; top: 10px; left: 10px; font-family: monospace; color: white; }
  </style>
</head>
<body>
  <div id="title">Abandoned Underwater Library</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    let scene, camera, renderer, fish, jellyfish, columns, fog;
    let mouseDown = false, lastX, lastY;
    let dragSpeed = 0.01;

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;

      renderer = new THREE.WebGLRenderer({
        antialias: true
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      // Fog
      fog = new THREE.Fog(0x444444, 0, 10);
      scene.fog = fog;

      // Lighting
      let ambientLight = new THREE.AmbientLight(0x444444);
      scene.add(ambientLight);

      let pointLight = new THREE.PointLight(0xffffff, 1, 10);
      pointLight.position.set(0, 2, 0);
      scene.add(pointLight);

      // Columns
      columns = [];
      for (let i = -5; i <= 5; i++) {
        for (let j = -5; j <= 5; j++) {
          let column = new THREE.Mesh(
            new THREE.CylinderGeometry(0.5, 0.5, 2, 64),
            new THREE.MeshPhongMaterial({ color: 0x888888 })
          );
          column.position.set(i, -1, j);
          scene.add(column);
          columns.push(column);
        }
      }

      // Jellyfish
      jellyfish = [];
      for (let i = 0; i < 1000; i++) {
        let jelly = new THREE.Mesh(
          new THREE.SphereGeometry(0.1, 32, 32),
          new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff })
        );
        jelly.position.set(Math.random() * 10 - 5, Math.random() * 2 - 1, Math.random() * 10 - 5);
        jelly.velocity = new THREE.Vector3(Math.random() * 0.01 - 0.005, Math.random() * 0.01 - 0.005, Math.random() * 0.01 - 0.005);
        scene.add(jelly);
        jellyfish.push(jelly);
      }

      // Fish
      fish = [];
      for (let i = 0; i < 100; i++) {
        let fishy = new THREE.Mesh(
          new THREE.SphereGeometry(0.05, 32, 32),
          new THREE.MeshPhongMaterial({ color: 0x8888ff, specular: 0xffffff, shininess: 100 })
        );
        fishy.position.set(Math.random() * 10 - 5, Math.random() * 2 - 1, Math.random() * 10 - 5);
        fishy.velocity = new THREE.Vector3(Math.random() * 0.1 - 0.05, Math.random() * 0.1 - 0.05, Math.random() * 0.1 - 0.05);
        scene.add(fishy);
        fish.push(fishy);
      }

      document.addEventListener('mousedown', (event) => {
        mouseDown = true;
        lastX = event.clientX;
        lastY = event.clientY;
      });

      document.addEventListener('mouseup', () => {
        mouseDown = false;
      });

      document.addEventListener('mousemove', (event) => {
        if (mouseDown) {
          camera.rotation.x += (event.clientY - lastY) * dragSpeed;
          camera.rotation.y += (event.clientX - lastX) * dragSpeed;
          lastX = event.clientX;
          lastY = event.clientY;
        }
      });

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    function animate() {
      requestAnimationFrame(animate);

      // Update jellyfish positions
      for (let jelly of jellyfish) {
        jelly.position.add(jelly.velocity);
        if (jelly.position.x > 5 || jelly.position.x < -5) {
          jelly.velocity.x *= -1;
        }
        if (jelly.position.y > 2 || jelly.position.y < -2) {
          jelly.velocity.y *= -1;
        }
        if (jelly.position.z > 5 || jelly.position.z < -5) {
          jelly.velocity.z *= -1;
        }
      }

      // Update fish positions
      for (let fishy of fish) {
        fishy.position.add(fishy.velocity);
        if (fishy.position.x > 5 || fishy.position.x < -5) {
          fishy.velocity.x *= -1;
        }
        if (fishy.position.y > 2 || fishy.position.y < -2) {
          fishy.velocity.y *= -1;
        }
        if (fishy.position.z > 5 || fishy.position.z < -5) {
          fishy.velocity.z *= -1;
        }
      }

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
