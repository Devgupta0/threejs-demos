<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Underwater Galaxy</title>
  <style>
    body {
      margin: 0;
      background-color: #000;
      overflow: hidden;
    }
    #title {
      position: absolute;
      top: 10px;
      left: 10px;
      font-family: monospace;
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="title">Underwater Galaxy</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    let scene, camera, renderer, jellyfish, seaweed;
    let rotX = 0, rotY = 0;
    let isDragging = false;
    let lastX, lastY;

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;

      renderer = new THREE.WebGLRenderer({
        antialias: true
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      let gradient = new THREE.GradientTexture(
        new THREE.CanvasTexture(
          makeGradientCanvas()
        )
      );
      scene.background = gradient;

      let starGeometry = new THREE.BufferGeometry();
      let starVertices = [];
      for (let i = 0; i < 1000; i++) {
        starVertices.push(Math.random() * 2 - 1);
        starVertices.push(Math.random() * 2 - 1);
        starVertices.push(Math.random() * 2 - 1);
      }
      starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
      let starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
      let stars = new THREE.Points(starGeometry, starMaterial);
      scene.add(stars);

      let jellyfishGeometry = new THREE.SphereGeometry(0.5, 16, 16);
      let jellyfishMaterial = new THREE.MeshBasicMaterial({ color: 0x44a0e6, transparent: true, opacity: 0.5 });
      jellyfish = [];
      for (let i = 0; i < 20; i++) {
        let mesh = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
        mesh.position.x = Math.random() * 10 - 5;
        mesh.position.y = Math.random() * 10 - 5;
        mesh.position.z = Math.random() * 10 - 5;
        scene.add(mesh);
        jellyfish.push(mesh);
      }

      let seaweedGeometry = new THREE.BufferGeometry();
      let seaweedVertices = [];
      for (let i = 0; i < 100; i++) {
        seaweedVertices.push(Math.random() * 2 - 1);
        seaweedVertices.push(Math.random() * 2 - 1);
        seaweedVertices.push(Math.random() * 2 - 1);
      }
      seaweedGeometry.setAttribute('position', new THREE.Float32BufferAttribute(seaweedVertices, 3));
      let seaweedMaterial = new THREE.LineBasicMaterial({ color: 0x99ffcc, linewidth: 2 });
      seaweed = new THREE.Line(seaweedGeometry, seaweedMaterial);
      scene.add(seaweed);

      let waterGeometry = new THREE.PlaneGeometry(10, 10);
      let waterMaterial = new THREE.MeshBasicMaterial({ color: 0x0000ff, transparent: true, opacity: 0.5 });
      let water = new THREE.Mesh(waterGeometry, waterMaterial);
      water.rotation.x = Math.PI / 2;
      water.position.y = -2;
      scene.add(water);

      document.addEventListener('mousedown', (event) => {
        isDragging = true;
        lastX = event.clientX;
        lastY = event.clientY;
      });
      document.addEventListener('mousemove', (event) => {
        if (isDragging) {
          rotX += (event.clientY - lastY) * 0.01;
          rotY += (event.clientX - lastX) * 0.01;
          lastX = event.clientX;
          lastY = event.clientY;
        }
      });
      document.addEventListener('mouseup', () => {
        isDragging = false;
      });
    }

    function animate() {
      requestAnimationFrame(animate);
      camera.rotation.x = rotX;
      camera.rotation.y = rotY;

      for (let i = 0; i < jellyfish.length; i++) {
        let mesh = jellyfish[i];
        mesh.position.y += 0.01;
        if (mesh.position.y > 5) {
          mesh.position.y = -5;
        }
      }

      seaweed.position.y += 0.01;
      if (seaweed.position.y > 5) {
        seaweed.position.y = -5;
      }

      renderer.render(scene, camera);
    }

    function makeGradientCanvas() {
      let canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      let ctx = canvas.getContext('2d');
      let gradient = ctx.createLinearGradient(0, 0, 0, 256);
      gradient.addColorStop(0, '#000066');
      gradient.addColorStop(1, '#0000ff');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 256, 256);
      return canvas;
    }
  </script>
</body>
</html>
