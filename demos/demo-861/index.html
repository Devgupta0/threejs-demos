```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Scene</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: monospace;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="title">Underwater Odyssey</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, fish, coral, jellyfish, ships, waves;
        let mouseDown = false, mouseX, mouseY, rotX = 0, rotY = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Add coral reef
            coral = new THREE.Group();
            for (let i = 0; i < 100; i++) {
                let geometry = new THREE.SphereGeometry(Math.random() * 0.5 + 0.1, 16, 16);
                let material = new THREE.MeshPhongMaterial({ color: 0xff69b4, specular: 0x333333, shininess: 10 });
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = Math.random() * 10 - 5;
                mesh.position.y = Math.random() * 10 - 5;
                mesh.position.z = Math.random() * 5 - 2.5;
                coral.add(mesh);
            }
            scene.add(coral);

            // Add bioluminescent fish
            fish = new THREE.Group();
            for (let i = 0; i < 50; i++) {
                let geometry = new THREE.SphereGeometry(0.2, 16, 16);
                let material = new THREE.MeshBasicMaterial({ color: 0x00ffff });
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = Math.random() * 10 - 5;
                mesh.position.y = Math.random() * 10 - 5;
                mesh.position.z = Math.random() * 5 - 2.5;
                fish.add(mesh);
            }
            scene.add(fish);

            // Add jellyfish
            jellyfish = new THREE.Group();
            for (let i = 0; i < 20; i++) {
                let geometry = new THREE.SphereGeometry(0.5, 16, 16);
                let material = new THREE.MeshPhongMaterial({ color: 0x66cccc, specular: 0x333333, shininess: 10 });
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = Math.random() * 20 - 10;
                mesh.position.y = Math.random() * 20 - 10;
                mesh.position.z = Math.random() * 10 - 5;
                jellyfish.add(mesh);
            }
            scene.add(jellyfish);

            // Add sunken ships
            ships = new THREE.Group();
            for (let i = 0; i < 5; i++) {
                let geometry = new THREE.BoxGeometry(2, 1, 1);
                let material = new THREE.MeshPhongMaterial({ color: 0x444444, specular: 0x333333, shininess: 10 });
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = Math.random() * 20 - 10;
                mesh.position.y = Math.random() * 20 - 10;
                mesh.position.z = Math.random() * 10 - 5;
                ships.add(mesh);
            }
            scene.add(ships);

            // Add waves
            waves = new THREE.Group();
            for (let i = 0; i < 100; i++) {
                let geometry = new THREE.PlaneGeometry(1, 1);
                let material = new THREE.MeshPhongMaterial({ color: 0x0000ff, specular: 0x333333, shininess: 10, transparent: true, opacity: 0.5 });
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = Math.random() * 20 - 10;
                mesh.position.y = Math.random() * 20 - 10;
                mesh.position.z = Math.random() * 10 - 5;
                mesh.rotation.x = Math.random() * Math.PI;
                mesh.rotation.y = Math.random() * Math.PI;
                waves.add(mesh);
            }
            scene.add(waves);

            // Add lights
            let ambientLight = new THREE.AmbientLight(0x111111);
            scene.add(ambientLight);

            let pointLight = new THREE.PointLight(0x00ffff, 1, 100);
            pointLight.position.z = 5;
            scene.add(pointLight);

            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Update fish positions
            fish.children.forEach((mesh) => {
                mesh.position.x += Math.random() * 0.01 - 0.005;
                mesh.position.y += Math.random() * 0.01 - 0.005;
                mesh.position.z += Math.random() * 0.01 - 0.005;
            });

            // Update jellyfish positions
            jellyfish.children.forEach((mesh) => {
                mesh.position.x += Math.random() * 0.01 - 0.005;
                mesh.position.y += Math.random() * 0.01 - 0.005;
                mesh.position.z += Math.random() * 0.01 - 0.005;
            });

            // Update waves positions
            waves.children.forEach((mesh) => {
                mesh.position.x += Math.random() * 0.01 - 0.005;
                mesh.position.y += Math.random() * 0.01 - 0.005;
                mesh.position.z += Math.random() * 0.01 - 0.005;
            });

            camera.rotation.x += rotX;
            camera.rotation.y += rotY;

            renderer.render(scene, camera);
        }

        function onMouseDown(event) {
            mouseDown = true;
            mouseX = event.clientX;
            mouseY = event.clientY;
        }

        function onMouseMove(event) {
            if (mouseDown) {
                rotX = (event.clientY - mouseY) * 0.01;
                rotY = (event.clientX - mouseX) * 0.01;
                mouseX = event.clientX;
                mouseY = event.clientY;
            }
        }

        function onMouseUp() {
            mouseDown = false;
        }
    </script>
</body>
</html>
```
