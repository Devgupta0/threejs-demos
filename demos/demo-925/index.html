```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamscape</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Dreamscape</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, jellyfish, particles, vortex;
        let dragStart = null;
        let dragEnd = null;
        let rotation = { x: 0, y: 0 };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.SphereGeometry(1, 32, 32);
            const material = new THREE.MeshPhongMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.5,
                shininess: 100
            });
            jellyfish = new THREE.Mesh(geometry, material);
            scene.add(jellyfish);

            particles = [];
            for (let i = 0; i < 1000; i++) {
                const particle = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({
                    color: new THREE.Color(`hsl(${Math.random() * 360}, 100%, 50%)`)
                }));
                particle.position.x = Math.random() * 2 - 1;
                particle.position.y = Math.random() * 2 - 1;
                particle.position.z = Math.random() * 2 - 1;
                scene.add(particle);
                particles.push(particle);
            }

            vortex = new THREE.Mesh(new THREE.TorusGeometry(2, 0.5, 16, 60), new THREE.MeshBasicMaterial({
                color: 0x4444ff
            }));
            scene.add(vortex);

            const ambientLight = new THREE.AmbientLight(0x111111);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1, 10);
            pointLight.position.z = 5;
            scene.add(pointLight);

            window.addEventListener('resize', onResize);
            window.addEventListener('mousedown', onDragStart);
            window.addEventListener('mousemove', onDrag);
            window.addEventListener('mouseup', onDragEnd);

            animate();
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onDragStart(event) {
            dragStart = { x: event.clientX, y: event.clientY };
        }

        function onDrag(event) {
            if (dragStart) {
                dragEnd = { x: event.clientX, y: event.clientY };
                rotation.x += (dragEnd.y - dragStart.y) * 0.01;
                rotation.y += (dragEnd.x - dragStart.x) * 0.01;
                dragStart = dragEnd;
            }
        }

        function onDragEnd() {
            dragStart = null;
            dragEnd = null;
        }

        function animate() {
            requestAnimationFrame(animate);

            for (let i = 0; i < particles.length; i++) {
                const particle = particles[i];
                particle.position.x += Math.random() * 0.01 - 0.005;
                particle.position.y += Math.random() * 0.01 - 0.005;
                particle.position.z += Math.random() * 0.01 - 0.005;
            }

            jellyfish.position.y = Math.sin(Date.now() * 0.001) * 0.5;
            jellyfish.rotation.x += 0.01;
            jellyfish.rotation.y += 0.01;

            vortex.rotation.x += 0.01;
            vortex.rotation.y += 0.01;

            camera.rotation.x = rotation.x;
            camera.rotation.y = rotation.y;

            const gradient = new THREE.CanvasTexture(createGradientCanvas());
            scene.background = gradient;

            renderer.render(scene, camera);
        }

        function createGradientCanvas() {
            const canvas = document.createElement('canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const ctx = canvas.getContext('2d');

            const gradient = ctx.createLinearGradient(0, 0, 0, window.innerHeight);
            gradient.addColorStop(0, '#4400ff');
            gradient.addColorStop(0.5, '#0000ff');
            gradient.addColorStop(1, '#000011');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

            for (let i = 0; i < 100; i++) {
                ctx.beginPath();
                ctx.arc(Math.random() * window.innerWidth, Math.random() * window.innerHeight, Math.random() * 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.1})`;
                ctx.fill();
            }

            const aurora = ctx.createLinearGradient(0, window.innerHeight * 0.8, 0, window.innerHeight);
            aurora.addColorStop(0, `rgba(0, 255, 255, ${Math.random() * 0.1})`);
            aurora.addColorStop(1, `rgba(0, 0, 255, ${Math.random() * 0.1})`);
            ctx.fillStyle = aurora;
            ctx.fillRect(0, window.innerHeight * 0.8, window.innerWidth, window.innerHeight * 0.2);

            return canvas;
        }

        init();
    </script>
</body>
</html>
