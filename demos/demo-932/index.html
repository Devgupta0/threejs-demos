```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater City</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="title">Underwater City</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, fish, jellyfish;
        let rotX = 0, rotY = 0;
        let dragStartX, dragStartY;
        let isDragging = false;

        // Initialize scene
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        // Initialize camera
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        // Initialize renderer
        renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Create jellyfish city
        jellyfish = new THREE.Group();
        for (let i = 0; i < 100; i++) {
            let mesh = new THREE.Mesh(
                new THREE.SphereGeometry(Math.random() * 0.5 + 0.1, 32, 32),
                new THREE.MeshPhongMaterial({color: new THREE.Color(`hsl(${Math.random() * 360}, 100%, 50%)`), transparent: true, opacity: 0.5})
            );
            mesh.position.x = Math.random() * 4 - 2;
            mesh.position.y = Math.random() * 4 - 2;
            mesh.position.z = Math.random() * 4 - 2;
            jellyfish.add(mesh);
        }
        scene.add(jellyfish);

        // Create school of fish
        fish = new THREE.Group();
        for (let i = 0; i < 50; i++) {
            let mesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 32, 32),
                new THREE.MeshBasicMaterial({color: new THREE.Color(`hsl(${Math.random() * 360}, 100%, 50%)`)})
            );
            mesh.position.x = Math.random() * 10 - 5;
            mesh.position.y = Math.random() * 10 - 5;
            mesh.position.z = Math.random() * 10 - 5;
            fish.add(mesh);
        }
        scene.add(fish);

        // Create moonlight
        let moonlight = new THREE.DirectionalLight(0xffffff, 0.5);
        moonlight.position.z = 10;
        scene.add(moonlight);

        // Create ambient light
        let ambientLight = new THREE.AmbientLight(0x111111, 0.5);
        scene.add(ambientLight);

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Handle mouse drag
        document.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
        });
        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                rotX += (e.clientY - dragStartY) * 0.01;
                rotY += (e.clientX - dragStartX) * 0.01;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
            }
        });
        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Rotate jellyfish city
            jellyfish.rotation.x = rotX;
            jellyfish.rotation.y = rotY;

            // Move school of fish
            fish.children.forEach((fishMesh) => {
                fishMesh.position.x += Math.random() * 0.01 - 0.005;
                fishMesh.position.y += Math.random() * 0.01 - 0.005;
                fishMesh.position.z += Math.random() * 0.01 - 0.005;
            });

            // Render scene
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
