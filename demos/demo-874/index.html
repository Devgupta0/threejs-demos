<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Underwater Research Facility</title>
    <style>
        body { margin: 0; background-color: #000; }
        #title { position: absolute; top: 10px; left: 10px; color: #fff; font-family: monospace; }
    </style>
</head>
<body>
    <div id="title">Underwater Research Facility</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, controls;
        let fish = [];
        let lightIntensity = 0.5;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            const geometry = new THREE.PlaneGeometry(100, 100);
            const material = new THREE.MeshPhongMaterial({ color: 0x444444, specular: 0x333333, shininess: 100 });
            const plane = new THREE.Mesh(geometry, material);
            plane.rotation.x = -Math.PI / 2;
            scene.add(plane);

            const coralGeometry = new THREE.SphereGeometry(0.5, 32, 32);
            const coralMaterial = new THREE.MeshPhongMaterial({ color: 0xff99cc, specular: 0x333333, shininess: 100 });
            for (let i = 0; i < 100; i++) {
                const coral = new THREE.Mesh(coralGeometry, coralMaterial);
                coral.position.x = Math.random() * 10 - 5;
                coral.position.z = Math.random() * 10 - 5;
                scene.add(coral);
            }

            for (let i = 0; i < 100; i++) {
                const fishGeometry = new THREE.SphereGeometry(0.1, 32, 32);
                const fishMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff });
                const fishMesh = new THREE.Mesh(fishGeometry, fishMaterial);
                fishMesh.position.x = Math.random() * 10 - 5;
                fishMesh.position.z = Math.random() * 10 - 5;
                fish.push({ mesh: fishMesh, velocity: Math.random() * 0.1 });
                scene.add(fishMesh);
            }

            const light1 = new THREE.PointLight(0xffffff, lightIntensity, 100);
            light1.position.set(0, 2, 0);
            scene.add(light1);

            const light2 = new THREE.PointLight(0xffffff, lightIntensity, 100);
            light2.position.set(0, -2, 0);
            scene.add(light2);

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            let mouseX = 0;
            let mouseY = 0;
            let mouseDown = false;

            document.addEventListener('mousemove', (event) => {
                if (mouseDown) {
                    camera.rotation.x += (event.clientY - mouseY) * 0.01;
                    camera.rotation.y += (event.clientX - mouseX) * 0.01;
                }
                mouseX = event.clientX;
                mouseY = event.clientY;
            });

            document.addEventListener('mousedown', () => {
                mouseDown = true;
            });

            document.addEventListener('mouseup', () => {
                mouseDown = false;
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            fish.forEach((fish) => {
                fish.mesh.position.x += fish.velocity;
                if (fish.mesh.position.x > 5 || fish.mesh.position.x < -5) {
                    fish.velocity *= -1;
                }
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
