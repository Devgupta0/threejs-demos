```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Metropolis</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="title">Underwater Metropolis</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, jellyfish = [], city, ocean, sky;
        let mouseDown = false, lastX, lastY;
        const clock = new THREE.Clock();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000);
            document.body.appendChild(renderer.domElement);

            // City
            city = new THREE.Group();
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 10; j++) {
                    const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
                    const material = new THREE.MeshLambertMaterial({ color: 0x00ff00 });
                    const cube = new THREE.Mesh(geometry, material);
                    cube.position.x = i - 5;
                    cube.position.y = j - 5;
                    cube.position.z = -5;
                    city.add(cube);
                }
            }
            scene.add(city);

            // Jellyfish
            for (let i = 0; i < 10; i++) {
                const geometry = new THREE.SphereGeometry(0.5, 32, 32);
                const material = new THREE.MeshLambertMaterial({ color: 0xffffff, emissive: 0x00ffff });
                const jellyfishMesh = new THREE.Mesh(geometry, material);
                jellyfishMesh.position.x = Math.random() * 10 - 5;
                jellyfishMesh.position.y = Math.random() * 10 - 5;
                jellyfishMesh.position.z = Math.random() * 10 - 5;
                jellyfish.push(jellyfishMesh);
                scene.add(jellyfishMesh);
            }

            // Ocean
            ocean = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100),
                new THREE.MeshLambertMaterial({ color: 0x0000ff, transparent: true, opacity: 0.5 })
            );
            ocean.rotation.x = -Math.PI / 2;
            ocean.position.z = -10;
            scene.add(ocean);

            // Sky
            sky = new THREE.Mesh(
                new THREE.SphereGeometry(100, 32, 32),
                new THREE.MeshBasicMaterial({ color: 0x0000ff, side: THREE.BackSide })
            );
            scene.add(sky);

            // Stars
            for (let i = 0; i < 100; i++) {
                const geometry = new THREE.SphereGeometry(0.1, 32, 32);
                const material = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const star = new THREE.Mesh(geometry, material);
                star.position.x = Math.random() * 200 - 100;
                star.position.y = Math.random() * 200 - 100;
                star.position.z = Math.random() * 200 - 100;
                scene.add(star);
            }

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.z = 5;
            scene.add(pointLight);

            document.addEventListener('mousedown', (event) => {
                mouseDown = true;
                lastX = event.clientX;
                lastY = event.clientY;
            });

            document.addEventListener('mouseup', () => {
                mouseDown = false;
            });

            document.addEventListener('mousemove', (event) => {
                if (mouseDown) {
                    camera.rotation.x += (event.clientY - lastY) * 0.01;
                    camera.rotation.y += (event.clientX - lastX) * 0.01;
                    lastX = event.clientX;
                    lastY = event.clientY;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            // Update jellyfish positions
            for (let i = 0; i < jellyfish.length; i++) {
                jellyfish[i].position.y += 0.01;
                if (jellyfish[i].position.y > 5) {
                    jellyfish[i].position.y = -5;
                }
            }

            // Update ocean position
            ocean.position.z = -10 + Math.sin(clock.getElapsedTime()) * 0.1;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
