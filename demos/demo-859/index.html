<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater City</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: monospace;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="title">Neon Abyss</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, jellyfish, fish, moonLight;
        let dragged = false;
        let lastX, lastY;
        let rotX = 0, rotY = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.SphereGeometry(1, 30, 30);
            const material = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
            jellyfish = new THREE.Mesh(geometry, material);
            jellyfish.scale.set(2, 2, 2);
            scene.add(jellyfish);

            const fishGeometry = new THREE.SphereGeometry(0.1, 10, 10);
            const fishMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
            for (let i = 0; i < 50; i++) {
                fish = new THREE.Mesh(fishGeometry, fishMaterial);
                fish.position.x = Math.random() * 4 - 2;
                fish.position.y = Math.random() * 4 - 2;
                fish.position.z = Math.random() * 4 - 2;
                scene.add(fish);
            }

            moonLight = new THREE.DirectionalLight(0x4444ff, 1);
            moonLight.position.set(0, 0, 5);
            scene.add(moonLight);

            const AmbientLight = new THREE.AmbientLight(0x111111, 0.5);
            scene.add(AmbientLight);

            document.addEventListener('mousedown', onDocumentMouseDown, false);
            document.addEventListener('mousemove', onDocumentMouseMove, false);
            document.addEventListener('mouseup', onDocumentMouseUp, false);

            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onDocumentMouseDown(event) {
            dragged = true;
            lastX = event.clientX;
            lastY = event.clientY;
        }

        function onDocumentMouseMove(event) {
            if (dragged) {
                rotX += (event.clientY - lastY) * 0.01;
                rotY += (event.clientX - lastX) * 0.01;
                lastX = event.clientX;
                lastY = event.clientY;
            }
        }

        function onDocumentMouseUp() {
            dragged = false;
        }

        function animate() {
            requestAnimationFrame(animate);

            camera.rotation.x = rotX;
            camera.rotation.y = rotY;

            jellyfish.rotation.x += 0.01;
            jellyfish.rotation.y += 0.01;

            for (let i = 0; i < scene.children.length; i++) {
                if (scene.children[i].type === 'Mesh' && scene.children[i] !== jellyfish) {
                    scene.children[i].rotation.x += 0.01;
                    scene.children[i].rotation.y += 0.01;
                    scene.children[i].position.x += Math.random() * 0.01 - 0.005;
                    scene.children[i].position.y += Math.random() * 0.01 - 0.005;
                    scene.children[i].position.z += Math.random() * 0.01 - 0.005;
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
