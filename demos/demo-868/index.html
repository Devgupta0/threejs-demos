```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Metropolis</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="title">Underwater Metropolis</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, fish, lights;
        let dragStart = null;
        let dragEnd = null;
        let rotationX = 0;
        let rotationY = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Add buildings
            for (let i = 0; i < 10; i++) {
                for (let j = 0; j < 10; j++) {
                    let geometry = new THREE.BoxGeometry(0.5, 2, 0.5);
                    let material = new THREE.MeshPhongMaterial({
                        color: 0x00ffff,
                        specular: 0xffffff,
                        shininess: 100
                    });
                    let cube = new THREE.Mesh(geometry, material);
                    cube.position.x = i - 5;
                    cube.position.y = 1;
                    cube.position.z = j - 5;
                    scene.add(cube);
                }
            }

            // Add jellyfish lights
            lights = [];
            for (let i = 0; i < 10; i++) {
                let geometry = new THREE.SphereGeometry(0.2, 16, 16);
                let material = new THREE.MeshBasicMaterial({
                    color: 0xff00ff,
                    transparent: true,
                    opacity: 0.5
                });
                let light = new THREE.Mesh(geometry, material);
                light.position.x = Math.random() * 10 - 5;
                light.position.y = Math.random() * 2;
                light.position.z = Math.random() * 10 - 5;
                scene.add(light);
                lights.push(light);
            }

            // Add fish
            fish = [];
            for (let i = 0; i < 100; i++) {
                let geometry = new THREE.SphereGeometry(0.05, 8, 8);
                let material = new THREE.MeshBasicMaterial({
                    color: 0x00ff00,
                    transparent: true,
                    opacity: 0.5
                });
                let fishMesh = new THREE.Mesh(geometry, material);
                fishMesh.position.x = Math.random() * 10 - 5;
                fishMesh.position.y = Math.random() * 2;
                fishMesh.position.z = Math.random() * 10 - 5;
                scene.add(fishMesh);
                fish.push(fishMesh);
            }

            // Add wave
            let waveGeometry = new THREE.PlaneGeometry(10, 10, 100, 100);
            let waveMaterial = new THREE.MeshPhongMaterial({
                color: 0x0000ff,
                transparent: true,
                opacity: 0.5
            });
            let wave = new THREE.Mesh(waveGeometry, waveMaterial);
            wave.position.y = -1;
            wave.rotation.x = -Math.PI / 2;
            scene.add(wave);

            // Add ambient light
            let ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            // Add point light
            let pointLight = new THREE.PointLight(0xffffff, 1, 10);
            pointLight.position.set(0, 2, 0);
            scene.add(pointLight);

            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Update jellyfish lights
            for (let i = 0; i < lights.length; i++) {
                lights[i].position.y += 0.01;
                if (lights[i].position.y > 2) {
                    lights[i].position.y = -2;
                }
            }

            // Update fish
            for (let i = 0; i < fish.length; i++) {
                fish[i].position.x += Math.random() * 0.01 - 0.005;
                fish[i].position.y += Math.random() * 0.01 - 0.005;
                fish[i].position.z += Math.random() * 0.01 - 0.005;
                if (fish[i].position.x > 5) {
                    fish[i].position.x = -5;
                } else if (fish[i].position.x < -5) {
                    fish[i].position.x = 5;
                }
                if (fish[i].position.y > 2) {
                    fish[i].position.y = -2;
                } else if (fish[i].position.y < -2) {
                    fish[i].position.y = 2;
                }
                if (fish[i].position.z > 5) {
                    fish[i].position.z = -5;
                } else if (fish[i].position.z < -5) {
                    fish[i].position.z = 5;
                }
            }

            // Update wave
            for (let i = 0; i < 100; i++) {
                for (let j = 0; j < 100; j++) {
                    let vertex = scene.children[1].geometry.vertices[i * 100 + j];
                    vertex.y = -1 + Math.sin((i + Date.now() * 0.01)) * 0.1;
                }
            }
            scene.children[1].geometry.verticesNeedUpdate = true;

            camera.rotation.x = rotationX;
            camera.rotation.y = rotationY;

            renderer.render(scene, camera);
        }

        function onMouseDown(event) {
            dragStart = {
                x: event.clientX,
                y: event.clientY
            };
        }

        function onMouseMove(event) {
            if (dragStart) {
                dragEnd = {
                    x: event.clientX,
                    y: event.clientY
                };
                rotationX += (dragEnd.y - dragStart.y) * 0.01;
                rotationY += (dragEnd.x - dragStart.x) * 0.01;
                dragStart = dragEnd;
            }
        }

        function onMouseUp(event) {
            dragStart = null;
            dragEnd = null;
        }
    </script>
</body>
</html>
```
