```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abandoned Research Facility</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #scene-title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="scene-title">Abandoned Research Facility</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, mesh, fishMesh, jellyfishMesh;
        let fish = [], jellyfish;
        let rotX = 0, rotY = 0;
        let dragging = false;
        let lastX, lastY;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            let geometry = new THREE.SphereGeometry(0.1, 32, 32);
            let material = new THREE.MeshBasicMaterial({ color: 0xffffff });
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            geometry = new THREE.SphereGeometry(0.05, 32, 32);
            material = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            for (let i = 0; i < 100; i++) {
                fishMesh = new THREE.Mesh(geometry, material);
                fishMesh.position.x = Math.random() * 2 - 1;
                fishMesh.position.y = Math.random() * 2 - 1;
                fishMesh.position.z = Math.random() * 2 - 1;
                scene.add(fishMesh);
                fish.push(fishMesh);
            }

            geometry = new THREE.SphereGeometry(1, 32, 32);
            material = new THREE.MeshBasicMaterial({ color: 0xff00ff });
            jellyfishMesh = new THREE.Mesh(geometry, material);
            jellyfishMesh.position.y = 2;
            scene.add(jellyfishMesh);
            jellyfish = jellyfishMesh;

            let ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            let pointLight = new THREE.PointLight(0xffffff, 1, 10);
            pointLight.position.y = 2;
            scene.add(pointLight);

            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
            window.addEventListener('resize', onWindowResize);
        }

        function animate() {
            requestAnimationFrame(animate);

            mesh.rotation.x += 0.01;
            mesh.rotation.y += 0.01;

            for (let i = 0; i < fish.length; i++) {
                fish[i].position.x += 0.001;
                fish[i].position.y += 0.001;
                fish[i].position.z += 0.001;
                if (fish[i].position.x > 1) {
                    fish[i].position.x = -1;
                }
                if (fish[i].position.y > 1) {
                    fish[i].position.y = -1;
                }
                if (fish[i].position.z > 1) {
                    fish[i].position.z = -1;
                }
            }

            jellyfish.position.y = 2 + Math.sin(Date.now() * 0.01) * 0.1;

            camera.rotation.x = rotX;
            camera.rotation.y = rotY;

            renderer.render(scene, camera);
        }

        function onMouseDown(event) {
            dragging = true;
            lastX = event.clientX;
            lastY = event.clientY;
        }

        function onMouseMove(event) {
            if (dragging) {
                rotX += (event.clientY - lastY) * 0.01;
                rotY += (event.clientX - lastX) * 0.01;
                lastX = event.clientX;
                lastY = event.clientY;
            }
        }

        function onMouseUp() {
            dragging = false;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
