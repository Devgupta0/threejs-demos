```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abandoned Research Facility</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Abandoned Research Facility</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let camera, scene, renderer, mesh, jellyfish;
        let rotation = { x: 0, y: 0 };
        let dragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x03055b);

            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshPhongMaterial({ color: 0xffffff, specular: 0x333333, shininess: 5 });
            mesh = new THREE.Mesh(geometry, material);
            mesh.position.x = -2;
            scene.add(mesh);

            const jellyfishGeometry = new THREE.SphereGeometry(2, 32, 32);
            const jellyfishMaterial = new THREE.MeshPhongMaterial({ color: 0x66ccff, transparent: true, opacity: 0.5 });
            jellyfish = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
            jellyfish.position.z = -10;
            scene.add(jellyfish);

            const coralGeometry = new THREE.SphereGeometry(0.5, 16, 16);
            const coralMaterial = new THREE.MeshPhongMaterial({ color: 0xff99cc, specular: 0x333333, shininess: 5 });
            for (let i = 0; i < 10; i++) {
                const coral = new THREE.Mesh(coralGeometry, coralMaterial);
                coral.position.x = Math.random() * 4 - 2;
                coral.position.y = Math.random() * 2 - 1;
                coral.position.z = Math.random() * 2 - 1;
                scene.add(coral);
            }

            const light = new THREE.PointLight(0xffffff, 1, 10);
            light.position.x = 2;
            light.position.y = 2;
            light.position.z = 2;
            scene.add(light);

            const ambientLight = new THREE.AmbientLight(0x111111);
            scene.add(ambientLight);

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            document.addEventListener('mousedown', (event) => {
                dragging = true;
                previousMousePosition.x = event.clientX;
                previousMousePosition.y = event.clientY;
            });

            document.addEventListener('mouseup', () => {
                dragging = false;
            });

            document.addEventListener('mousemove', (event) => {
                if (dragging) {
                    rotation.x += (event.clientY - previousMousePosition.y) * 0.01;
                    rotation.y += (event.clientX - previousMousePosition.x) * 0.01;
                    previousMousePosition.x = event.clientX;
                    previousMousePosition.y = event.clientY;
                }
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            mesh.rotation.x += 0.01;
            mesh.rotation.y += 0.01;

            jellyfish.rotation.x += 0.005;
            jellyfish.rotation.y += 0.005;

            camera.rotation.x = rotation.x;
            camera.rotation.y = rotation.y;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
