<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Scene</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-family: monospace;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Futuristic Underwater Landscape</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, fish, jellyfish, caustics;
        let mouseX = 0, mouseY = 0;
        let dragX = 0, dragY = 0;
        let isDragging = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.SphereGeometry(0.1, 32, 32);
            const material = new THREE.MeshBasicMaterial({ color: 0xffffff });
            fish = new THREE.Mesh(geometry, material);
            scene.add(fish);

            for (let i = 0; i < 10; i++) {
                const jellyfishGeometry = new THREE.SphereGeometry(1, 32, 32);
                const jellyfishMaterial = new THREE.MeshBasicMaterial({ color: new THREE.Color(`hsl(${i * 36}, 100%, 50%)`) });
                const jellyfish = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
                jellyfish.position.x = Math.random() * 10 - 5;
                jellyfish.position.y = Math.random() * 10 - 5;
                jellyfish.position.z = Math.random() * 10 - 5;
                scene.add(jellyfish);
                jellyfish.rotation.x = Math.random() * Math.PI;
                jellyfish.rotation.y = Math.random() * Math.PI;
            }

            const causticGeometry = new THREE.PlaneGeometry(10, 10);
            const causticMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
            caustics = new THREE.Mesh(causticGeometry, causticMaterial);
            caustics.position.z = -5;
            scene.add(caustics);

            const ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.z = 5;
            scene.add(pointLight);

            document.addEventListener('mousedown', onDocumentMouseDown);
            document.addEventListener('mousemove', onDocumentMouseMove);
            document.addEventListener('mouseup', onDocumentMouseUp);
        }

        function onDocumentMouseDown(event) {
            isDragging = true;
            dragX = event.clientX;
            dragY = event.clientY;
        }

        function onDocumentMouseMove(event) {
            if (isDragging) {
                camera.rotation.x += (event.clientY - dragY) * 0.01;
                camera.rotation.y += (event.clientX - dragX) * 0.01;
                dragX = event.clientX;
                dragY = event.clientY;
            }
        }

        function onDocumentMouseUp() {
            isDragging = false;
        }

        function animate() {
            requestAnimationFrame(animate);

            fish.position.x = Math.sin(Date.now() * 0.001) * 2;
            fish.position.y = Math.cos(Date.now() * 0.001) * 2;
            fish.position.z = Math.sin(Date.now() * 0.002) * 2;

            caustics.position.x = Math.sin(Date.now() * 0.003) * 0.1;
            caustics.position.y = Math.cos(Date.now() * 0.003) * 0.1;

            for (let i = 0; i < scene.children.length; i++) {
                if (scene.children[i].geometry.type === 'SphereGeometry' && scene.children[i] !== fish) {
                    scene.children[i].rotation.x += 0.01;
                    scene.children[i].rotation.y += 0.01;
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
