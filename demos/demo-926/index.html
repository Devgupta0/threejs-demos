```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abandoned Underwater Research Facility</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Abandoned Underwater Research Facility</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, fish, anemones, jellyfish;
        let mouseDown = false, lastMouseX = 0, lastMouseY = 0;
        let rotationX = 0, rotationY = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            let ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            let pointLight = new THREE.PointLight(0x888888, 1, 100);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            let directionalLight = new THREE.DirectionalLight(0x222222, 1);
            directionalLight.position.set(0, 1, 1);
            scene.add(directionalLight);

            let geometry = new THREE.BoxGeometry(1, 1, 1);
            let material = new THREE.MeshPhongMaterial({
                color: 0x666666,
                specular: 0x333333,
                shininess: 10
            });

            for (let i = 0; i < 10; i++) {
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                mesh.scale.set(Math.random(), Math.random(), Math.random());
                scene.add(mesh);
            }

            fish = [];
            for (let i = 0; i < 100; i++) {
                let geometry = new THREE.SphereGeometry(0.1, 10, 10);
                let material = new THREE.MeshPhongMaterial({
                    color: 0xffffff,
                    specular: 0x333333,
                    shininess: 10
                });
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                mesh.scale.set(Math.random(), Math.random(), Math.random());
                scene.add(mesh);
                fish.push(mesh);
            }

            anemones = [];
            for (let i = 0; i < 10; i++) {
                let geometry = new THREE.CylinderGeometry(0.5, 0.5, 1, 10);
                let material = new THREE.MeshPhongMaterial({
                    color: 0x00ff00,
                    specular: 0x333333,
                    shininess: 10
                });
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                scene.add(mesh);
                anemones.push(mesh);
            }

            jellyfish = [];
            for (let i = 0; i < 10; i++) {
                let geometry = new THREE.SphereGeometry(0.5, 10, 10);
                let material = new THREE.MeshPhongMaterial({
                    color: 0x00ffff,
                    specular: 0x333333,
                    shininess: 10
                });
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                scene.add(mesh);
                jellyfish.push(mesh);
            }

            document.addEventListener('mousedown', onDocumentMouseDown, false);
            document.addEventListener('mouseup', onDocumentMouseUp, false);
            document.addEventListener('mousemove', onDocumentMouseMove, false);
        }

        function animate() {
            requestAnimationFrame(animate);

            camera.rotation.x += (rotationX - camera.rotation.x) * 0.05;
            camera.rotation.y += (rotationY - camera.rotation.y) * 0.05;

            for (let i = 0; i < fish.length; i++) {
                fish[i].position.x += Math.random() * 0.01 - 0.005;
                fish[i].position.y += Math.random() * 0.01 - 0.005;
                fish[i].position.z += Math.random() * 0.01 - 0.005;
            }

            for (let i = 0; i < anemones.length; i++) {
                anemones[i].rotation.x += 0.01;
                anemones[i].rotation.y += 0.01;
            }

            for (let i = 0; i < jellyfish.length; i++) {
                jellyfish[i].position.x += Math.random() * 0.01 - 0.005;
                jellyfish[i].position.y += Math.random() * 0.01 - 0.005;
                jellyfish[i].position.z += Math.random() * 0.01 - 0.005;
            }

            renderer.render(scene, camera);
        }

        function onDocumentMouseDown(event) {
            event.preventDefault();
            mouseDown = true;
            lastMouseX = event.clientX;
            lastMouseY = event.clientY;
        }

        function onDocumentMouseUp(event) {
            event.preventDefault();
            mouseDown = false;
        }

        function onDocumentMouseMove(event) {
            event.preventDefault();
            if (mouseDown) {
                let deltaMouseX = event.clientX - lastMouseX;
                let deltaMouseY = event.clientY - lastMouseY;
                rotationX += deltaMouseY * 0.01;
                rotationY += deltaMouseX * 0.01;
                lastMouseX = event.clientX;
                lastMouseY = event.clientY;
            }
        }
    </script>
</body>
</html>
