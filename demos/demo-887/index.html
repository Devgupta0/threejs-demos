<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Scene</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="title">Underwater Dreamscape</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, jellyfish, fish, seaweed;
        let mouseX = 0, mouseY = 0;
        let rotX = 0, rotY = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x03055B);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xFFFFFF, 1, 100);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            const jellyfishGeometry = new THREE.SphereGeometry(1, 32, 32);
            const jellyfishMaterial = new THREE.MeshBasicMaterial({
                color: 0x55FFFF,
                transparent: true,
                opacity: 0.5
            });
            jellyfish = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
            scene.add(jellyfish);

            for (let i = 0; i < 10; i++) {
                const tentacleGeometry = new THREE.CylinderGeometry(0.1, 0.1, 2, 32);
                const tentacleMaterial = new THREE.MeshBasicMaterial({
                    color: 0x55FFFF,
                    transparent: true,
                    opacity: 0.5
                });
                const tentacle = new THREE.Mesh(tentacleGeometry, tentacleMaterial);
                tentacle.position.set(Math.random() * 2 - 1, Math.random() * 2 - 1, Math.random() * 2 - 1);
                tentacle.rotation.set(Math.random() * Math.PI * 2, Math.random() * Math.PI * 2, Math.random() * Math.PI * 2);
                jellyfish.add(tentacle);
            }

            fish = [];
            for (let i = 0; i < 100; i++) {
                const fishGeometry = new THREE.SphereGeometry(0.1, 16, 16);
                const fishMaterial = new THREE.MeshBasicMaterial({
                    color: 0xFFFFFF,
                    transparent: true,
                    opacity: 0.5
                });
                const fishMesh = new THREE.Mesh(fishGeometry, fishMaterial);
                fishMesh.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                fishMesh.velocity = new THREE.Vector3(Math.random() * 2 - 1, Math.random() * 2 - 1, Math.random() * 2 - 1);
                scene.add(fishMesh);
                fish.push(fishMesh);
            }

            seaweed = [];
            for (let i = 0; i < 100; i++) {
                const seaweedGeometry = new THREE.CylinderGeometry(0.01, 0.01, 1, 32);
                const seaweedMaterial = new THREE.MeshBasicMaterial({
                    color: 0x00FF00,
                    transparent: true,
                    opacity: 0.5
                });
                const seaweedMesh = new THREE.Mesh(seaweedGeometry, seaweedMaterial);
                seaweedMesh.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                seaweedMesh.rotation.set(Math.random() * Math.PI * 2, Math.random() * Math.PI * 2, Math.random() * Math.PI * 2);
                scene.add(seaweedMesh);
                seaweed.push(seaweedMesh);
            }

            document.addEventListener('mousemove', (event) => {
                mouseX = event.clientX - window.innerWidth / 2;
                mouseY = event.clientY - window.innerHeight / 2;
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            rotX += mouseX * 0.01;
            rotY += mouseY * 0.01;
            camera.rotation.set(rotX, rotY, 0);

            for (let i = 0; i < fish.length; i++) {
                fish[i].position.add(fish[i].velocity);
                if (fish[i].position.x > 5 || fish[i].position.x < -5) {
                    fish[i].velocity.x *= -1;
                }
                if (fish[i].position.y > 5 || fish[i].position.y < -5) {
                    fish[i].velocity.y *= -1;
                }
                if (fish[i].position.z > 5 || fish[i].position.z < -5) {
                    fish[i].velocity.z *= -1;
                }
            }

            jellyfish.rotation.set(jellyfish.rotation.x + 0.01, jellyfish.rotation.y + 0.01, jellyfish.rotation.z + 0.01);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
