```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Library</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Underwater Library</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, bookshelves = [], pillars = [], fish = [], seaweed = [];
        let mouseDown = false, mouseX, mouseY, rotateX = 0, rotateY = 0;
        let clock = new THREE.Clock();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            let moonLight = new THREE.DirectionalLight(0xffffff, 0.5);
            moonLight.position.set(0, 0, 1);
            scene.add(moonLight);

            let ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            for (let i = 0; i < 10; i++) {
                let bookshelf = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2, 0.1), new THREE.MeshPhongMaterial({ color: 0x444444, emissive: 0x222222 }));
                bookshelf.position.x = Math.random() * 10 - 5;
                bookshelf.position.z = Math.random() * 10 - 5;
                scene.add(bookshelf);
                bookshelves.push(bookshelf);
            }

            for (let i = 0; i < 5; i++) {
                let pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 5, 32), new THREE.MeshPhongMaterial({ color: 0x444444, emissive: 0x222222 }));
                pillar.position.x = Math.random() * 10 - 5;
                pillar.position.z = Math.random() * 10 - 5;
                scene.add(pillar);
                pillars.push(pillar);
            }

            for (let i = 0; i < 20; i++) {
                let fishGeometry = new THREE.SphereGeometry(0.1, 32, 32);
                let fishMaterial = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff });
                let fishMesh = new THREE.Mesh(fishGeometry, fishMaterial);
                fishMesh.position.x = Math.random() * 10 - 5;
                fishMesh.position.z = Math.random() * 10 - 5;
                scene.add(fishMesh);
                fish.push(fishMesh);
            }

            for (let i = 0; i < 10; i++) {
                let seaweedGeometry = new THREE.PlaneGeometry(0.2, 2);
                let seaweedMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff00, emissive: 0x00ff00 });
                let seaweedMesh = new THREE.Mesh(seaweedGeometry, seaweedMaterial);
                seaweedMesh.position.x = Math.random() * 10 - 5;
                seaweedMesh.position.z = Math.random() * 10 - 5;
                seaweedMesh.rotation.x = Math.random() * Math.PI;
                scene.add(seaweedMesh);
                seaweed.push(seaweedMesh);
            }

            document.addEventListener('mousedown', (event) => {
                mouseDown = true;
                mouseX = event.clientX;
                mouseY = event.clientY;
            });
            document.addEventListener('mouseup', () => {
                mouseDown = false;
            });
            document.addEventListener('mousemove', (event) => {
                if (mouseDown) {
                    rotateX += (event.clientY - mouseY) * 0.01;
                    rotateY += (event.clientX - mouseX) * 0.01;
                    mouseX = event.clientX;
                    mouseY = event.clientY;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.rotation.x = rotateX;
            camera.rotation.y = rotateY;

            for (let i = 0; i < fish.length; i++) {
                fish[i].position.x += Math.random() * 0.01 - 0.005;
                fish[i].position.z += Math.random() * 0.01 - 0.005;
            }

            for (let i = 0; i < seaweed.length; i++) {
                seaweed[i].rotation.x += 0.01;
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
