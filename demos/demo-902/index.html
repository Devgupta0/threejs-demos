```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Cave</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="title">Crystal Cave</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, controls;
        let crystals = [];
        let mist = [];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            let ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            let pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            camera.position.z = 5;

            for (let i = 0; i < 100; i++) {
                let crystal = new THREE.Mesh(
                    new THREE.OctahedronGeometry(Math.random() * 2 + 1, 0),
                    new THREE.MeshPhongMaterial({
                        color: new THREE.Color(Math.random(), Math.random(), Math.random()),
                        specular: new THREE.Color(Math.random(), Math.random(), Math.random()),
                        shininess: Math.random() * 100
                    })
                );
                crystal.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                crystals.push(crystal);
                scene.add(crystal);
            }

            for (let i = 0; i < 100; i++) {
                let particle = new THREE.Mesh(
                    new THREE.SphereGeometry(0.1, 10, 10),
                    new THREE.MeshBasicMaterial({
                        color: new THREE.Color(Math.random(), Math.random(), Math.random())
                    })
                );
                particle.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                mist.push(particle);
                scene.add(particle);
            }

            let aura = new THREE.Mesh(
                new THREE.SphereGeometry(10, 60, 60),
                new THREE.MeshBasicMaterial({
                    color: new THREE.Color(0.5, 0.5, 1),
                    transparent: true,
                    opacity: 0.5
                })
            );
            aura.position.set(0, 0, 0);
            scene.add(aura);

            let rotX = 0;
            let rotY = 0;
            let isDragging = false;
            let startX, startY;

            document.addEventListener('mousedown', (e) => {
                isDragging = true;
                startX = e.clientX;
                startY = e.clientY;
            });

            document.addEventListener('mouseup', () => {
                isDragging = false;
            });

            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    rotX += (e.clientY - startY) * 0.01;
                    rotY += (e.clientX - startX) * 0.01;
                    startX = e.clientX;
                    startY = e.clientY;
                }
            });

            function animate() {
                requestAnimationFrame(animate);

                camera.rotation.x = rotX;
                camera.rotation.y = rotY;

                for (let i = 0; i < crystals.length; i++) {
                    crystals[i].rotation.x += 0.001;
                    crystals[i].rotation.y += 0.001;
                }

                for (let i = 0; i < mist.length; i++) {
                    mist[i].position.x += Math.random() * 0.01 - 0.005;
                    mist[i].position.y += Math.random() * 0.01 - 0.005;
                    mist[i].position.z += Math.random() * 0.01 - 0.005;
                }

                aura.scale.set(10 + Math.sin(Date.now() * 0.001) * 0.5, 10 + Math.sin(Date.now() * 0.001) * 0.5, 10 + Math.sin(Date.now() * 0.001) * 0.5);

                renderer.render(scene, camera);
            }

            animate();
        }

        init();
    </script>
</body>
</html>
