```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Realm</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="title">Mystical Underwater Realm</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, mesh, mouse = { x: 0, y: 0 }, drag = { x: 0, y: 0 }, dragStart = { x: 0, y: 0 };
        let jellyfish = [], particles = [];
        let particleGeometry, particleMaterial;
        let clock = new THREE.Clock();
        let gradientColors = [
            new THREE.Color(0x0097A7),
            new THREE.Color(0x00BFFF),
            new THREE.Color(0x00FF7F),
            new THREE.Color(0x00FFFF),
            new THREE.Color(0x007FFF),
        ];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            particleGeometry = new THREE.BufferGeometry();
            particleGeometry.setAttribute('position', new THREE.Float32BufferAttribute([], 3));
            particleMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.1,
                transparent: true,
                opacity: 0.5
            });

            let light = new THREE.PointLight(0xffffff, 1, 100);
            light.position.set(0, 0, 5);
            scene.add(light);

            let ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            let gradient = new THREE.CanvasTexture(getGradientCanvas(gradientColors));
            let planeGeometry = new THREE.PlaneGeometry(20, 20);
            let planeMaterial = new THREE.MeshBasicMaterial({
                map: gradient
            });
            let plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.position.z = -10;
            scene.add(plane);

            for (let i = 0; i < 10; i++) {
                let jellyfishGeometry = new THREE.SphereGeometry(0.5, 32, 32);
                let jellyfishMaterial = new THREE.MeshBasicMaterial({
                    color: new THREE.Color(Math.random() * 0xffffff),
                    transparent: true,
                    opacity: 0.5
                });
                let jellyfishMesh = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
                jellyfishMesh.position.x = Math.random() * 10 - 5;
                jellyfishMesh.position.y = Math.random() * 10 - 5;
                jellyfishMesh.position.z = Math.random() * 10 - 5;
                scene.add(jellyfishMesh);
                jellyfish.push(jellyfishMesh);
            }

            for (let i = 0; i < 1000; i++) {
                let particle = new THREE.Vector3(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                particles.push(particle);
            }

            particleGeometry.setAttribute('position', new THREE.Float32BufferAttribute(particles flatMap(p => [p.x, p.y, p.z]), 3));

            let particleSystem = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particleSystem);

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mouseup', onMouseUp);
        }

        function getGradientCanvas(colors) {
            let canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 1;
            let ctx = canvas.getContext('2d');
            let gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
            for (let i = 0; i < colors.length; i++) {
                gradient.addColorStop(i / (colors.length - 1), colors[i].getHexString());
            }
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            return canvas;
        }

        function onMouseMove(event) {
            mouse.x = event.clientX;
            mouse.y = event.clientY;
            if (drag.x !== 0 && drag.y !== 0) {
                camera.rotation.x += (drag.y - mouse.y) * 0.01;
                camera.rotation.y += (drag.x - mouse.x) * 0.01;
                drag.x = mouse.x;
                drag.y = mouse.y;
            }
        }

        function onMouseDown(event) {
            dragStart.x = event.clientX;
            dragStart.y = event.clientY;
            drag.x = dragStart.x;
            drag.y = dragStart.y;
        }

        function onMouseUp(event) {
            drag.x = 0;
            drag.y = 0;
        }

        function animate() {
            requestAnimationFrame(animate);
            let delta = clock.getDelta();
            for (let i = 0; i < jellyfish.length; i++) {
                jellyfish[i].rotation.x += delta;
                jellyfish[i].rotation.y += delta;
            }
            for (let i = 0; i < particles.length; i++) {
                particles[i].x += Math.random() * 0.01 - 0.005;
                particles[i].y += Math.random() * 0.01 - 0.005;
                particles[i].z += Math.random() * 0.01 - 0.005;
            }
            particleGeometry.setAttribute('position', new THREE.Float32BufferAttribute(particles flatMap(p => [p.x, p.y, p.z]), 3));
            particleGeometry.attributes.position.needsUpdate = true;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
