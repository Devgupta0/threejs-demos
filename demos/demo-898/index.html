```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Scene</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Nebula Scene</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, particles = [], particleCount = 10000;
        let mouseX = 0, mouseY = 0, mouseDrag = false;
        let rotationX = 0, rotationY = 0;
        let starfield = [];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x330033);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            let geometry = new THREE.BufferGeometry();
            let positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = Math.random() * 10 - 5;
                positions[i * 3 + 1] = Math.random() * 10 - 5;
                positions[i * 3 + 2] = Math.random() * 10 - 5;
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            let material = new THREE.PointsMaterial({
                size: 0.1,
                color: new THREE.Color(0x66ccff),
                transparent: true,
                opacity: 0.5
            });

            for (let i = 0; i < particleCount; i++) {
                let particle = new THREE.Points(geometry, material);
                particle.position.x = Math.random() * 10 - 5;
                particle.position.y = Math.random() * 10 - 5;
                particle.position.z = Math.random() * 10 - 5;
                particle.scale.set(Math.random() * 0.5 + 0.5, Math.random() * 0.5 + 0.5, Math.random() * 0.5 + 0.5);
                scene.add(particle);
                particles.push(particle);
            }

            for (let i = 0; i < 100; i++) {
                let star = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffffff }));
                star.position.x = Math.random() * 100 - 50;
                star.position.y = Math.random() * 100 - 50;
                star.position.z = Math.random() * 100 - 50;
                scene.add(star);
                starfield.push(star);
            }

            let light = new THREE.PointLight(0x66ccff, 1, 100);
            light.position.set(0, 0, 5);
            scene.add(light);

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mouseup', onMouseUp);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(event) {
            if (mouseDrag) {
                rotationX += (event.clientY - mouseY) * 0.01;
                rotationY += (event.clientX - mouseX) * 0.01;
                mouseX = event.clientX;
                mouseY = event.clientY;
                camera.rotation.x = rotationX;
                camera.rotation.y = rotationY;
            }
        }

        function onMouseDown(event) {
            mouseDrag = true;
            mouseX = event.clientX;
            mouseY = event.clientY;
        }

        function onMouseUp(event) {
            mouseDrag = false;
        }

        function animate() {
            requestAnimationFrame(animate);

            for (let i = 0; i < particles.length; i++) {
                particles[i].position.x += Math.random() * 0.01 - 0.005;
                particles[i].position.y += Math.random() * 0.01 - 0.005;
                particles[i].position.z += Math.random() * 0.01 - 0.005;
            }

            for (let i = 0; i < starfield.length; i++) {
                starfield[i].position.z -= 0.1;
                if (starfield[i].position.z < -50) {
                    starfield[i].position.z = 50;
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
