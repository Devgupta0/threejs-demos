```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotus Vortex</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Lotus Vortex</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, vortex, lake, temples, stars, mist;
        let drag = false, prevX, prevY;
        let rotX = 0, rotY = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 500;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            let vortexGeometry = new THREE.SphereGeometry(50, 32, 32);
            let vortexMaterial = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.5
            });
            vortex = new THREE.Mesh(vortexGeometry, vortexMaterial);
            scene.add(vortex);

            for (let i = 0; i < 100; i++) {
                let geometry = new THREE.SphereGeometry(10, 16, 16);
                let material = new THREE.MeshBasicMaterial({
                    color: new THREE.Color(Math.random() * 0xffffff).getHex(),
                    transparent: true,
                    opacity: 0.5
                });
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = Math.random() * 200 - 100;
                mesh.position.y = Math.random() * 200 - 100;
                mesh.position.z = Math.random() * 200 - 100;
                scene.add(mesh);
            }

            lake = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshBasicMaterial({
                color: 0x0000ff,
                transparent: true,
                opacity: 0.5
            }));
            lake.rotation.x = -Math.PI / 2;
            lake.position.y = -100;
            scene.add(lake);

            for (let i = 0; i < 10; i++) {
                let geometry = new THREE.BoxGeometry(50, 100, 50);
                let material = new THREE.MeshBasicMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.5
                });
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = Math.random() * 200 - 100;
                mesh.position.y = Math.random() * 200 - 100;
                mesh.position.z = Math.random() * 200 - 100;
                scene.add(mesh);
            }

            stars = new THREE.Mesh(new THREE.SphereGeometry(1000, 32, 32), new THREE.MeshBasicMaterial({
                color: 0xffffff,
                side: THREE.BackSide,
                transparent: true,
                opacity: 0.1
            }));
            scene.add(stars);

            mist = new THREE.Mesh(new THREE.SphereGeometry(500, 32, 32), new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.01
            }));
            scene.add(mist);

            document.addEventListener('mousedown', (event) => {
                drag = true;
                prevX = event.clientX;
                prevY = event.clientY;
            });
            document.addEventListener('mouseup', () => {
                drag = false;
            });
            document.addEventListener('mousemove', (event) => {
                if (drag) {
                    rotX += (event.clientY - prevY) * 0.01;
                    rotY += (event.clientX - prevX) * 0.01;
                    prevX = event.clientX;
                    prevY = event.clientY;
                    camera.rotation.x = rotX;
                    camera.rotation.y = rotY;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            vortex.rotation.y += 0.01;
            mist.position.x = Math.sin(Date.now() * 0.001) * 100;
            mist.position.z = Math.cos(Date.now() * 0.001) * 100;
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
