```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abandoned Underwater Research Facility</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Abandoned Underwater Research Facility</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, fish, dragStart = null, dragEnd = null;
        let dragRotate = 0;

        init();
        animate();

        function init() {
            // Set up scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            // Set up camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            // Set up renderer
            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Add some ambient light
            scene.add(new THREE.AmbientLight(0x444444));

            // Add a point light for the bioluminescent flora and fauna
            let light = new THREE.PointLight(0x88ccff, 1, 100);
            light.position.set(0, 0, 2);
            scene.add(light);

            // Create the underwater facility
            let facilityGeometry = new THREE.BoxGeometry(2, 2, 2);
            let facilityMaterial = new THREE.MeshPhongMaterial({
                color: 0x666666,
                specular: 0x444444,
                shininess: 10
            });
            let facility = new THREE.Mesh(facilityGeometry, facilityMaterial);
            facility.position.set(0, 0, 0);
            scene.add(facility);

            // Create some fish
            fish = [];
            for (let i = 0; i < 50; i++) {
                let fishGeometry = new THREE.SphereGeometry(0.1, 10, 10);
                let fishMaterial = new THREE.MeshPhongMaterial({
                    color: 0x88ccff,
                    specular: 0x444444,
                    shininess: 10
                });
                let fishMesh = new THREE.Mesh(fishGeometry, fishMaterial);
                fishMesh.position.set(Math.random() * 2 - 1, Math.random() * 2 - 1, Math.random() * 2 - 1);
                fishMesh.velocity = new THREE.Vector3(Math.random() * 0.01 - 0.005, Math.random() * 0.01 - 0.005, Math.random() * 0.01 - 0.005);
                fish.push(fishMesh);
                scene.add(fishMesh);
            }

            // Event listeners
            document.addEventListener('mousedown', (event) => {
                dragStart = new THREE.Vector2(event.clientX, event.clientY);
            });
            document.addEventListener('mousemove', (event) => {
                if (dragStart) {
                    dragEnd = new THREE.Vector2(event.clientX, event.clientY);
                    dragRotate += (dragEnd.x - dragStart.x) * 0.01;
                    camera.rotation.y += (dragEnd.x - dragStart.x) * 0.01;
                    dragStart = dragEnd;
                }
            });
            document.addEventListener('mouseup', () => {
                dragStart = null;
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            // Update fish positions
            for (let i = 0; i < fish.length; i++) {
                fish[i].position.add(fish[i].velocity);
                if (fish[i].position.x > 1 || fish[i].position.x < -1) {
                    fish[i].velocity.x *= -1;
                }
                if (fish[i].position.y > 1 || fish[i].position.y < -1) {
                    fish[i].velocity.y *= -1;
                }
                if (fish[i].position.z > 1 || fish[i].position.z < -1) {
                    fish[i].velocity.z *= -1;
                }
            }

            // Render the scene
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
