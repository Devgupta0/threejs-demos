```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Scene</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="title">Underwater Scene</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, jellyfish = [];
        let rotX = 0, rotY = 0;
        let mouseX = 0, mouseY = 0;
        let drag = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000);
            document.body.appendChild(renderer.domElement);

            let geometry = new THREE.SphereGeometry(0.2, 32, 32);
            let material = new THREE.MeshPhongMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.5
            });

            for (let i = 0; i < 20; i++) {
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = Math.random() * 2 - 1;
                mesh.position.y = Math.random() * 2 - 1;
                mesh.position.z = Math.random() * 2 - 1;
                scene.add(mesh);
                jellyfish.push(mesh);
            }

            let coralGeometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            let coralMaterial = new THREE.MeshPhongMaterial({
                color: 0xff9900
            });

            for (let i = 0; i < 10; i++) {
                let mesh = new THREE.Mesh(coralGeometry, coralMaterial);
                mesh.position.x = Math.random() * 4 - 2;
                mesh.position.y = Math.random() * 2 - 1;
                mesh.position.z = Math.random() * 2 - 1;
                scene.add(mesh);
            }

            let light = new THREE.DirectionalLight(0xffffff, 0.5);
            light.position.set(0, 0, 1);
            scene.add(light);

            let ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mouseup', onMouseUp);
        }

        function animate() {
            requestAnimationFrame(animate);

            camera.rotation.x = rotX;
            camera.rotation.y = rotY;

            for (let i = 0; i < jellyfish.length; i++) {
                let mesh = jellyfish[i];
                mesh.position.x += Math.random() * 0.01 - 0.005;
                mesh.position.y += Math.random() * 0.01 - 0.005;
                mesh.position.z += Math.random() * 0.01 - 0.005;

                if (mesh.position.x > 2 || mesh.position.x < -2) {
                    mesh.position.x = Math.random() * 2 - 1;
                }
                if (mesh.position.y > 2 || mesh.position.y < -2) {
                    mesh.position.y = Math.random() * 2 - 1;
                }
                if (mesh.position.z > 2 || mesh.position.z < -2) {
                    mesh.position.z = Math.random() * 2 - 1;
                }

                mesh.material.color.setHSL(Math.random(), 1, 0.5);
            }

            renderer.render(scene, camera);
        }

        function onMouseMove(event) {
            if (drag) {
                rotX += (event.clientY - mouseY) * 0.01;
                rotY += (event.clientX - mouseX) * 0.01;
                mouseX = event.clientX;
                mouseY = event.clientY;
            }
        }

        function onMouseDown(event) {
            drag = true;
            mouseX = event.clientX;
            mouseY = event.clientY;
        }

        function onMouseUp(event) {
            drag = false;
        }
    </script>
</body>
</html>
