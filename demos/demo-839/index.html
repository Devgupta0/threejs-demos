<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystical Forest</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="title">Mystical Forest</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, mesh, geometry, material;
        let mouseDown = false, previousMousePosition = { x: 0, y: 0 };

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            const gradientSky = new THREE.CanvasTexture(createGradientCanvas());
            const skyGeometry = new THREE.SphereGeometry(100, 60, 60);
            const skyMaterial = new THREE.MeshBasicMaterial({ map: gradientSky, side: THREE.BackSide });
            const sky = new THREE.Mesh(skyGeometry, skyMaterial);
            scene.add(sky);

            const starGeometry = new THREE.BufferGeometry();
            const starVertices = [];
            for (let i = 0; i < 1000; i++) {
                starVertices.push(Math.random() * 200 - 100, Math.random() * 200 - 100, Math.random() * 200 - 100);
            }
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            for (let i = 0; i < 10; i++) {
                const mushroomGeometry = new THREE.CylinderGeometry(1, 3, 5, 64);
                const mushroomMaterial = new THREE.MeshPhongMaterial({ color: 0xff69b4, emissive: 0xff69b4 });
                const mushroom = new THREE.Mesh(mushroomGeometry, mushroomMaterial);
                mushroom.position.x = Math.random() * 10 - 5;
                mushroom.position.z = Math.random() * 10 - 5;
                scene.add(mushroom);

                const capGeometry = new THREE.CircleGeometry(3, 64);
                const capMaterial = new THREE.MeshPhongMaterial({ color: 0xff99cc, emissive: 0xff99cc });
                const cap = new THREE.Mesh(capGeometry, capMaterial);
                cap.position.y = 2.5;
                mushroom.add(cap);
            }

            const fireflyGeometry = new THREE.BufferGeometry();
            const fireflyVertices = [];
            for (let i = 0; i < 100; i++) {
                fireflyVertices.push(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
            }
            fireflyGeometry.setAttribute('position', new THREE.Float32BufferAttribute(fireflyVertices, 3));
            const fireflyMaterial = new THREE.PointsMaterial({ color: 0xffff00, size: 0.2 });
            const fireflies = new THREE.Points(fireflyGeometry, fireflyMaterial);
            scene.add(fireflies);

            const mistGeometry = new THREE.PlaneGeometry(10, 10);
            const mistMaterial = new THREE.MeshPhongMaterial({ color: 0x66cccc, transparent: true, opacity: 0.5 });
            const mist = new THREE.Mesh(mistGeometry, mistMaterial);
            mist.position.y = -2;
            scene.add(mist);

            const ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.y = 5;
            scene.add(pointLight);

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            document.addEventListener('mousedown', (event) => {
                mouseDown = true;
                previousMousePosition = { x: event.clientX, y: event.clientY };
            });

            document.addEventListener('mouseup', () => {
                mouseDown = false;
            });

            document.addEventListener('mousemove', (event) => {
                if (mouseDown) {
                    const deltaMousePosition = { x: event.clientX - previousMousePosition.x, y: event.clientY - previousMousePosition.y };
                    camera.rotation.x += deltaMousePosition.y * 0.01;
                    camera.rotation.y += deltaMousePosition.x * 0.01;
                    previousMousePosition = { x: event.clientX, y: event.clientY };
                }
            });
        }

        function createGradientCanvas() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const context = canvas.getContext('2d');
            const gradient = context.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#ff69b4');
            gradient.addColorStop(0.5, '#66cccc');
            gradient.addColorStop(1, '#0000ff');
            context.fillStyle = gradient;
            context.fillRect(0, 0, canvas.width, canvas.height);
            return canvas;
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
