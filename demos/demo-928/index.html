```html
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Underwater Dream</title>
  <style>
    body { margin: 0; }
    #title { position: absolute; top: 10px; left: 10px; color: white; font-family: monospace; }
  </style>
</head>
<body>
  <div id="title">Underwater Dream</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    let scene, camera, renderer, jellyfish, fish, glowworms;
    let raycaster, mouse = { x: 0, y: 0 };
    let rotation = { x: 0, y: 0 };

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;

      renderer = new THREE.WebGLRenderer();
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const coralGeometry = new THREE.BoxGeometry(1, 1, 1);
      const coralMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff, specular: 0x333333, shininess: 10 });
      const coral = new THREE.Mesh(coralGeometry, coralMaterial);
      scene.add(coral);

      const reefGeometry = new THREE.PlaneGeometry(10, 10);
      const reefMaterial = new THREE.MeshPhongMaterial({ color: 0x996633, specular: 0x333333, shininess: 10 });
      const reef = new THREE.Mesh(reefGeometry, reefMaterial);
      reef.position.y = -2;
      reef.rotation.x = -Math.PI / 2;
      scene.add(reef);

      const light = new THREE.PointLight(0xffffff, 1, 10);
      light.position.set(0, 2, 0);
      scene.add(light);

      const ambientLight = new THREE.AmbientLight(0x444444);
      scene.add(ambientLight);

      jellyfish = [];
      for (let i = 0; i < 20; i++) {
        const jellyfishGeometry = new THREE.SphereGeometry(0.2, 32, 32);
        const jellyfishMaterial = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff, transparent: true, opacity: 0.5 });
        const jelly = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
        jelly.position.x = Math.random() * 4 - 2;
        jelly.position.y = Math.random() * 2 - 1;
        jelly.position.z = Math.random() * 4 - 2;
        scene.add(jelly);
        jellyfish.push(jelly);
      }

      fish = [];
      for (let i = 0; i < 50; i++) {
        const fishGeometry = new THREE.SphereGeometry(0.1, 16, 16);
        const fishMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000, specular: 0x333333, shininess: 10 });
        const fishy = new THREE.Mesh(fishGeometry, fishMaterial);
        fishy.position.x = Math.random() * 4 - 2;
        fishy.position.y = Math.random() * 2 - 1;
        fishy.position.z = Math.random() * 4 - 2;
        scene.add(fishy);
        fish.push(fishy);
      }

      glowworms = [];
      for (let i = 0; i < 100; i++) {
        const glowwormGeometry = new THREE.SphereGeometry(0.05, 8, 8);
        const glowwormMaterial = new THREE.MeshPhongMaterial({ color: 0xffff00, emissive: 0xffff00, transparent: true, opacity: 0.5 });
        const glow = new THREE.Mesh(glowwormGeometry, glowwormMaterial);
        glow.position.x = Math.random() * 4 - 2;
        glow.position.y = Math.random() * 2 - 1;
        glow.position.z = Math.random() * 4 - 2;
        scene.add(glow);
        glowworms.push(glow);
      }

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
      document.addEventListener('mousedown', onMouseDown);
    }

    function animate() {
      requestAnimationFrame(animate);
      camera.rotation.x = rotation.x;
      camera.rotation.y = rotation.y;

      for (let i = 0; i < jellyfish.length; i++) {
        jellyfish[i].position.y += 0.01;
        if (jellyfish[i].position.y > 2) {
          jellyfish[i].position.y = -2;
        }
      }

      for (let i = 0; i < fish.length; i++) {
        fish[i].position.x += 0.01;
        if (fish[i].position.x > 2) {
          fish[i].position.x = -2;
        }
      }

      for (let i = 0; i < glowworms.length; i++) {
        glowworms[i].position.z += 0.01;
        if (glowworms[i].position.z > 2) {
          glowworms[i].position.z = -2;
        }
      }

      renderer.render(scene, camera);
    }

    let isDown = false;

    function onMouseDown(event) {
      isDown = true;
      mouse.x = event.clientX;
      mouse.y = event.clientY;
    }

    function onMouseUp() {
      isDown = false;
    }

    function onMouseMove(event) {
      if (isDown) {
        rotation.x += (event.clientY - mouse.y) * 0.01;
        rotation.y += (event.clientX - mouse.x) * 0.01;
        mouse.x = event.clientX;
        mouse.y = event.clientY;
      }
    }
  </script>
</body>
</html>
