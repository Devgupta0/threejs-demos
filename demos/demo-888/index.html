```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Temple</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Mystical Underwater Temple</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, fish, lanterns, temple;
        let rotateX = 0, rotateY = 0;
        let dragStartX, dragStartY;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Temple
            temple = new THREE.Group();
            const templeGeometry = new THREE.BoxGeometry(2, 2, 2);
            const templeMaterial = new THREE.MeshPhongMaterial({ color: 0x444444 });
            for (let i = 0; i < 10; i++) {
                const templeMesh = new THREE.Mesh(templeGeometry, templeMaterial);
                templeMesh.position.x = Math.random() * 4 - 2;
                templeMesh.position.y = Math.random() * 2 - 1;
                templeMesh.position.z = Math.random() * 2 - 1;
                temple.add(templeMesh);
            }
            scene.add(temple);

            // Bioluminescent Flora
            const floraGeometry = new THREE.SphereGeometry(0.1, 16, 16);
            const floraMaterial = new THREE.MeshPhongMaterial({ color: 0x00ff00, emissive: 0x00ff00 });
            for (let i = 0; i < 100; i++) {
                const floraMesh = new THREE.Mesh(floraGeometry, floraMaterial);
                floraMesh.position.x = Math.random() * 4 - 2;
                floraMesh.position.y = Math.random() * 2 - 1;
                floraMesh.position.z = Math.random() * 2 - 1;
                scene.add(floraMesh);
            }

            // Fish
            fish = new THREE.Group();
            const fishGeometry = new THREE.SphereGeometry(0.1, 16, 16);
            const fishMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0x888888 });
            for (let i = 0; i < 50; i++) {
                const fishMesh = new THREE.Mesh(fishGeometry, fishMaterial);
                fishMesh.position.x = Math.random() * 4 - 2;
                fishMesh.position.y = Math.random() * 2 - 1;
                fishMesh.position.z = Math.random() * 2 - 1;
                fish.add(fishMesh);
            }
            scene.add(fish);

            // Lanterns
            lanterns = new THREE.Group();
            const lanternGeometry = new THREE.SphereGeometry(0.2, 16, 16);
            const lanternMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000, emissive: 0xff0000 });
            for (let i = 0; i < 10; i++) {
                const lanternMesh = new THREE.Mesh(lanternGeometry, lanternMaterial);
                lanternMesh.position.x = Math.random() * 4 - 2;
                lanternMesh.position.y = Math.random() * 2 - 1;
                lanternMesh.position.z = Math.random() * 2 - 1;
                lanterns.add(lanternMesh);
            }
            scene.add(lanterns);

            // Lights
            const ambientLight = new THREE.AmbientLight(0x222222);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1, 10);
            pointLight.position.z = 5;
            scene.add(pointLight);

            document.addEventListener('mousedown', onDocumentMouseDown, false);
            document.addEventListener('mousemove', onDocumentMouseMove, false);
            document.addEventListener('mouseup', onDocumentMouseUp, false);

            window.addEventListener('resize', onWindowResize, false);
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.rotation.x += (rotateX - camera.rotation.x) * 0.05;
            camera.rotation.y += (rotateY - camera.rotation.y) * 0.05;
            fish.position.x = Math.sin(Date.now() * 0.001) * 2;
            lanterns.position.y = Math.sin(Date.now() * 0.01) * 0.1;
            renderer.render(scene, camera);
        }

        function onDocumentMouseDown(event) {
            dragStartX = event.clientX;
            dragStartY = event.clientY;
        }

        function onDocumentMouseMove(event) {
            if (dragStartX !== undefined) {
                rotateX += (event.clientY - dragStartY) * 0.01;
                rotateY += (event.clientX - dragStartX) * 0.01;
                dragStartX = event.clientX;
                dragStartY = event.clientY;
            }
        }

        function onDocumentMouseUp() {
            dragStartX = undefined;
            dragStartY = undefined;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
