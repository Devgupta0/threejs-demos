<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bioluminescent Underwater Forest</title>
  <style>
    body {
      margin: 0;
      background-color: #000;
      overflow: hidden;
    }
    #title {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="title">Bioluminescent Underwater Forest</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    let scene, camera, renderer, controls, fish, kelp, coral, fog;
    let mouseX = 0, mouseY = 0;
    let rotX = 0, rotY = 0;

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;

      renderer = new THREE.WebGLRenderer();
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      let light = new THREE.PointLight(0x00ffff, 2, 100);
      light.position.set(0, 0, 5);
      scene.add(light);

      let ambientLight = new THREE.AmbientLight(0x444444);
      scene.add(ambientLight);

      fog = new THREE.Fog(0x000000, 1, 10);
      scene.fog = fog;

      kelp = [];
      for (let i = 0; i < 10; i++) {
        let kelpGeometry = new THREE.CylinderGeometry(0.1, 0.5, 5, 32);
        let kelpMaterial = new THREE.MeshPhongMaterial({color: 0x00ff00, transparent: true, opacity: 0.5});
        let kelpMesh = new THREE.Mesh(kelpGeometry, kelpMaterial);
        kelpMesh.position.set(Math.random() * 10 - 5, Math.random() * 5, Math.random() * 10 - 5);
        kelpMesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        scene.add(kelpMesh);
        kelp.push(kelpMesh);
      }

      coral = [];
      for (let i = 0; i < 10; i++) {
        let coralGeometry = new THREE.SphereGeometry(0.5, 32, 32);
        let coralMaterial = new THREE.MeshPhongMaterial({color: 0xff0000, transparent: true, opacity: 0.5});
        let coralMesh = new THREE.Mesh(coralGeometry, coralMaterial);
        coralMesh.position.set(Math.random() * 10 - 5, Math.random() * 5, Math.random() * 10 - 5);
        coralMesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        scene.add(coralMesh);
        coral.push(coralMesh);
      }

      fish = [];
      for (let i = 0; i < 100; i++) {
        let fishGeometry = new THREE.SphereGeometry(0.1, 16, 16);
        let fishMaterial = new THREE.MeshPhongMaterial({color: 0x0000ff, transparent: true, opacity: 0.5});
        let fishMesh = new THREE.Mesh(fishGeometry, fishMaterial);
        fishMesh.position.set(Math.random() * 10 - 5, Math.random() * 5, Math.random() * 10 - 5);
        fishMesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        scene.add(fishMesh);
        fish.push(fishMesh);
      }

      document.addEventListener('mousemove', onMouseMove);
    }

    function onMouseMove(event) {
      mouseX = event.clientX - window.innerWidth / 2;
      mouseY = event.clientY - window.innerHeight / 2;
    }

    function animate() {
      requestAnimationFrame(animate);

      rotX += mouseX * 0.001;
      rotY += mouseY * 0.001;
      camera.rotation.x = rotX;
      camera.rotation.y = rotY;

      for (let i = 0; i < kelp.length; i++) {
        kelp[i].rotation.x += 0.01;
        kelp[i].rotation.y += 0.01;
      }

      for (let i = 0; i < coral.length; i++) {
        coral[i].rotation.x += 0.01;
        coral[i].rotation.y += 0.01;
      }

      for (let i = 0; i < fish.length; i++) {
        fish[i].position.x += Math.random() * 0.1 - 0.05;
        fish[i].position.y += Math.random() * 0.1 - 0.05;
        fish[i].position.z += Math.random() * 0.1 - 0.05;
        fish[i].rotation.x += 0.01;
        fish[i].rotation.y += 0.01;
        if (fish[i].position.x > 5 || fish[i].position.x < -5 || fish[i].position.y > 5 || fish[i].position.y < -5 || fish[i].position.z > 5 || fish[i].position.z < -5) {
          fish[i].position.set(Math.random() * 10 - 5, Math.random() * 5, Math.random() * 10 - 5);
        }
      }

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
