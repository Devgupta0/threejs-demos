<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abandoned Research Facility</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Abandoned Research Facility</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, fish, jellyfish, seaweed;
        let dragStart = null;
        let rotation = { x: 0, y: 0 };

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshPhongMaterial({ color: 0xffffff });
            const cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            fish = [];
            for (let i = 0; i < 100; i++) {
                const fishGeometry = new THREE.SphereGeometry(0.1, 32, 32);
                const fishMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
                const fishMesh = new THREE.Mesh(fishGeometry, fishMaterial);
                fishMesh.position.x = Math.random() * 10 - 5;
                fishMesh.position.y = Math.random() * 10 - 5;
                fishMesh.position.z = Math.random() * 10 - 5;
                scene.add(fishMesh);
                fish.push(fishMesh);
            }

            jellyfish = [];
            for (let i = 0; i < 10; i++) {
                const jellyfishGeometry = new THREE.SphereGeometry(0.5, 32, 32);
                const jellyfishMaterial = new THREE.MeshBasicMaterial({ color: 0x0000ff });
                const jellyfishMesh = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
                jellyfishMesh.position.x = Math.random() * 10 - 5;
                jellyfishMesh.position.y = Math.random() * 10 - 5;
                jellyfishMesh.position.z = Math.random() * 10 - 5;
                scene.add(jellyfishMesh);
                jellyfish.push(jellyfishMesh);
            }

            seaweed = [];
            for (let i = 0; i < 10; i++) {
                const seaweedGeometry = new THREE.CylinderGeometry(0.1, 0.1, 5, 32);
                const seaweedMaterial = new THREE.MeshPhongMaterial({ color: 0x00ffff });
                const seaweedMesh = new THREE.Mesh(seaweedGeometry, seaweedMaterial);
                seaweedMesh.position.x = Math.random() * 10 - 5;
                seaweedMesh.position.y = Math.random() * 10 - 5;
                seaweedMesh.position.z = Math.random() * 10 - 5;
                seaweedMesh.rotation.x = Math.random() * Math.PI;
                scene.add(seaweedMesh);
                seaweed.push(seaweedMesh);
            }

            const ambientLight = new THREE.AmbientLight(0x111111);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.z = 5;
            scene.add(pointLight);

            document.addEventListener('mousedown', (event) => {
                dragStart = { x: event.clientX, y: event.clientY };
            });

            document.addEventListener('mousemove', (event) => {
                if (dragStart) {
                    rotation.x += (event.clientY - dragStart.y) * 0.01;
                    rotation.y += (event.clientX - dragStart.x) * 0.01;
                    dragStart = { x: event.clientX, y: event.clientY };
                }
            });

            document.addEventListener('mouseup', () => {
                dragStart = null;
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            camera.position.x = Math.sin(rotation.y) * 5;
            camera.position.z = Math.cos(rotation.y) * 5;
            camera.position.y = Math.sin(rotation.x) * 5;
            camera.lookAt(0, 0, 0);

            fish.forEach((fishMesh) => {
                fishMesh.position.x += Math.random() * 0.1 - 0.05;
                fishMesh.position.y += Math.random() * 0.1 - 0.05;
                fishMesh.position.z += Math.random() * 0.1 - 0.05;
            });

            jellyfish.forEach((jellyfishMesh) => {
                jellyfishMesh.position.y += Math.random() * 0.01 - 0.005;
            });

            seaweed.forEach((seaweedMesh) => {
                seaweedMesh.rotation.x += 0.01;
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
