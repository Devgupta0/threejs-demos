<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioluminescent Dreams</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 0;
            left: 0;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Bioluminescent Dreams</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, jellyfish, plants, particles;
        let dragStart = null;
        let dragEnd = null;
        let rotation = { x: 0, y: 0 };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0x888888, 1, 100);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            const jellyfishGeometry = new THREE.SphereGeometry(1, 32, 32);
            const jellyfishMaterial = new THREE.MeshBasicMaterial({
                color: 0x66ccff,
                transparent: true,
                opacity: 0.5
            });
            jellyfish = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
            scene.add(jellyfish);

            plants = [];
            for (let i = 0; i < 50; i++) {
                const plantGeometry = new THREE.SphereGeometry(0.2, 16, 16);
                const plantMaterial = new THREE.MeshBasicMaterial({
                    color: 0x00ff00,
                    transparent: true,
                    opacity: 0.2
                });
                const plant = new THREE.Mesh(plantGeometry, plantMaterial);
                plant.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                scene.add(plant);
                plants.push(plant);
            }

            particles = [];
            for (let i = 0; i < 500; i++) {
                const particleGeometry = new THREE.SphereGeometry(0.01, 8, 8);
                const particleMaterial = new THREE.MeshBasicMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.5
                });
                const particle = new THREE.Mesh(particleGeometry, particleMaterial);
                particle.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                scene.add(particle);
                particles.push(particle);
            }

            camera.position.z = 10;

            document.addEventListener('mousedown', (event) => {
                dragStart = { x: event.clientX, y: event.clientY };
            });
            document.addEventListener('mousemove', (event) => {
                if (dragStart) {
                    dragEnd = { x: event.clientX, y: event.clientY };
                    rotation.x += (dragEnd.y - dragStart.y) * 0.01;
                    rotation.y += (dragEnd.x - dragStart.x) * 0.01;
                    dragStart = dragEnd;
                }
            });
            document.addEventListener('mouseup', () => {
                dragStart = null;
                dragEnd = null;
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            jellyfish.position.y += 0.01;
            if (jellyfish.position.y > 5) {
                jellyfish.position.y = -5;
            }

            for (let i = 0; i < plants.length; i++) {
                plants[i].scale.set(1 + Math.sin(Date.now() * 0.001 + i * 0.1) * 0.1, 1 + Math.sin(Date.now() * 0.001 + i * 0.1) * 0.1, 1 + Math.sin(Date.now() * 0.001 + i * 0.1) * 0.1);
            }

            for (let i = 0; i < particles.length; i++) {
                particles[i].position.x += Math.random() * 0.01 - 0.005;
                particles[i].position.y += Math.random() * 0.01 - 0.005;
                particles[i].position.z += Math.random() * 0.01 - 0.005;
                if (particles[i].position.x > 5 || particles[i].position.x < -5 || particles[i].position.y > 5 || particles[i].position.y < -5 || particles[i].position.z > 5 || particles[i].position.z < -5) {
                    particles[i].position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                }
            }

            camera.rotation.x = rotation.x;
            camera.rotation.y = rotation.y;

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
