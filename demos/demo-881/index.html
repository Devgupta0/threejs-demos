<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abandoned Research Facility</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: monospace;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="title">Abandoned Research Facility</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, fish, jellyfish, fog;
        let rotX = 0, rotY = 0;
        let mouseDown = false, mousePos = { x: 0, y: 0 };

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Pillars
            let pillarGeometry = new THREE.BoxGeometry(0.5, 2, 0.5);
            let pillarMaterial = new THREE.MeshPhongMaterial({ color: 0x444444 });
            for (let i = -2; i <= 2; i++) {
                for (let j = -2; j <= 2; j++) {
                    let pillar = new THREE.Mesh(pillarGeometry, pillarMaterial);
                    pillar.position.x = i * 1.5;
                    pillar.position.z = j * 1.5;
                    scene.add(pillar);
                }
            }

            // Dome
            let domeGeometry = new THREE.SphereGeometry(2, 32, 32);
            let domeMaterial = new THREE.MeshPhongMaterial({ color: 0x444444 });
            let dome = new THREE.Mesh(domeGeometry, domeMaterial);
            dome.position.y = -2;
            scene.add(dome);

            // Fish
            fish = [];
            let fishGeometry = new THREE.SphereGeometry(0.1, 16, 16);
            let fishMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            for (let i = 0; i < 100; i++) {
                let fishMesh = new THREE.Mesh(fishGeometry, fishMaterial);
                fishMesh.position.x = Math.random() * 4 - 2;
                fishMesh.position.y = Math.random() * 4 - 2;
                fishMesh.position.z = Math.random() * 4 - 2;
                fishMesh.velocity = { x: Math.random() * 0.1 - 0.05, y: Math.random() * 0.1 - 0.05, z: Math.random() * 0.1 - 0.05 };
                fish.push(fishMesh);
                scene.add(fishMesh);
            }

            // Jellyfish
            jellyfish = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            jellyfish.position.y = 2;
            scene.add(jellyfish);

            // Fog
            fog = new THREE.Mesh(new THREE.SphereGeometry(3, 32, 32), new THREE.MeshBasicMaterial({ color: 0x00cccc, transparent: true, opacity: 0.5 }));
            fog.position.y = 2;
            scene.add(fog);

            // Lights
            let ambientLight = new THREE.AmbientLight(0x111111);
            scene.add(ambientLight);

            let pointLight = new THREE.PointLight(0xffffff, 1, 10);
            pointLight.position.y = 2;
            scene.add(pointLight);

            document.addEventListener('mousedown', (event) => {
                mouseDown = true;
                mousePos = { x: event.clientX, y: event.clientY };
            });

            document.addEventListener('mousemove', (event) => {
                if (mouseDown) {
                    rotX += (event.clientY - mousePos.y) * 0.01;
                    rotY += (event.clientX - mousePos.x) * 0.01;
                    mousePos = { x: event.clientX, y: event.clientY };
                }
            });

            document.addEventListener('mouseup', () => {
                mouseDown = false;
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            camera.rotation.x = rotX;
            camera.rotation.y = rotY;

            for (let i = 0; i < fish.length; i++) {
                fish[i].position.x += fish[i].velocity.x;
                fish[i].position.y += fish[i].velocity.y;
                fish[i].position.z += fish[i].velocity.z;

                if (fish[i].position.x > 2 || fish[i].position.x < -2) {
                    fish[i].velocity.x *= -1;
                }
                if (fish[i].position.y > 2 || fish[i].position.y < -2) {
                    fish[i].velocity.y *= -1;
                }
                if (fish[i].position.z > 2 || fish[i].position.z < -2) {
                    fish[i].velocity.z *= -1;
                }
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
