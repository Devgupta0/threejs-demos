<!DOCTYPE html>
<html>
<head>
  <title>Mesmerizing Dreamscape</title>
  <style>
    body { margin: 0; }
    #title { position: absolute; top: 10px; left: 10px; color: white; font-family: monospace; }
  </style>
</head>
<body>
  <div id="title">Dreamscape</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Scene, camera, and renderer
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;
    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Jellyfish
    const jellyfishGeometry = new THREE.SphereGeometry(2, 32, 32);
    const jellyfishMaterial = new THREE.MeshPhongMaterial({ color: 0x66CCCC, transparent: true, opacity: 0.5 });
    const jellyfish = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
    scene.add(jellyfish);

    // Fish
    const fishGeometry = new THREE.SphereGeometry(0.1, 16, 16);
    const fishMaterial = new THREE.MeshBasicMaterial({ color: 0xFFFFFF });
    const fish = [];
    for (let i = 0; i < 100; i++) {
      const fishMesh = new THREE.Mesh(fishGeometry, fishMaterial);
      fishMesh.position.x = Math.random() * 4 - 2;
      fishMesh.position.y = Math.random() * 4 - 2;
      fishMesh.position.z = Math.random() * 4 - 2;
      scene.add(fishMesh);
      fish.push(fishMesh);
    }

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x444444);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0xFFFFFF, 1, 10);
    pointLight.position.z = 5;
    scene.add(pointLight);

    // Mouse drag rotation
    let isDragging = false;
    let previousMousePosition = null;
    document.addEventListener('mousedown', (event) => {
      isDragging = true;
      previousMousePosition = { x: event.clientX, y: event.clientY };
    });
    document.addEventListener('mouseup', () => {
      isDragging = false;
      previousMousePosition = null;
    });
    document.addEventListener('mousemove', (event) => {
      if (isDragging) {
        const deltaMousePosition = { x: event.clientX - previousMousePosition.x, y: event.clientY - previousMousePosition.y };
        camera.rotation.x += deltaMousePosition.y * 0.01;
        camera.rotation.y += deltaMousePosition.x * 0.01;
        previousMousePosition = { x: event.clientX, y: event.clientY };
      }
    });

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      jellyfish.position.z += 0.01;
      if (jellyfish.position.z > 10) {
        jellyfish.position.z = -10;
      }
      for (let i = 0; i < fish.length; i++) {
        fish[i].position.x += Math.random() * 0.01 - 0.005;
        fish[i].position.y += Math.random() * 0.01 - 0.005;
        fish[i].position.z += Math.random() * 0.01 - 0.005;
      }
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
