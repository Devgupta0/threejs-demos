```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamlike Underwater Scene</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #scene-title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div id="scene-title">Dreamlike Underwater Scene</div>
    <canvas id="canvas" width="100vw" height="100vh"></canvas>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let camera, scene, renderer, jellyfish, seaweed, creatures;
        let dragging = false;
        let previousMousePosition = {
            x: 0,
            y: 0
        };

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);
            camera.position.z = 5;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            const ambientLight = new THREE.AmbientLight(0x444444, 0.1);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            jellyfish = new THREE.Mesh(
                new THREE.SphereGeometry(1, 32, 32),
                new THREE.MeshBasicMaterial({ color: 0x55ffff, transparent: true, opacity: 0.5 })
            );
            jellyfish.position.set(0, 0, 0);
            scene.add(jellyfish);

            seaweed = [];
            for (let i = 0; i < 10; i++) {
                const geometry = new THREE.PlaneGeometry(1, 5);
                const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.2 });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                seaweed.push(mesh);
                scene.add(mesh);
            }

            creatures = [];
            for (let i = 0; i < 50; i++) {
                const geometry = new THREE.SphereGeometry(0.1, 16, 16);
                const material = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                creatures.push(mesh);
                scene.add(mesh);
            }

            renderer = new THREE.WebGLRenderer({
                canvas: document.getElementById('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);

            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mouseup', onMouseUp);
            document.addEventListener('mousemove', onMouseMove);
        }

        function animate() {
            requestAnimationFrame(animate);

            jellyfish.position.y += 0.01;
            if (jellyfish.position.y > 5) {
                jellyfish.position.y = -5;
            }

            seaweed.forEach((mesh) => {
                mesh.position.y += 0.001;
                if (mesh.position.y > 5) {
                    mesh.position.y = -5;
                }
            });

            creatures.forEach((mesh) => {
                mesh.position.x += 0.01;
                if (mesh.position.x > 5) {
                    mesh.position.x = -5;
                }
            });

            renderer.render(scene, camera);
        }

        function onMouseDown(event) {
            dragging = true;
            previousMousePosition = {
                x: event.clientX,
                y: event.clientY
            };
        }

        function onMouseUp() {
            dragging = false;
        }

        function onMouseMove(event) {
            if (dragging) {
                const deltaMousePosition = {
                    x: event.clientX - previousMousePosition.x,
                    y: event.clientY - previousMousePosition.y
                };
                camera.rotation.x += deltaMousePosition.y * 0.01;
                camera.rotation.y += deltaMousePosition.x * 0.01;
                previousMousePosition = {
                    x: event.clientX,
                    y: event.clientY
                };
            }
        }
    </script>
</body>
</html>
