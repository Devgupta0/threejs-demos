```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Scene</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Galaxy Scene</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, title;
        let asteroids = [], cometLikeParticles = [];
        let rotX = 0, rotY = 0;
        let drag = false;
        let startX, startY;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const sun = new THREE.Mesh(
                new THREE.SphereGeometry(1, 32, 32),
                new THREE.MeshBasicMaterial({
                    color: 0xffff00
                })
            );
            sun.position.z = -5;
            scene.add(sun);

            const planet = new THREE.Mesh(
                new THREE.SphereGeometry(2, 32, 32),
                new THREE.MeshPhongMaterial({
                    color: 0xffffff,
                    specular: 0x777777,
                    shininess: 100
                })
            );
            planet.position.z = -10;
            scene.add(planet);

            const light = new THREE.PointLight(0x777777, 1, 100);
            light.position.z = -5;
            scene.add(light);

            for (let i = 0; i < 1000; i++) {
                const asteroid = new THREE.Mesh(
                    new THREE.SphereGeometry(Math.random() * 0.1, 16, 16),
                    new THREE.MeshBasicMaterial({
                        color: new THREE.Color(Math.random(), Math.random(), Math.random())
                    })
                );
                asteroid.position.x = Math.random() * 10 - 5;
                asteroid.position.y = Math.random() * 10 - 5;
                asteroid.position.z = Math.random() * 10 - 5;
                asteroids.push(asteroid);
                scene.add(asteroid);
            }

            for (let i = 0; i < 100; i++) {
                const cometLikeParticle = new THREE.Mesh(
                    new THREE.SphereGeometry(Math.random() * 0.05, 8, 8),
                    new THREE.MeshBasicMaterial({
                        color: new THREE.Color(Math.random(), Math.random(), Math.random())
                    })
                );
                cometLikeParticle.position.x = Math.random() * 10 - 5;
                cometLikeParticle.position.y = Math.random() * 10 - 5;
                cometLikeParticle.position.z = Math.random() * 10 - 5;
                cometLikeParticles.push(cometLikeParticle);
                scene.add(cometLikeParticle);
            }

            document.addEventListener('mousedown', (e) => {
                drag = true;
                startX = e.clientX;
                startY = e.clientY;
            });
            document.addEventListener('mouseup', () => {
                drag = false;
            });
            document.addEventListener('mousemove', (e) => {
                if (drag) {
                    rotX += (e.clientY - startY) * 0.01;
                    rotY += (e.clientX - startX) * 0.01;
                    startX = e.clientX;
                    startY = e.clientY;
                }
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            camera.rotation.x = rotX;
            camera.rotation.y = rotY;

            asteroids.forEach((asteroid) => {
                asteroid.position.x += Math.random() * 0.01 - 0.005;
                asteroid.position.y += Math.random() * 0.01 - 0.005;
                asteroid.position.z += Math.random() * 0.01 - 0.005;
            });

            cometLikeParticles.forEach((cometLikeParticle) => {
                cometLikeParticle.position.x += Math.random() * 0.05 - 0.025;
                cometLikeParticle.position.y += Math.random() * 0.05 - 0.025;
                cometLikeParticle.position.z += Math.random() * 0.05 - 0.025;
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
