<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Underwater Scene</title>
  <style>
    body { margin: 0; }
    #title { position: absolute; top: 10px; left: 10px; font-family: monospace; color: white; }
  </style>
</head>
<body>
  <div id="title">Underwater Odyssey</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    let scene, camera, renderer, coralReef, submarine, fish, seaweed;
    let mouseDown = false, prevMouse = { x: 0, y: 0 };
    let rotation = { x: 0, y: 0 };

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;

      renderer = new THREE.WebGLRenderer();
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const ambientLight = new THREE.AmbientLight(0x0000ff, 0.5);
      scene.add(ambientLight);

      const pointLight = new THREE.PointLight(0xffffff, 1, 100);
      pointLight.position.set(0, 0, 5);
      scene.add(pointLight);

      coralReef = new THREE.Group();
      for (let i = 0; i < 100; i++) {
        const geometry = new THREE.SphereGeometry(Math.random() * 0.5 + 0.1, 16, 16);
        const material = new THREE.MeshPhongMaterial({ color: 0xff69b4, transparent: true, opacity: 0.5 });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(Math.random() * 10 - 5, Math.random() * 5 - 2.5, Math.random() * 5 - 2.5);
        coralReef.add(mesh);
      }
      scene.add(coralReef);

      submarine = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 16), new THREE.MeshPhongMaterial({ color: 0x6495ed }));
      submarine.position.set(0, -5, -10);
      scene.add(submarine);

      fish = new THREE.Group();
      for (let i = 0; i < 50; i++) {
        const geometry = new THREE.SphereGeometry(0.1, 16, 16);
        const material = new THREE.MeshPhongMaterial({ color: 0x00ffff, transparent: true, opacity: 0.5 });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(Math.random() * 10 - 5, Math.random() * 5 - 2.5, Math.random() * 5 - 2.5);
        fish.add(mesh);
      }
      scene.add(fish);

      seaweed = new THREE.Group();
      for (let i = 0; i < 20; i++) {
        const geometry = new THREE.PlaneGeometry(0.5, 2);
        const material = new THREE.MeshPhongMaterial({ color: 0x00ff00, transparent: true, opacity: 0.5 });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(Math.random() * 10 - 5, Math.random() * 5 - 2.5, Math.random() * 5 - 2.5);
        mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        seaweed.add(mesh);
      }
      scene.add(seaweed);

      document.addEventListener('mousedown', (event) => {
        mouseDown = true;
        prevMouse = { x: event.clientX, y: event.clientY };
      });

      document.addEventListener('mousemove', (event) => {
        if (mouseDown) {
          rotation.x += (event.clientY - prevMouse.y) * 0.01;
          rotation.y += (event.clientX - prevMouse.x) * 0.01;
          prevMouse = { x: event.clientX, y: event.clientY };
        }
      });

      document.addEventListener('mouseup', () => {
        mouseDown = false;
      });
    }

    function animate() {
      requestAnimationFrame(animate);

      coralReef.rotation.x += 0.001;
      coralReef.rotation.y += 0.001;

      fish.rotation.x += 0.01;
      fish.rotation.y += 0.01;

      seaweed.rotation.x += 0.001;
      seaweed.rotation.y += 0.001;

      submarine.position.z += 0.01;
      if (submarine.position.z > 10) {
        submarine.position.z = -10;
      }

      camera.rotation.x = rotation.x;
      camera.rotation.y = rotation.y;

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
