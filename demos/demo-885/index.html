```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Underwater Metropolis</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 0;
            left: 0;
            color: #fff;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="title">Futuristic Underwater Metropolis</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let camera, scene, renderer, fish, skyscrapers;
        let mouseDown = false, mouseX, mouseY, rotX = 0, rotY = 0;

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 500;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            const ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1, 1000);
            pointLight.position.set(0, 0, 200);
            scene.add(pointLight);

            const waveGeometry = new THREE.PlaneGeometry(1000, 1000, 50, 50);
            const waveMaterial = new THREE.MeshPhongMaterial({
                color: 0x4444ff,
                transparent: true,
                opacity: 0.5,
                side: THREE.DoubleSide
            });
            const wave = new THREE.Mesh(waveGeometry, waveMaterial);
            wave.rotation.x = Math.PI / 2;
            wave.position.y = -200;
            scene.add(wave);

            const fishGeometry = new THREE.SphereGeometry(10, 16, 16);
            const fishMaterial = new THREE.MeshPhongMaterial({
                color: 0x44ff44,
                transparent: true,
                opacity: 0.5
            });
            fish = [];
            for (let i = 0; i < 50; i++) {
                const fishMesh = new THREE.Mesh(fishGeometry, fishMaterial);
                fishMesh.position.x = Math.random() * 200 - 100;
                fishMesh.position.y = Math.random() * 200 - 100;
                fishMesh.position.z = Math.random() * 200 - 100;
                scene.add(fishMesh);
                fish.push(fishMesh);
            }

            const skyscraperGeometry = new THREE.BoxGeometry(50, 200, 50);
            const skyscraperMaterial = new THREE.MeshPhongMaterial({
                color: 0xff4444,
                transparent: true,
                opacity: 0.5
            });
            skyscrapers = [];
            for (let i = 0; i < 10; i++) {
                const skyscraperMesh = new THREE.Mesh(skyscraperGeometry, skyscraperMaterial);
                skyscraperMesh.position.x = Math.random() * 200 - 100;
                skyscraperMesh.position.y = -150;
                skyscraperMesh.position.z = Math.random() * 200 - 100;
                scene.add(skyscraperMesh);
                skyscrapers.push(skyscraperMesh);
            }

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }

        function animate() {
            requestAnimationFrame(animate);

            const wave = scene.children[2];
            wave.position.y = -200 + Math.sin(Date.now() * 0.001) * 20;

            for (let i = 0; i < fish.length; i++) {
                const fishMesh = fish[i];
                fishMesh.position.x += Math.random() * 2 - 1;
                fishMesh.position.y += Math.random() * 2 - 1;
                fishMesh.position.z += Math.random() * 2 - 1;
            }

            for (let i = 0; i < skyscrapers.length; i++) {
                const skyscraperMesh = skyscrapers[i];
                skyscraperMesh.rotation.y += 0.01;
            }

            camera.rotation.x = rotX;
            camera.rotation.y = rotY;

            renderer.render(scene, camera);
        }

        function onMouseDown(event) {
            mouseDown = true;
            mouseX = event.clientX;
            mouseY = event.clientY;
        }

        function onMouseMove(event) {
            if (mouseDown) {
                rotX += (event.clientY - mouseY) * 0.01;
                rotY += (event.clientX - mouseX) * 0.01;
                mouseX = event.clientX;
                mouseY = event.clientY;
            }
        }

        function onMouseUp() {
            mouseDown = false;
        }
    </script>
</body>
</html>
