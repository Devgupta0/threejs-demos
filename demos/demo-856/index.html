```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Scene</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: monospace;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="title">Galaxy Scene</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, stars = [], planets = [], nebulae = [];
        let mouseDown = false, previousMousePosition = { x: 0, y: 0 };
        let rotationX = 0, rotationY = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            let gradientBackground = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100),
                new THREE.ShaderMaterial({
                    uniforms: {
                        time: { value: 0 }
                    },
                    vertexShader: `
                        varying vec2 vUv;
                        void main() {
                            vUv = uv;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform float time;
                        varying vec2 vUv;
                        void main() {
                            vec3 c1 = vec3(0.5, 0.2, 0.7);
                            vec3 c2 = vec3(0.8, 0.5, 0.9);
                            gl_FragColor = vec4(mix(c1, c2, vUv.y + sin(time * 0.01)), 1.0);
                        }
                    `
                })
            );
            gradientBackground.position.z = -10;
            scene.add(gradientBackground);

            let aurora = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100),
                new THREE.ShaderMaterial({
                    uniforms: {
                        time: { value: 0 }
                    },
                    vertexShader: `
                        varying vec2 vUv;
                        void main() {
                            vUv = uv;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: `
                        uniform float time;
                        varying vec2 vUv;
                        void main() {
                            vec3 c = vec3(sin(time * 0.01 + vUv.x * 10.0), sin(time * 0.01 + vUv.y * 10.0), sin(time * 0.01 + (vUv.x + vUv.y) * 10.0));
                            gl_FragColor = vec4(c * 0.5 + 0.5, 0.5);
                        }
                    `,
                    transparent: true,
                    opacity: 0.5
                })
            );
            aurora.position.z = -9;
            scene.add(aurora);

            for (let i = 0; i < 1000; i++) {
                let star = new THREE.Mesh(
                    new THREE.SphereGeometry(0.1, 10, 10),
                    new THREE.MeshBasicMaterial({ color: 0xffffff })
                );
                star.position.x = Math.random() * 10 - 5;
                star.position.y = Math.random() * 10 - 5;
                star.position.z = Math.random() * 10 - 5;
                scene.add(star);
                stars.push(star);
            }

            for (let i = 0; i < 10; i++) {
                let planet = new THREE.Mesh(
                    new THREE.SphereGeometry(0.5, 30, 30),
                    new THREE.MeshPhongMaterial({ color: 0xff0000, specular: 0xffffff, shininess: 100 })
                );
                planet.position.x = Math.random() * 5 - 2.5;
                planet.position.y = Math.random() * 5 - 2.5;
                planet.position.z = Math.random() * 5 - 2.5;
                scene.add(planet);
                planets.push(planet);
            }

            for (let i = 0; i < 100; i++) {
                let nebula = new THREE.Mesh(
                    new THREE.SphereGeometry(0.5, 30, 30),
                    new THREE.MeshBasicMaterial({ color: Math.random() * 0xffffff })
                );
                nebula.position.x = Math.random() * 10 - 5;
                nebula.position.y = Math.random() * 10 - 5;
                nebula.position.z = Math.random() * 10 - 5;
                scene.add(nebula);
                nebulae.push(nebula);
            }

            let ambientLight = new THREE.AmbientLight(0x333333);
            scene.add(ambientLight);

            let pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.z = 5;
            scene.add(pointLight);

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseDown(event) {
            mouseDown = true;
            previousMousePosition.x = event.clientX;
            previousMousePosition.y = event.clientY;
        }

        function onMouseMove(event) {
            if (mouseDown) {
                rotationX += (event.clientY - previousMousePosition.y) * 0.01;
                rotationY += (event.clientX - previousMousePosition.x) * 0.01;
                previousMousePosition.x = event.clientX;
                previousMousePosition.y = event.clientY;
            }
        }

        function onMouseUp() {
            mouseDown = false;
        }

        function animate() {
            requestAnimationFrame(animate);

            camera.rotation.x = rotationX;
            camera.rotation.y = rotationY;

            for (let i = 0; i < stars.length; i++) {
                stars[i].rotation.x += 0.01;
                stars[i].rotation.y += 0.01;
            }

            for (let i = 0; i < planets.length; i++) {
                planets[i].rotation.x += 0.01;
                planets[i].rotation.y += 0.01;
            }

            for (let i = 0; i < nebulae.length; i++) {
                nebulae[i].rotation.x += 0.01;
                nebulae[i].rotation.y += 0.01;
            }

            let gradientBackground = scene.children[0].material;
            gradientBackground.uniforms.time.value += 0.01;

            let aurora = scene.children[1].material;
            aurora.uniforms.time.value += 0.01;

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
