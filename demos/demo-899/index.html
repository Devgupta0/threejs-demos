```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Abyss</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
        }
    </style>
</head>
<body>
    <div id="title">Underwater Abyss</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, jellyfish, creatures = [];
        let rotateX = 0, rotateY = 0;
        let mouseDown = false, mouseX = 0, mouseY = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0x111111);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            const geometry = new THREE.SphereGeometry(1, 64, 64);
            const material = new THREE.MeshBasicMaterial({ color: 0x4444ff });
            jellyfish = new THREE.Mesh(geometry, material);
            jellyfish.position.set(0, 0, 0);
            scene.add(jellyfish);

            for (let i = 0; i < 100; i++) {
                const geometry = new THREE.SphereGeometry(0.1, 16, 16);
                const material = new THREE.MeshBasicMaterial({ color: Math.random() * 0xffffff });
                const creature = new THREE.Mesh(geometry, material);
                creature.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                creatures.push(creature);
                scene.add(creature);
            }

            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousedown', onMouseDown);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseDown(event) {
            mouseDown = true;
            mouseX = event.clientX;
            mouseY = event.clientY;
        }

        function onMouseMove(event) {
            if (mouseDown) {
                rotateX += (event.clientY - mouseY) * 0.01;
                rotateY += (event.clientX - mouseX) * 0.01;
                mouseX = event.clientX;
                mouseY = event.clientY;
            }
        }

        function onMouseUp() {
            mouseDown = false;
        }

        function animate() {
            requestAnimationFrame(animate);

            jellyfish.scale.set(1 + Math.sin(Date.now() * 0.001) * 0.1, 1 + Math.sin(Date.now() * 0.001) * 0.1, 1 + Math.sin(Date.now() * 0.001) * 0.1);
            jellyfish.material.color.setHSL(Math.sin(Date.now() * 0.001) * 0.5 + 0.5, 1, 0.5);

            for (let i = 0; i < creatures.length; i++) {
                creatures[i].position.set(
                    creatures[i].position.x + Math.random() * 0.01 - 0.005,
                    creatures[i].position.y + Math.random() * 0.01 - 0.005,
                    creatures[i].position.z + Math.random() * 0.01 - 0.005
                );
                creatures[i].material.color.setHSL(Math.sin(Date.now() * 0.001 + i) * 0.5 + 0.5, 1, 0.5);
            }

            camera.rotation.set(rotateX, rotateY, 0);

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
