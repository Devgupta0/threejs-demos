<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abandoned Underwater Research Facility</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Abandoned Underwater Research Facility</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, fish, jellyfish, controls;
        let dragStart = null;
        let dragged = false;
        let rotateStart = null;
        let rotation = {
            x: 0,
            y: 0
        };

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000);
            document.body.appendChild(renderer.domElement);

            let fog = new THREE.FogExp2(0x2c3e50, 0.01);
            scene.fog = fog;

            let ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            let pointLight = new THREE.PointLight(0xffffff, 1, 100);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            let geometry = new THREE.BoxGeometry(1, 1, 1);
            let material = new THREE.MeshPhongMaterial({ color: 0x444444 });
            for (let i = 0; i < 10; i++) {
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                scene.add(mesh);
            }

            fish = [];
            for (let i = 0; i < 100; i++) {
                geometry = new THREE.SphereGeometry(0.1, 16, 16);
                material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                fish.push(mesh);
                scene.add(mesh);
            }

            jellyfish = [];
            for (let i = 0; i < 10; i++) {
                geometry = new THREE.SphereGeometry(0.5, 16, 16);
                material = new THREE.MeshBasicMaterial({ color: 0xff00ff });
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(Math.random() * 10 - 5, Math.random() * 10 - 5, Math.random() * 10 - 5);
                jellyfish.push(mesh);
                scene.add(mesh);
            }

            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
            window.addEventListener('resize', onWindowResize);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (dragged) {
                rotation.x += (dragStart.x - event.clientX) * 0.01;
                rotation.y += (dragStart.y - event.clientY) * 0.01;
                dragStart = {
                    x: event.clientX,
                    y: event.clientY
                };
            }
            camera.rotation.x = rotation.x;
            camera.rotation.y = rotation.y;

            for (let i = 0; i < fish.length; i++) {
                fish[i].position.x += Math.random() * 0.01 - 0.005;
                fish[i].position.y += Math.random() * 0.01 - 0.005;
                fish[i].position.z += Math.random() * 0.01 - 0.005;
            }

            for (let i = 0; i < jellyfish.length; i++) {
                jellyfish[i].position.x += Math.random() * 0.001 - 0.0005;
                jellyfish[i].position.y += Math.random() * 0.001 - 0.0005;
                jellyfish[i].position.z += Math.random() * 0.001 - 0.0005;
            }

            renderer.render(scene, camera);
        }

        function onMouseDown(event) {
            dragStart = {
                x: event.clientX,
                y: event.clientY
            };
            dragged = true;
        }

        function onMouseMove(event) {
        }

        function onMouseUp(event) {
            dragged = false;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
