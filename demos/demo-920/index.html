```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Metropolis</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="title">Underwater Metropolis</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, mesh, fish, waves, dragStart = null, dragEnd = null;
        let canvas = document.createElement('canvas');
        document.body.appendChild(canvas);
        canvas.style.width = '100vw';
        canvas.style.height = '100vh';

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x03055b);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 500;

            renderer = new THREE.WebGLRenderer({
                canvas: canvas,
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);

            // Add stardust
            for (let i = 0; i < 1000; i++) {
                let geometry = new THREE.SphereGeometry(1, 10, 10);
                let material = new THREE.MeshBasicMaterial({color: 0xffffff, opacity: 0.5, transparent: true});
                let stardust = new THREE.Mesh(geometry, material);
                stardust.position.x = Math.random() * 2000 - 1000;
                stardust.position.y = Math.random() * 2000 - 1000;
                stardust.position.z = Math.random() * 2000 - 1000;
                scene.add(stardust);
            }

            // Add skyscrapers
            for (let i = 0; i < 10; i++) {
                let geometry = new THREE.SphereGeometry(50, 30, 30);
                let material = new THREE.MeshLambertMaterial({color: 0x66ccff, emissive: 0x22ccff, transparent: true, opacity: 0.5});
                let skyscraper = new THREE.Mesh(geometry, material);
                skyscraper.position.x = Math.random() * 200 - 100;
                skyscraper.position.y = Math.random() * 200 - 100;
                skyscraper.position.z = Math.random() * 200 - 100;
                scene.add(skyscraper);
            }

            // Add fish
            fish = [];
            for (let i = 0; i < 100; i++) {
                let geometry = new THREE.SphereGeometry(5, 10, 10);
                let material = new THREE.MeshLambertMaterial({color: 0xffffff, emissive: 0x22ccff, transparent: true, opacity: 0.5});
                let fishMesh = new THREE.Mesh(geometry, material);
                fishMesh.position.x = Math.random() * 200 - 100;
                fishMesh.position.y = Math.random() * 200 - 100;
                fishMesh.position.z = Math.random() * 200 - 100;
                fishMesh.velocity = new THREE.Vector3(Math.random() * 2 - 1, Math.random() * 2 - 1, Math.random() * 2 - 1);
                scene.add(fishMesh);
                fish.push(fishMesh);
            }

            // Add waves
            waves = [];
            for (let i = 0; i < 10; i++) {
                let geometry = new THREE.PlaneGeometry(100, 100, 10, 10);
                let material = new THREE.MeshLambertMaterial({color: 0x22ccff, transparent: true, opacity: 0.5});
                let wave = new THREE.Mesh(geometry, material);
                wave.position.x = Math.random() * 200 - 100;
                wave.position.y = Math.random() * 200 - 100;
                wave.position.z = Math.random() * 200 - 100;
                wave.velocity = new THREE.Vector3(Math.random() * 2 - 1, Math.random() * 2 - 1, Math.random() * 2 - 1);
                scene.add(wave);
                waves.push(wave);
            }

            // Add light
            let light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(0, 0, 1000);
            scene.add(light);

            // Add ambient light
            let ambientLight = new THREE.AmbientLight(0x444444);
            scene.add(ambientLight);

            // Event listeners
            document.addEventListener('mousedown', (e) => {
                dragStart = new THREE.Vector2(e.clientX, e.clientY);
            });
            document.addEventListener('mousemove', (e) => {
                if (dragStart) {
                    dragEnd = new THREE.Vector2(e.clientX, e.clientY);
                    camera.rotation.x += (dragEnd.y - dragStart.y) * 0.01;
                    camera.rotation.y += (dragEnd.x - dragStart.x) * 0.01;
                    dragStart = dragEnd;
                }
            });
            document.addEventListener('mouseup', () => {
                dragStart = null;
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            // Update fish
            for (let i = 0; i < fish.length; i++) {
                fish[i].position.add(fish[i].velocity);
                if (fish[i].position.x > 100 || fish[i].position.x < -100) {
                    fish[i].velocity.x *= -1;
                }
                if (fish[i].position.y > 100 || fish[i].position.y < -100) {
                    fish[i].velocity.y *= -1;
                }
                if (fish[i].position.z > 100 || fish[i].position.z < -100) {
                    fish[i].velocity.z *= -1;
                }
            }

            // Update waves
            for (let i = 0; i < waves.length; i++) {
                waves[i].position.add(waves[i].velocity);
                if (waves[i].position.x > 100 || waves[i].position.x < -100) {
                    waves[i].velocity.x *= -1;
                }
                if (waves[i].position.y > 100 || waves[i].position.y < -100) {
                    waves[i].velocity.y *= -1;
                }
                if (waves[i].position.z > 100 || waves[i].position.z < -100) {
                    waves[i].velocity.z *= -1;
                }
            }

            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
```
