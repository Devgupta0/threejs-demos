```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Temple</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Underwater Temple</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, fish, jellyfish, pillars, mist;
        let raycaster, mouse = { x: 0, y: 0 }, drag = { x: 0, y: 0 };
        let dragStart = { x: 0, y: 0 };
        let isDragging = false;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Create mist
            mist = new THREE.Mesh(new THREE.SphereGeometry(100, 64, 64), new THREE.MeshBasicMaterial({
                color: 0x4455ff,
                transparent: true,
                opacity: 0.5
            }));
            mist.scale.set(1, 1, 1);
            scene.add(mist);

            // Create pillars
            pillars = [];
            for (let i = 0; i < 10; i++) {
                let pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 2, 64), new THREE.MeshBasicMaterial({
                    color: 0x999999
                }));
                pillar.position.set(Math.random() * 4 - 2, Math.random() * 4 - 2, Math.random() * 4 - 2);
                pillars.push(pillar);
                scene.add(pillar);
            }

            // Create fish
            fish = [];
            for (let i = 0; i < 50; i++) {
                let fishGeo = new THREE.SphereGeometry(0.1, 64, 64);
                let fishMat = new THREE.MeshBasicMaterial({
                    color: 0x00ff00
                });
                let fishMesh = new THREE.Mesh(fishGeo, fishMat);
                fishMesh.position.set(Math.random() * 4 - 2, Math.random() * 4 - 2, Math.random() * 4 - 2);
                fish.push(fishMesh);
                scene.add(fishMesh);
            }

            // Create jellyfish
            jellyfish = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), new THREE.MeshBasicMaterial({
                color: 0xffff00,
                transparent: true,
                opacity: 0.5
            }));
            jellyfish.position.set(0, 2, 0);
            scene.add(jellyfish);

            // Create ambient light
            let ambientLight = new THREE.AmbientLight(0x4444ff, 0.5);
            scene.add(ambientLight);

            // Create point light
            let pointLight = new THREE.PointLight(0x00ff00, 1, 100);
            pointLight.position.set(0, 0, 5);
            scene.add(pointLight);

            // Add event listeners
            document.addEventListener('mousedown', handleMouseDown);
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', handleMouseUp);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Update fish positions
            for (let i = 0; i < fish.length; i++) {
                fish[i].position.x += Math.random() * 0.01 - 0.005;
                fish[i].position.y += Math.random() * 0.01 - 0.005;
                fish[i].position.z += Math.random() * 0.01 - 0.005;
            }

            // Update jellyfish position
            jellyfish.position.y = 2 + Math.sin(Date.now() * 0.01) * 0.5;

            // Update camera rotation
            if (isDragging) {
                let dx = mouse.x - dragStart.x;
                let dy = mouse.y - dragStart.y;
                camera.rotation.x += dy * 0.01;
                camera.rotation.y += dx * 0.01;
                dragStart.x = mouse.x;
                dragStart.y = mouse.y;
            }

            renderer.render(scene, camera);
        }

        function handleMouseDown(event) {
            isDragging = true;
            dragStart.x = event.clientX;
            dragStart.y = event.clientY;
        }

        function handleMouseMove(event) {
            mouse.x = event.clientX;
            mouse.y = event.clientY;
        }

        function handleMouseUp(event) {
            isDragging = false;
        }
    </script>
</body>
</html>
