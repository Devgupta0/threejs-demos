<!DOCTYPE html>
<html>
<head>
    <title>Underwater Scene</title>
    <style>
        body { margin: 0; }
        #title { position: absolute; top: 10px; left: 10px; font-family: monospace; color: white; }
    </style>
</head>
<body>
    <div id="title">Underwater Scene</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, jellyfish, coralReef, oceanFloor;
        let mouseDown = false, mouseX = 0, mouseY = 0;
        let rotationX = 0, rotationY = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            coralReef = new THREE.Group();
            for (let i = 0; i < 100; i++) {
                let geometry = new THREE.SphereGeometry(Math.random() * 0.5 + 0.1, 16, 16);
                let material = new THREE.MeshPhongMaterial({ color: new THREE.Color(Math.random() * 0.5 + 0.5, Math.random() * 0.5 + 0.5, Math.random() * 0.5 + 0.5) });
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = Math.random() * 10 - 5;
                mesh.position.y = Math.random() * 10 - 5;
                mesh.position.z = Math.random() * 10 - 5;
                coralReef.add(mesh);
            }
            scene.add(coralReef);

            jellyfish = new THREE.Group();
            for (let i = 0; i < 20; i++) {
                let geometry = new THREE.SphereGeometry(0.5, 16, 16);
                let material = new THREE.MeshPhongMaterial({ color: new THREE.Color(Math.random() * 0.5 + 0.5, Math.random() * 0.5 + 0.5, Math.random() * 0.5 + 0.5), transparent: true, opacity: 0.5 });
                let mesh = new THREE.Mesh(geometry, material);
                mesh.position.x = Math.random() * 10 - 5;
                mesh.position.y = Math.random() * 10 - 5;
                mesh.position.z = Math.random() * 10 - 5;
                jellyfish.add(mesh);
            }
            scene.add(jellyfish);

            oceanFloor = new THREE.PlaneGeometry(20, 20);
            let oceanFloorMaterial = new THREE.MeshPhongMaterial({ color: new THREE.Color(0.2, 0.5, 0.8), side: THREE.DoubleSide });
            let oceanFloorMesh = new THREE.Mesh(oceanFloor, oceanFloorMaterial);
            oceanFloorMesh.position.y = -5;
            oceanFloorMesh.rotation.x = Math.PI / 2;
            scene.add(oceanFloorMesh);

            let ambientLight = new THREE.AmbientLight(0x333333);
            scene.add(ambientLight);

            let pointLight = new THREE.PointLight(0xffffff, 1, 10);
            pointLight.position.z = 5;
            scene.add(pointLight);

            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        }

        function animate() {
            requestAnimationFrame(animate);

            camera.rotation.x = rotationX;
            camera.rotation.y = rotationY;

            jellyfish.children.forEach((child, index) => {
                child.position.x += Math.sin(Date.now() * 0.001 + index) * 0.01;
                child.position.y += Math.cos(Date.now() * 0.001 + index) * 0.01;
                child.position.z += Math.sin(Date.now() * 0.001 + index) * 0.01;
            });

            oceanFloor.scale.x = 1 + Math.sin(Date.now() * 0.001) * 0.1;
            oceanFloor.scale.y = 1 + Math.cos(Date.now() * 0.001) * 0.1;

            renderer.render(scene, camera);
        }

        function onMouseDown(event) {
            mouseDown = true;
            mouseX = event.clientX;
            mouseY = event.clientY;
        }

        function onMouseMove(event) {
            if (mouseDown) {
                rotationX += (event.clientY - mouseY) * 0.01;
                rotationY += (event.clientX - mouseX) * 0.01;
                mouseX = event.clientX;
                mouseY = event.clientY;
            }
        }

        function onMouseUp() {
            mouseDown = false;
        }
    </script>
</body>
</html>
