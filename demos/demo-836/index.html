```html
<html>
<head>
  <title>Crystal Cave</title>
  <style>
    body { margin: 0; }
    #title { position: absolute; top: 10px; left: 10px; font-family: monospace; color: white; }
  </style>
</head>
<body>
  <div id="title">Crystal Cave</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    let scene, camera, renderer, mesh, particles = [];
    let rotX = 0, rotY = 0;
    let dragging = false;
    let mx = 0, my = 0;

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;

      renderer = new THREE.WebGLRenderer();
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      let geometry = new THREE.PlaneGeometry(10, 10);
      let material = new THREE.MeshPhongMaterial({ color: 0xffffff, side: THREE.DoubleSide });
      mesh = new THREE.Mesh(geometry, material);
      mesh.position.y = -2;
      scene.add(mesh);

      let lakeGeometry = new THREE.PlaneGeometry(20, 20);
      let lakeMaterial = new THREE.MeshPhongMaterial({ color: 0x0000ff, side: THREE.DoubleSide });
      let lake = new THREE.Mesh(lakeGeometry, lakeMaterial);
      lake.position.y = -5;
      lake.rotation.x = Math.PI / 2;
      scene.add(lake);

      for (let i = 0; i < 100; i++) {
        let particleGeometry = new THREE.SphereGeometry(0.1, 10, 10);
        let particleMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff });
        let particle = new THREE.Mesh(particleGeometry, particleMaterial);
        particle.position.x = Math.random() * 10 - 5;
        particle.position.y = Math.random() * 5;
        particle.position.z = Math.random() * 10 - 5;
        particles.push(particle);
        scene.add(particle);
      }

      let mushroomGeometry = new THREE.SphereGeometry(0.5, 10, 10);
      let mushroomMaterial = new THREE.MeshPhongMaterial({ color: 0xff00ff });
      for (let i = 0; i < 10; i++) {
        let mushroom = new THREE.Mesh(mushroomGeometry, mushroomMaterial);
        mushroom.position.x = Math.random() * 10 - 5;
        mushroom.position.y = -3;
        mushroom.position.z = Math.random() * 10 - 5;
        scene.add(mushroom);
      }

      let ambientLight = new THREE.AmbientLight(0x111111);
      scene.add(ambientLight);

      let pointLight = new THREE.PointLight(0xffffff, 1, 10);
      pointLight.position.y = 2;
      scene.add(pointLight);

      document.addEventListener('mousedown', onDocumentMouseDown);
      document.addEventListener('mouseup', onDocumentMouseUp);
      document.addEventListener('mousemove', onDocumentMouseMove);
    }

    function onDocumentMouseDown(event) {
      dragging = true;
      mx = event.clientX;
      my = event.clientY;
    }

    function onDocumentMouseUp() {
      dragging = false;
    }

    function onDocumentMouseMove(event) {
      if (dragging) {
        rotX += (event.clientY - my) * 0.01;
        rotY += (event.clientX - mx) * 0.01;
        mx = event.clientX;
        my = event.clientY;
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      camera.rotation.x = rotX;
      camera.rotation.y = rotY;

      for (let i = 0; i < particles.length; i++) {
        particles[i].position.y += 0.01;
        if (particles[i].position.y > 5) {
          particles[i].position.y = -5;
          particles[i].position.x = Math.random() * 10 - 5;
          particles[i].position.z = Math.random() * 10 - 5;
        }
      }

      mesh.position.y = -2 + Math.sin(Date.now() * 0.01) * 0.5;
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
