```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Scene</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Nebula Scene</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, particles = [], stars = [], clouds = [], vortex;
        let dragStart = null, dragEnd = null;
        let rotation = { x: 0, y: 0 };

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 500;

            renderer = new THREE.WebGLRenderer({
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            for (let i = 0; i < 5000; i++) {
                let particle = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), new THREE.MeshBasicMaterial({
                    color: new THREE.Color(`hsl(${Math.random() * 360}, 100%, 50%)`)
                }));
                particle.position.x = Math.random() * 1000 - 500;
                particle.position.y = Math.random() * 1000 - 500;
                particle.position.z = Math.random() * 1000 - 500;
                scene.add(particle);
                particles.push(particle);
            }

            for (let i = 0; i < 1000; i++) {
                let star = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({
                    color: new THREE.Color(`hsl(${Math.random() * 360}, 100%, 50%)`)
                }));
                star.position.x = Math.random() * 2000 - 1000;
                star.position.y = Math.random() * 2000 - 1000;
                star.position.z = Math.random() * 2000 - 1000;
                scene.add(star);
                stars.push(star);
            }

            for (let i = 0; i < 10; i++) {
                let cloud = new THREE.Mesh(new THREE.SphereGeometry(50, 32, 32), new THREE.MeshBasicMaterial({
                    color: new THREE.Color(0xffffff),
                    transparent: true,
                    opacity: 0.1
                }));
                cloud.position.x = Math.random() * 1000 - 500;
                cloud.position.y = Math.random() * 1000 - 500;
                cloud.position.z = Math.random() * 1000 - 500;
                scene.add(cloud);
                clouds.push(cloud);
            }

            vortex = new THREE.Mesh(new THREE.SphereGeometry(100, 64, 64), new THREE.MeshBasicMaterial({
                color: new THREE.Color(0xffffff),
                transparent: true,
                opacity: 0.5
            }));
            vortex.position.x = 0;
            vortex.position.y = 0;
            vortex.position.z = 0;
            scene.add(vortex);

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mouseup', onMouseUp);
        }

        function animate() {
            requestAnimationFrame(animate);

            particles.forEach(particle => {
                particle.position.x += Math.random() * 0.1 - 0.05;
                particle.position.y += Math.random() * 0.1 - 0.05;
                particle.position.z += Math.random() * 0.1 - 0.05;
            });

            stars.forEach(star => {
                star.position.x += Math.random() * 0.01 - 0.005;
                star.position.y += Math.random() * 0.01 - 0.005;
                star.position.z += Math.random() * 0.01 - 0.005;
            });

            clouds.forEach(cloud => {
                cloud.position.x += Math.random() * 0.1 - 0.05;
                cloud.position.y += Math.random() * 0.1 - 0.05;
                cloud.position.z += Math.random() * 0.1 - 0.05;
            });

            vortex.position.x += Math.random() * 0.1 - 0.05;
            vortex.position.y += Math.random() * 0.1 - 0.05;
            vortex.position.z += Math.random() * 0.1 - 0.05;

            camera.rotation.x += rotation.x;
            camera.rotation.y += rotation.y;

            renderer.render(scene, camera);
        }

        function onMouseDown(event) {
            dragStart = {
                x: event.clientX,
                y: event.clientY
            };
        }

        function onMouseUp(event) {
            dragEnd = {
                x: event.clientX,
                y: event.clientY
            };

            if (dragStart && dragEnd) {
                rotation.x = (dragEnd.y - dragStart.y) * 0.01;
                rotation.y = (dragEnd.x - dragStart.x) * 0.01;
            }

            dragStart = null;
            dragEnd = null;
        }

        function onMouseMove(event) {
            if (dragStart) {
                rotation.x = (event.clientY - dragStart.y) * 0.01;
                rotation.y = (event.clientX - dragStart.x) * 0.01;
            }
        }
    </script>
</body>
</html>
