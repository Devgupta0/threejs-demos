```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Cave</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="title">Crystal Cave</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        let camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        let renderer = new THREE.WebGLRenderer({
            canvas: document.createElement('canvas'),
            antialias: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        let crystals = [];
        for (let i = 0; i < 100; i++) {
            let geometry = new THREE.IcosahedronGeometry(Math.random() * 2 + 1, 2);
            let material = new THREE.MeshPhongMaterial({
                color: new THREE.Color(Math.random(), Math.random(), Math.random()),
                specular: new THREE.Color(Math.random(), Math.random(), Math.random()),
                shininess: Math.random() * 100
            });
            let crystal = new THREE.Mesh(geometry, material);
            crystal.position.x = Math.random() * 20 - 10;
            crystal.position.y = Math.random() * 10 - 5;
            crystal.position.z = Math.random() * 20 - 10;
            scene.add(crystal);
            crystals.push(crystal);
        }

        let plants = [];
        for (let i = 0; i < 50; i++) {
            let geometry = new THREE.SphereGeometry(Math.random() * 0.5 + 0.1, 16, 16);
            let material = new THREE.MeshBasicMaterial({
                color: new THREE.Color(Math.random() * 0.5 + 0.5, Math.random() * 0.5 + 0.5, Math.random() * 0.5 + 0.5)
            });
            let plant = new THREE.Mesh(geometry, material);
            plant.position.x = Math.random() * 20 - 10;
            plant.position.y = Math.random() * 5 - 2.5;
            plant.position.z = Math.random() * 20 - 10;
            scene.add(plant);
            plants.push(plant);
        }

        let mist = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshBasicMaterial({
            color: new THREE.Color(Math.random(), Math.random(), Math.random()),
            transparent: true,
            opacity: 0.5
        }));
        mist.position.y = -5;
        mist.rotation.x = Math.PI / 2;
        scene.add(mist);

        let ambientLight = new THREE.AmbientLight(0x444444);
        scene.add(ambientLight);

        let pointLight = new THREE.PointLight(0xffffff, 2, 100);
        pointLight.position.set(0, 5, 0);
        scene.add(pointLight);

        let mouse = {
            x: 0,
            y: 0
        };
        let rotation = {
            x: 0,
            y: 0
        };
        document.addEventListener('mousemove', (event) => {
            mouse.x = event.clientX;
            mouse.y = event.clientY;
        });
        document.addEventListener('mousedown', () => {
            rotation.x = mouse.x;
            rotation.y = mouse.y;
        });
        document.addEventListener('mouseup', () => {
            rotation.x = mouse.x;
            rotation.y = mouse.y;
        });

        function animate() {
            requestAnimationFrame(animate);
            camera.rotation.x += (mouse.y - rotation.y) * 0.01;
            camera.rotation.y += (mouse.x - rotation.x) * 0.01;
            rotation.x = mouse.x;
            rotation.y = mouse.y;
            mist.material.color.setHSL(Math.random(), Math.random(), Math.random());
            mist.material.opacity = Math.random() * 0.5 + 0.5;
            for (let i = 0; i < crystals.length; i++) {
                crystals[i].rotation.x += 0.01;
                crystals[i].rotation.y += 0.01;
            }
            for (let i = 0; i < plants.length; i++) {
                plants[i].scale.set(Math.random() * 0.1 + 0.9, Math.random() * 0.1 + 0.9, Math.random() * 0.1 + 0.9);
            }
            renderer.render(scene, camera);
        }
        camera.position.z = 10;
        animate();
    </script>
</body>
</html>
