```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Scene</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            overflow: hidden;
        }
        #title {
            position: absolute;
            top: 10px;
            left: 10px;
            font-family: monospace;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="title">Underwater Research Facility</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, drag = false, prevX, prevY;
        const init = () => {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000033);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            renderer = new THREE.WebGLRenderer({
                canvas: document.createElement('canvas'),
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
            const cube = new THREE.Mesh(geometry, material);
            scene.add(cube);
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(0, 0, 1);
            scene.add(light);
            const ambientLight = new THREE.AmbientLight(0x111111, 0.5);
            scene.add(ambientLight);
            const seaweedGeometry = new THREE.PlaneGeometry(2, 10);
            const seaweedMaterial = new THREE.MeshPhongMaterial({ color: 0x006600, transparent: true, opacity: 0.5 });
            for (let i = 0; i < 10; i++) {
                const seaweed = new THREE.Mesh(seaweedGeometry, seaweedMaterial);
                seaweed.position.set(Math.random() * 10 - 5, -5, Math.random() * 10 - 5);
                seaweed.rotation.x = Math.random() * Math.PI;
                scene.add(seaweed);
            }
            const fishGeometry = new THREE.SphereGeometry(0.5, 32, 32);
            const fishMaterial = new THREE.MeshPhongMaterial({ color: 0x00ffff, transparent: true, opacity: 0.5 });
            for (let i = 0; i < 20; i++) {
                const fish = new THREE.Mesh(fishGeometry, fishMaterial);
                fish.position.set(Math.random() * 10 - 5, Math.random() * 5 - 2.5, Math.random() * 10 - 5);
                scene.add(fish);
            }
            const jellyfishGeometry = new THREE.SphereGeometry(1, 32, 32);
            const jellyfishMaterial = new THREE.MeshPhongMaterial({ color: 0x0000ff, transparent: true, opacity: 0.5 });
            for (let i = 0; i < 5; i++) {
                const jellyfish = new THREE.Mesh(jellyfishGeometry, jellyfishMaterial);
                jellyfish.position.set(Math.random() * 10 - 5, Math.random() * 5 - 2.5, Math.random() * 10 - 5);
                scene.add(jellyfish);
            }
            const researchFacilityGeometry = new THREE.BoxGeometry(5, 5, 5);
            const researchFacilityMaterial = new THREE.MeshPhongMaterial({ color: 0xff0000, transparent: true, opacity: 0.5 });
            const researchFacility = new THREE.Mesh(researchFacilityGeometry, researchFacilityMaterial);
            researchFacility.position.set(0, -2.5, 0);
            scene.add(researchFacility);
            document.addEventListener('mousedown', (event) => {
                drag = true;
                prevX = event.clientX;
                prevY = event.clientY;
            });
            document.addEventListener('mouseup', () => {
                drag = false;
            });
            document.addEventListener('mousemove', (event) => {
                if (drag) {
                    camera.rotation.x += (event.clientY - prevY) * 0.01;
                    camera.rotation.y += (event.clientX - prevX) * 0.01;
                    prevX = event.clientX;
                    prevY = event.clientY;
                }
            });
            animate();
        };
        const animate = () => {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
            camera.position.x = Math.sin(Date.now() * 0.001) * 2;
            camera.position.y = Math.cos(Date.now() * 0.001) * 2;
        };
        init();
    </script>
</body>
</html>
