```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystical Forest</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            font-family: monospace;
        }
        #scene-title {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="scene-title">Mystical Forest</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, moon, trees = [], mushrooms = [], fireflies = [], mist;
        let dragging = false, mouseX = 0, mouseY = 0, prevMouseX = 0, prevMouseY = 0;
        const canvas = document.createElement('canvas');
        document.body.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        renderer = new THREE.WebGLRenderer({
            canvas: canvas,
            antialias: true
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000022);
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 50;
        const skySphere = new THREE.SphereGeometry(100, 32, 32);
        const skyMaterial = new THREE.MeshBasicMaterial({
            color: 0x000022,
            side: THREE.BackSide
        });
        const sky = new THREE.Mesh(skySphere, skyMaterial);
        scene.add(sky);
        const starGeometry = new THREE.SphereGeometry(0.1, 8, 8);
        const starMaterial = new THREE.MeshBasicMaterial({
            color: 0xffffff
        });
        for (let i = 0; i < 1000; i++) {
            const star = new THREE.Mesh(starGeometry, starMaterial);
            star.position.x = Math.random() * 200 - 100;
            star.position.y = Math.random() * 200 - 100;
            star.position.z = Math.random() * 200 - 100;
            scene.add(star);
        }
        const moonGeometry = new THREE.SphereGeometry(5, 32, 32);
        const moonMaterial = new THREE.MeshBasicMaterial({
            color: 0xffff00
        });
        moon = new THREE.Mesh(moonGeometry, moonMaterial);
        moon.position.z = -50;
        scene.add(moon);
        const treeGeometry = new THREE.CylinderGeometry(1, 3, 10, 32);
        const treeMaterial = new THREE.MeshLambertMaterial({
            color: 0x663300
        });
        for (let i = 0; i < 10; i++) {
            const tree = new THREE.Mesh(treeGeometry, treeMaterial);
            tree.position.x = Math.random() * 50 - 25;
            tree.position.z = Math.random() * 50 - 25;
            trees.push(tree);
            scene.add(tree);
        }
        const mushroomGeometry = new THREE.ConeGeometry(1, 2, 32);
        const mushroomMaterial = new THREE.MeshLambertMaterial({
            color: 0xff00ff,
            emissive: 0x550055
        });
        for (let i = 0; i < 20; i++) {
            const mushroom = new THREE.Mesh(mushroomGeometry, mushroomMaterial);
            mushroom.position.x = Math.random() * 50 - 25;
            mushroom.position.z = Math.random() * 50 - 25;
            mushroom.position.y = -5;
            mushrooms.push(mushroom);
            scene.add(mushroom);
        }
        const fireflyGeometry = new THREE.SphereGeometry(0.1, 8, 8);
        const fireflyMaterial = new THREE.MeshBasicMaterial({
            color: 0xffff00
        });
        for (let i = 0; i < 50; i++) {
            const firefly = new THREE.Mesh(fireflyGeometry, fireflyMaterial);
            firefly.position.x = Math.random() * 50 - 25;
            firefly.position.z = Math.random() * 50 - 25;
            firefly.position.y = Math.random() * 10 - 5;
            fireflies.push(firefly);
            scene.add(firefly);
        }
        const mistGeometry = new THREE.PlaneGeometry(10, 10);
        const mistMaterial = new THREE.MeshBasicMaterial({
            color: 0x550055,
            transparent: true,
            opacity: 0.5
        });
        mist = new THREE.Mesh(mistGeometry, mistMaterial);
        mist.position.y = -5;
        scene.add(mist);
        const ambientLight = new THREE.AmbientLight(0x111111);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1, 100);
        pointLight.position.z = -50;
        scene.add(pointLight);
        function animate() {
            requestAnimationFrame(animate);
            camera.position.x += (mouseX - camera.position.x) * 0.01;
            camera.position.y += (mouseY - camera.position.y) * 0.01;
            for (let i = 0; i < trees.length; i++) {
                const tree = trees[i];
                tree.rotation.y += 0.01;
            }
            for (let i = 0; i < mushrooms.length; i++) {
                const mushroom = mushrooms[i];
                mushroom.rotation.y += 0.01;
            }
            for (let i = 0; i < fireflies.length; i++) {
                const firefly = fireflies[i];
                firefly.position.x += Math.random() * 0.1 - 0.05;
                firefly.position.z += Math.random() * 0.1 - 0.05;
                firefly.position.y += Math.random() * 0.1 - 0.05;
            }
            mist.position.x += Math.random() * 0.1 - 0.05;
            mist.position.z += Math.random() * 0.1 - 0.05;
            mist.rotation.y += 0.01;
            camera.lookAt(new THREE.Vector3(0, 0, -50));
            renderer.render(scene, camera);
        }
        animate();
        document.addEventListener('mousedown', (event) => {
            dragging = true;
            prevMouseX = event.clientX;
            prevMouseY = event.clientY;
        });
        document.addEventListener('mousemove', (event) => {
            if (dragging) {
                mouseX = event.clientX - window.innerWidth / 2;
                mouseY = event.clientY - window.innerHeight / 2;
            }
        });
        document.addEventListener('mouseup', () => {
            dragging = false;
        });
    </script>
</body>
</html>
```
